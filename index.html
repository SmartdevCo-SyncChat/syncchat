<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Chat WhatsApp Style</title>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#efeae2;
  --green:#10a37f;
  --text:#111;
  --muted:#667781;
}

html,body{
  height:100%;
  margin:0;
  font-family:'Cairo',sans-serif;
  background:var(--bg);
}

/* HEADER */
.header{
  position:fixed;
  top:0;left:0;right:0;
  height:56px;
  background:#fff;
  display:flex;
  align-items:center;
  padding:0 12px;
  border-bottom:1px solid #ddd;
}

.avatar{
  width:34px;height:34px;border-radius:50%;
  background:var(--green);
  color:#fff;
  display:flex;align-items:center;justify-content:center;
  font-weight:700;
}

.info{margin-right:10px;flex:1}
.title{font-size:14px;font-weight:700}
.status{font-size:11px;color:var(--muted)}

/* CHAT AREA */
.chat{
  padding-top:60px;
  padding-bottom:70px;
  display:flex;
  flex-direction:column;
  gap:6px;
}

/* MESSAGE ROW */
.row{
  display:flex;
  width:100%;
}

.row.me{justify-content:flex-start;}
.row.other{justify-content:flex-end;}

/* BUBBLE */
.bubble{
  max-width:70%;
  padding:6px 10px;
  border-radius:8px;
  font-size:14px;
  line-height:1.4;
  position:relative;
  word-break:break-word;
}

/* ME (green) */
.me .bubble{
  background:var(--green);
  color:#fff;
  border-bottom-left-radius:3px;
}

/* OTHER */
.other .bubble{
  background:#fff;
  color:#111;
  border-bottom-right-radius:3px;
}

/* reply */
.reply{
  font-size:11px;
  padding:4px 6px;
  border-right:3px solid var(--green);
  background:rgba(0,0,0,0.04);
  border-radius:5px;
  margin-bottom:4px;
  color:#444;
}

/* time */
.time{
  font-size:9px;
  opacity:.6;
  margin-top:3px;
  text-align:left;
}

/* input */
.input{
  position:fixed;
  bottom:0;left:0;right:0;
  background:#fff;
  padding:8px;
  display:flex;
  gap:6px;
}

.input input{
  flex:1;
  padding:10px;
  border-radius:20px;
  border:1px solid #ddd;
}

.input button{
  background:var(--green);
  border:none;
  color:#fff;
  padding:10px 14px;
  border-radius:20px;
}
</style>
</head>

<body>

<div class="header">
  <div class="avatar" id="avatar">?</div>
  <div class="info">
    <div class="title" id="room">Room</div>
    <div class="status" id="status">...</div>
  </div>
</div>

<div class="chat" id="chat"></div>

<div class="input">
  <input id="msg" placeholder="اكتب رسالة..."/>
  <button onclick="send()">إرسال</button>
</div>

<script>
firebase.initializeApp({
  databaseURL:"https://syncchat-6e22b-default-rtdb.europe-west1.firebasedatabase.app"
});

const db = firebase.database();

let room = "test";
let name = "user1";

/* PRESENCE - last joined */
function listenPresence(){
  db.ref(`rooms/${room}/presence`).on('value', snap=>{
    const data = snap.val() || {};

    const users = Object.values(data)
      .filter(u=>u.name && u.name !== name)
      .sort((a,b)=>(b.joinedAt||0)-(a.joinedAt||0));

    const last = users[0];

    if(last){
      document.getElementById('avatar').innerText = last.name.slice(0,2);

      const t = new Date(last.joinedAt || Date.now())
        .toLocaleTimeString('ar-EG',{hour:'2-digit',minute:'2-digit'});

      document.getElementById('status').innerText =
        last.online ? `${last.name} online` : `last seen ${t}`;
    }
  });
}

/* MESSAGES */
function listen(){
  db.ref(`rooms/${room}/messages`).on('child_added', snap=>{
    const m = snap.val();

    const div = document.createElement('div');
    div.className = 'row ' + (m.sender===name?'me':'other');

    let reply = "";
    if(m.replyTo){
      reply = `
        <div class="reply">
          <b>${m.replyTo.sender}</b><br/>
          ${m.replyTo.text}
        </div>`;
    }

    div.innerHTML = `
      <div class="bubble">
        ${reply}
        ${m.text}
        <div class="time">${new Date(m.ts).toLocaleTimeString()}</div>
      </div>
    `;

    document.getElementById('chat').appendChild(div);
  });
}

/* SEND */
function send(){
  const text = document.getElementById('msg').value;

  db.ref(`rooms/${room}/messages`).push({
    text,
    sender:name,
    ts:Date.now()
  });

  document.getElementById('msg').value="";
}

listen();
listenPresence();
</script>

</body>
</html>
