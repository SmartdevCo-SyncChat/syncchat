<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
<title>ChatBFT</title>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}

:root{
  --bg:            #ffffff;
  --bg-chat:       #ffffff;
  --surface:       #f9f9f9;
  --surface2:      #efefef;
  --border:        #e5e5e5;
  --border2:       #d9d9d9;
  --accent:        #10a37f;
  --accent-hover:  #0d8f6f;
  --text:          #0d0d0d;
  --text-2:        #353535;
  --muted:         #6e6e80;
  --danger:        #ef4444;
  --sent-bg:       #10a37f;
  --recv-bg:       #f4f4f4;
  --header-bg:     #ffffff;
  --input-bg:      #f4f4f4;
  --font:          'Cairo', sans-serif;
}

html,body{
  width:100%;
  height:100%;
  height:100dvh;
  overflow:hidden;
  font-family:var(--font);
  background:#ffffff;color:#0d0d0d;
}

#app{width:100%;height:100%;height:100dvh;display:flex;align-items:stretch;}
.screen{width:100%;height:100%;overflow:hidden}
.hidden{display:none!important}

/* LOGIN */
#login-screen{
  display:flex;align-items:center;justify-content:center;
  background:#ffffff;padding:20px;overflow-y:auto;height:100%;
}
.login-wrap{width:100%;max-width:380px;animation:loginIn .4s cubic-bezier(.22,1,.36,1)}
@keyframes loginIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.login-card{background:#ffffff;border:1px solid #e5e5e5;border-radius:16px;padding:32px 28px 28px;}
.brand{text-align:center;margin-bottom:28px}
.brand-name{font-size:26px;font-weight:700;color:var(--text)}
.brand-name span{color:var(--accent)}
.brand-sub{font-size:12px;color:var(--muted);margin-top:4px}
.field{margin-bottom:14px}
.field label{display:block;font-size:11px;font-weight:600;color:var(--muted);margin-bottom:6px;letter-spacing:.5px;text-transform:uppercase}
.field input{
  width:100%;background:#f4f4f4;border:1px solid var(--border);border-radius:10px;
  padding:11px 14px;color:var(--text);font-size:14px;font-family:var(--font);outline:none;
}
.field input:focus{border-color:var(--accent);box-shadow:0 0 0 2px rgba(16,163,127,.15)}
.field-hint{font-size:11px;color:var(--muted);margin-top:4px}
.btn-login{
  width:100%;border:none;border-radius:10px;padding:12px;margin-top:6px;
  background:var(--accent);color:white;font-size:14px;font-weight:700;font-family:var(--font);cursor:pointer;
}
.btn-login:hover{background:var(--accent-hover)}
.error-msg{min-height:18px;color:var(--danger);font-size:12px;margin-bottom:8px;text-align:center;font-weight:500}

/* CHAT SCREEN */
#chat-screen{
  max-width:860px;margin:0 auto;background:#ffffff;
  position:relative;
  height:100dvh;
  display:flex;flex-direction:column;
  overflow:hidden;
}

.chat-header{
  position:relative;
  background:var(--header-bg);border-bottom:1px solid #e5e5e5;
  height:56px;min-height:56px;max-height:56px;
  display:flex;align-items:center;gap:10px;padding:0 14px;
  z-index:100;flex-shrink:0;overflow:hidden;
}
.peer-avatar{width:36px;height:36px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:white;flex-shrink:0;}
.my-avatar-sm{width:28px;height:28px;border-radius:50%;background:#f4f4f4;border:1px solid #d9d9d9;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--text-2);flex-shrink:0;}
.header-info{flex:1;min-width:0}
.header-room{font-size:14px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.header-sub{
  font-size:11px;color:var(--muted);
  margin-top:1px;
  display:flex;align-items:center;gap:5px;
  line-height:1.3;min-width:0;
}
#peer-status{
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
  flex:1;min-width:0;
  font-size:11px;
}
.online-dot{width:6px;height:6px;border-radius:50%;background:var(--muted);flex-shrink:0;}
.online-dot.on{background:#10a37f;box-shadow:0 0 5px rgba(16,163,127,.5)}
.header-actions{display:flex;gap:5px}
.btn-hdr.clear{color:var(--muted)}
.btn-hdr.leave{color:var(--danger);border-color:rgba(239,68,68,.3)}

.messages-wrap{
  flex:1;
  position:relative;
  background:#ffffff;
  overflow:hidden;
  min-height:0;
  margin-bottom:64px;
}
#chat-screen.has-reply .messages-wrap{margin-bottom:108px;}

.messages-area{
  width:100%;height:100%;
  overflow-y:auto;
  padding:16px;
  display:flex;flex-direction:column;gap:12px;
  -webkit-overflow-scrolling:touch;
  overscroll-behavior:contain;
}

.date-divider{align-self:center;background:#f0f0f0;padding:4px 14px;border-radius:20px;font-size:11px;color:var(--muted);margin:10px 0;}

/* MESSAGES */
.msg-wrapper{display:flex;width:100%;position:relative;animation:bubbleIn .18s ease;}
.msg-wrapper.sent{justify-content:flex-start;}
.msg-wrapper.recv{justify-content:flex-end;}
.msg-row{display:flex;max-width:85%;width:auto;position:relative;align-items:center;}

/* الإجراءات السريعة بجانب الرسالة - تظهر عند الضغط في الموبايل */
.msg-actions-group{
  display:none;
  flex-direction:row;
  gap:4px;
  align-self:center;
  flex-shrink:0;
}
.msg-action-btn{
  width:30px;height:30px;
  border-radius:50%;
  border:1px solid #e5e5e5;
  background:#ffffff;
  color:#6e6e80;
  font-size:13px;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:0 1px 4px rgba(0,0,0,.08);
  transition:background .15s,color .15s;
}
.msg-action-btn:hover{background:#f0f0f0;color:#0d0d0d;}

/* إظهار الأزرار على الديسكتوب عند الحوم بالماوس */
@media (min-width: 769px) {
  .msg-row:hover .msg-actions-group {
    display: flex !important;
  }
}

/* تفعيل ظهور الأزرار على الموبايل عند الضغط */
.msg-row.active-actions .msg-actions-group {
  display: flex !important;
}

.msg-wrapper.sent .msg-row{ flex-direction:row; gap:6px; }
.msg-wrapper.recv .msg-row{ flex-direction:row-reverse; gap:6px; }

.msg-bubble.tapped{
  filter:brightness(.92);
  transition:filter .15s;
}

.msg-bubble-wrap{display:flex;flex-direction:column;width:auto;}
.msg-sender-name{font-size:11px;font-weight:600;color:var(--muted);margin-bottom:2px;padding:0 4px;align-self:flex-start;}

/* ═══ REPLY QUOTATION ═══ */
.reply-quotation{
  background:rgba(0,0,0,.06);
  border-right:3px solid var(--accent);
  padding:3px 7px;
  border-radius:5px;
  font-size:11px;
  margin-bottom:5px;
  color:#4f4f4f;
  display:block;
  max-width:100%;
  line-height:1.3;
  cursor:pointer;
}
.msg-wrapper.sent .reply-quotation{
  background:rgba(255,255,255,.18);
  border-right-color:#ffffff;
  color:rgba(255,255,255,.85);
}
.reply-quotation-sender{
  font-weight:700;
  font-size:10px;
  margin-bottom:1px;
  color:var(--accent);
}
.msg-wrapper.sent .reply-quotation-sender{color:#ffffff;}
.reply-quotation-text{
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  max-width:200px;
  display:block;
}

/* BUBBLE */
.msg-bubble{
  padding:8px 12px;font-size:14.5px;line-height:1.4;
  word-break:break-word;overflow-wrap:anywhere;white-space:pre-wrap;
  display:flex;flex-direction:column;width:fit-content;max-width:100%;min-width:90px;
  -webkit-user-select:none;user-select:none;
  -webkit-touch-callout:none;
  cursor: pointer;
}
.msg-wrapper.sent .msg-bubble{
  background:#10a37f;color:#ffffff;
  border-top-left-radius:14px;border-top-right-radius:14px;
  border-bottom-left-radius:14px;border-bottom-right-radius:4px;
}
.msg-wrapper.recv .msg-bubble{
  background:#f1f1f1;color:#0d0d0d;
  border-top-left-radius:14px;border-top-right-radius:14px;
  border-bottom-left-radius:4px;border-bottom-right-radius:14px;
}
.msg-meta{display:flex;align-items:center;justify-content:flex-end;gap:3px;font-size:9.5px;margin-top:4px;white-space:nowrap;pointer-events:none;align-self:flex-end;width:100%;}
.msg-wrapper.sent .msg-meta{color:rgba(255,255,255,.7);}
.msg-wrapper.recv .msg-meta{color:#8e8e93;}
.check-icon{font-size:9px;}

.chat-image{max-width:100%;max-height:200px;border-radius:10px;display:block;cursor:pointer;margin-bottom:3px;}
.file-attachment{display:flex;align-items:center;gap:8px;background:rgba(0,0,0,.03);padding:8px 10px;border-radius:10px;text-decoration:none;color:var(--accent);font-weight:600;font-size:12px;border:1px solid var(--border);margin-bottom:3px;}
.system-msg{align-self:center;background:#f4f4f4;border:1px solid var(--border);padding:4px 14px;border-radius:20px;color:var(--muted);font-size:11px;margin:8px 0;}

/* Scroll to bottom */
.btn-scroll-down{
  position:fixed;
  bottom:80px;
  left:50%;
  transform:translateX(-50%);
  background:#ffffff;
  border:1px solid #e5e5e5;
  border-radius:50%;
  width:36px;height:36px;
  display:none;
  align-items:center;justify-content:center;
  cursor:pointer;
  box-shadow:0 2px 12px rgba(0,0,0,.15);
  z-index:995;
  transition:opacity .2s,transform .2s;
  padding:0;
}
.btn-scroll-down.show{display:flex;}
.btn-scroll-down:hover{transform:translateX(-50%) scale(1.08);}
.btn-scroll-down svg{width:18px;height:18px;stroke:#666;}
.btn-scroll-down .unread-badge{
  position:absolute;top:-5px;right:-5px;
  background:var(--accent);color:white;
  border-radius:50%;width:17px;height:17px;
  font-size:9px;font-weight:700;
  display:none;align-items:center;justify-content:center;
  font-family:var(--font);
}
.btn-scroll-down.add-unread .unread-badge{display:flex;}

/* PIN BAR */
.pin-bar{
  position:relative;
  background:#fffbea;
  border-bottom:1.5px solid #f0d060;
  border-right:4px solid var(--accent);
  padding:8px 14px;
  display:none;
  align-items:center;gap:10px;
  cursor:pointer;
  min-height:40px;
  flex-shrink:0;
  z-index:10;
}
.pin-bar.show{display:flex;}
.pin-icon{font-size:14px;flex-shrink:0;}
.pin-text{
  flex:1;
  font-size:12.5px;
  color:#5a4500;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  font-weight:600;
  line-height:1.4;
}
.pin-close{
  background:transparent;border:none;
  color:#7a6000;font-size:16px;
  cursor:pointer;padding:0 2px;
  flex-shrink:0;line-height:1;
  opacity:.7;
}
.pin-close:hover{opacity:1;}

/* SEARCH OVERLAY */
.search-overlay{
  position:fixed;
  top:0;bottom:0;
  left:50%;transform:translateX(-50%);
  width:100%;max-width:860px;
  z-index:8000;
  background:#ffffff;
  display:none;flex-direction:column;
  box-shadow:0 0 40px rgba(0,0,0,.12);
}
.search-overlay.open{display:flex;}
.search-header{
  display:flex;align-items:center;gap:10px;
  padding:12px 16px;
  border-bottom:1px solid var(--border);
  background:#fff;
  height:56px;flex-shrink:0;
}
.search-input{
  flex:1;border:none;outline:none;font-size:15px;
  font-family:var(--font);color:var(--text);background:transparent;
}
.search-input::placeholder{color:#aaa;}
.btn-close-search{background:transparent;border:none;font-size:18px;color:var(--muted);cursor:pointer;}
.search-results{
  flex:1;overflow-y:auto;padding:12px 16px;
  display:flex;flex-direction:column;gap:8px;
}
.search-result-item{
  padding:10px 14px;border-radius:12px;
  background:#f9f9f9;border:1px solid var(--border);
  cursor:pointer;transition:background .15s;
}
.search-result-item:hover{background:#f0f0f0;}
.search-result-sender{font-size:11px;font-weight:700;color:var(--accent);margin-bottom:3px;}
.search-result-text{font-size:13px;color:var(--text);line-height:1.4;}
.search-result-text mark{background:#fff3a3;border-radius:3px;padding:0 2px;}
.search-result-time{font-size:10px;color:var(--muted);margin-top:3px;}
.search-empty{text-align:center;color:var(--muted);font-size:13px;margin-top:40px;}

/* SWIPE TO REPLY */
.swipe-hint{
  position:absolute;top:50%;transform:translateY(-50%);
  font-size:18px;opacity:0;transition:opacity .15s;
  pointer-events:none;
}
.msg-wrapper.sent  .swipe-hint{left:-32px;}
.msg-wrapper.recv  .swipe-hint{right:-32px;}

/* READ RECEIPTS */
.tick-sent    {color:rgba(255,255,255,.6);}
.tick-delivered{color:rgba(255,255,255,.7);}
.tick-read    {color:#53bdeb;}
.msg-wrapper.recv .tick-read{color:var(--accent);}

.btn-hdr.search-btn{color:var(--muted);}

/* Emoji Reactions */
.reactions-bar{
  display:flex;flex-wrap:wrap;gap:4px;
  margin-top:3px;
  min-height:0;
  padding: 0 4px;
}
.reactions-bar:empty{ display:none; }
.reaction-chip{
  display:inline-flex;align-items:center;gap:3px;
  background:#f0f0f0;border:1px solid #e0e0e0;
  border-radius:12px;padding:2px 7px;
  font-size:13px;cursor:pointer;
  transition:background .15s,transform .1s;
  user-select:none;
}
.reaction-chip:hover{background:#e5e5e5;transform:scale(1.05);}
.reaction-chip.mine{background:#d4f0e8;border-color:#a8dccb;}
.reaction-chip .r-count{font-size:11px;color:#555;font-family:var(--font);}

/* picker popup */
.emoji-picker{
  position:fixed;
  background:#fff;
  border:1px solid #e5e5e5;
  border-radius:14px;
  box-shadow:0 8px 28px rgba(0,0,0,.13);
  padding:8px 10px;
  display:flex;gap:6px;
  z-index:6000;
  animation:ctxIn .15s ease;
}
@keyframes ctxIn{from{opacity:0;transform:scale(.92)}to{opacity:1;transform:scale(1)}}
.emoji-picker span{
  font-size:22px;cursor:pointer;
  padding:4px;border-radius:8px;
  transition:background .12s,transform .1s;
  line-height:1;
}
.emoji-picker span:hover{background:#f0f0f0;transform:scale(1.2);}
.empty-state{margin:auto;text-align:center;color:var(--muted)}

/* Reply preview bar */
.reply-preview-bar{
  position:fixed;bottom:64px;left:0;right:0;
  max-width:860px;margin:0 auto;
  background:#fdfdfd;border-top:1px solid var(--border);
  padding:4px 14px;display:none;align-items:center;justify-content:space-between;
  height:40px;z-index:1001;
}
#chat-screen.has-reply .reply-preview-bar{display:flex;}
.reply-preview-content{border-right:3px solid var(--accent);padding-right:8px;font-size:11.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;color:#666;}
.reply-preview-title{font-weight:700;font-size:10.5px;color:var(--accent);margin-bottom:1px;}
.btn-close-reply{background:transparent;border:none;color:var(--muted);font-size:14px;cursor:pointer;padding:0 4px;}

/* Typing */
.typing-bar{position:fixed;bottom:64px;left:0;right:0;max-width:860px;margin:0 auto;padding:2px 16px;font-size:11px;color:var(--muted);height:20px;display:flex;align-items:center;gap:6px;z-index:999;background:transparent;}
#chat-screen.has-reply .typing-bar{bottom:104px;}
.typing-dots{display:flex;gap:3px}
.typing-dots span{width:4px;height:4px;border-radius:50%;background:var(--muted);animation:tdot 1.1s infinite;}
.typing-dots span:nth-child(2){animation-delay:.18s}
.typing-dots span:nth-child(3){animation-delay:.36s}
@keyframes tdot{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-4px);opacity:1}}

.upload-bar{background:rgba(16,163,127,.12);padding:5px 16px;font-size:11px;color:var(--accent);font-weight:600;display:none;align-items:center;gap:8px;}
.upload-bar.show{display:flex}
.upload-spin{width:12px;height:12px;border-radius:50%;border:2px solid var(--accent);border-top-color:transparent;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}

/* INPUT AREA */
.input-area {
  position:fixed;
  bottom:0;left:0;right:0;
  max-width:860px;margin:0 auto;
  background:#ffffff;
  padding:10px 16px;
  padding-bottom:calc(10px + env(safe-area-inset-bottom));
  display:flex;
  gap:8px;
  align-items:flex-end;
  border-top:1px solid #e5e5e5;
  z-index:1000;
  flex-direction: row;
}

.btn-send {
  width:36px;height:36px;border:none;border-radius:9px;
  background:var(--accent);color:white;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
  order: 1;
}
.btn-send svg {
  width:16px;height:16px;fill:white;
  transform: scaleX(-1);
}

.input-wrap {
  flex:1;
  background:var(--input-bg);
  border-radius:14px;
  display:flex;
  align-items:flex-end;
  gap:4px;
  padding:8px 12px;
  border:1px solid #d9d9d9;
  min-height:44px;
  order: 2;
  flex-direction: row-reverse;
}
.msg-input {
  flex:1;border:none;outline:none;background:transparent;
  color:var(--text);font-size:14px;font-family:var(--font);
  resize:none;max-height:120px;
  text-align: right;
}
.btn-attach {
  border:none;background:transparent;color:var(--muted);
  cursor:pointer;font-size:18px;display:flex;
  align-items:center;justify-content:center;
  width:30px;height:30px;
}

.btn-voice {
  width:36px;height:36px;border:none;border-radius:50%;
  background:transparent;color:var(--muted);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;flex-shrink:0;font-size:18px;
  transition:background .15s,color .15s,transform .15s;
  order: 3;
}
.btn-voice:hover{background:#f0f0f0;color:var(--accent);}
.btn-voice.recording{
  background:#fee2e2;color:#ef4444;
  animation:recPulse 1s infinite;
}

.rec-timer{
  font-size:12px;color:#ef4444;font-weight:600;
  display:none;align-items:center;gap:5px;
  font-family:var(--font);
}
.rec-timer.show{display:flex;}
.rec-dot{width:7px;height:7px;border-radius:50%;background:#ef4444;animation:recPulse .8s infinite;}

.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#0d0d0d;color:#ffffff;padding:8px 18px;border-radius:10px;font-size:13px;opacity:0;transition:.3s;z-index:9999;}
.toast.show{opacity:1}

/* Image Preview */
.img-preview-wrap{
  position:fixed;inset:0;z-index:7000;
  background:#111;
  display:none;flex-direction:column;
}
.img-preview-wrap.open{display:flex;}
.img-preview-main{
  flex:1;display:flex;align-items:center;justify-content:center;
  overflow:hidden;padding:16px;min-height:0;
}
.img-preview-main img{max-width:100%;max-height:100%;object-fit:contain;border-radius:8px;}
.img-preview-strip{
  display:flex;gap:6px;padding:8px 12px;overflow-x:auto;
  background:rgba(0,0,0,.4);flex-shrink:0;
  -webkit-overflow-scrolling:touch;justify-content:center;
}
.img-preview-strip::-webkit-scrollbar{display:none;}
.prev-thumb{
  position:relative;width:56px;height:56px;
  border-radius:8px;overflow:hidden;border:2px solid transparent;
  cursor:pointer;flex-shrink:0;transition:border-color .15s;
}
.prev-thumb.active{border-color:#ffffff;}
.prev-thumb img{width:100%;height:100%;object-fit:cover;}
.prev-thumb .remove-thumb{
  position:absolute;top:2px;right:2px;
  width:18px;height:18px;border-radius:50%;
  background:rgba(0,0,0,.7);color:#fff;
  border:none;font-size:10px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
}
.img-preview-actions{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 16px;padding-bottom:calc(10px + env(safe-area-inset-bottom));
  background:rgba(0,0,0,.5);flex-shrink:0;
}
.img-preview-count{font-size:13px;color:rgba(255,255,255,.8);}
.img-preview-btns{display:flex;gap:10px;}
.btn-send-img{
  background:var(--accent);color:#fff;border:none;border-radius:10px;
  padding:10px 24px;font-size:14px;font-weight:700;font-family:var(--font);cursor:pointer;
}
.btn-cancel-img{
  background:rgba(255,255,255,.12);color:#fff;border:none;border-radius:10px;
  padding:10px 16px;font-size:14px;font-family:var(--font);cursor:pointer;
}

.upload-progress{
  position:fixed;bottom:64px;left:0;right:0;
  max-width:860px;margin:0 auto;height:3px;
  background:rgba(16,163,127,.2);z-index:1001;display:none;
}
.upload-progress-bar{height:100%;background:var(--accent);width:0%;transition:width .2s;border-radius:2px;}
.upload-progress.show{display:block;}

/* Voice message bubble */
.voice-msg{display:flex;align-items:center;gap:10px;min-width:200px;padding:2px 0;}
.btn-play-voice{
  width:36px;height:36px;border-radius:50%;border:none;
  background:rgba(255,255,255,.25);color:#fff;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:14px;flex-shrink:0;transition:background .15s;
}

.btn-play-voice:hover{background:rgba(255,255,255,.35);}
.voice-progress-wrap{flex:1;position:relative;height:28px;display:flex;align-items:center;}
.voice-waveform{width:100%;height:24px;cursor:pointer;display:flex;align-items:center;gap:2px;}
.voice-waveform span{display:inline-block;background:rgba(255,255,255,.6);border-radius:2px;width:3px;transition:background .15s;}
.msg-wrapper.recv .voice-waveform span{background:rgba(0,0,0,.25);}
.voice-waveform span.played{background:rgba(255,255,255,.95);}
.msg-wrapper.recv .voice-waveform span.played{background:var(--accent);}
.voice-duration{font-size:11px;color:rgba(255,255,255,.7);min-width:32px;text-align:left;}
.msg-wrapper.recv .voice-duration{color:#666;}
.img-modal{position:fixed;inset:0;z-index:9000;background:rgba(0,0,0,.88);display:none;align-items:center;justify-content:center;padding:20px;}
.img-modal.open{display:flex}
.img-modal img{max-width:100%;max-height:90vh;border-radius:8px;}
.img-modal-close{position:absolute;top:20px;right:20px;width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.15);border:none;color:white;font-size:20px;cursor:pointer;}
@keyframes bubbleIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
@keyframes floatHeart{
  0%  {opacity:1;transform:translateX(-50%) scale(1)   translateY(0)}
  60% {opacity:1;transform:translateX(-50%) scale(1.5) translateY(-24px)}
  100%{opacity:0;transform:translateX(-50%) scale(1.2) translateY(-40px)}
}
</style>

<body>
<div id="app">

<div id="login-screen" class="screen">
  <div class="login-wrap">
    <div class="login-card">
      <div class="brand">
        <div class="brand-name">Chat<span>BFT</span></div>
        <div class="brand-sub">محادثة فورية آمنة</div>
      </div>
      <div class="field">
        <label>الاسم</label>
        <input type="text" id="name-input" placeholder="أدخل اسمك" maxlength="20" autocomplete="off">
      </div>
      <div class="field">
        <label>رمز الغرفة</label>
        <input type="text" id="room-input" placeholder="مثال: room2024" maxlength="30" autocomplete="off" onkeydown="if(event.key==='Enter') joinRoom()">
        <div class="field-hint">شارك نفس الرمز مع الشخص الآخر</div>
      </div>
      <div class="error-msg" id="login-error"></div>
      <button class="btn-login" id="join-btn" onclick="joinRoom()">دخول الغرفة</button>

  </div>
</div>

<div id="chat-screen" class="screen hidden">
  <div class="chat-header">
    <div class="peer-avatar" id="peer-avatar">؟</div>
    <div class="header-info">
      <div class="header-room" id="header-room-id">الغرفة</div>
      <div class="header-sub">
        <div class="online-dot" id="online-dot"></div>
        <span id="peer-status">في انتظار الطرف الآخر...</span>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:6px;margin-right:auto">
      <div class="my-avatar-sm" id="my-avatar">ME</div>
    </div>
    <div class="header-actions">
      <button class="btn-hdr search-btn" onclick="openSearch()" title="بحث">🔍</button>
      <button class="btn-hdr clear" onclick="clearChat()">مسح</button>
      <button class="btn-hdr leave" onclick="leaveRoom()">خروج</button>
    </div>
  </div>

  <div class="pin-bar" id="pin-bar" onclick="scrollToPinned()">
    <span class="pin-icon">📌</span>
    <span class="pin-text" id="pin-text">رسالة مثبتة</span>
    <button class="pin-close" onclick="unpinMessage(event)">✕</button>
  </div>

  <div class="search-overlay" id="search-overlay">
    <div class="search-header">
      <button class="btn-close-search" onclick="closeSearch()">✕</button>
      <input class="search-input" id="search-input" placeholder="ابحث في الرسائل..." oninput="doSearch(this.value)" onkeydown="if(event.key==='Escape')closeSearch()" autocomplete="off">
      <span style="font-size:14px">🔍</span>
    </div>
    <div class="search-results" id="search-results">

  <div class="messages-wrap" style="position:relative;">
    <div class="messages-area" id="messages-area" onclick="if(document.activeElement===$('msg-input'))$('msg-input').blur()">

        <div style="font-size:40px;margin-bottom:8px;opacity:.3">💬</div>

  <div class="typing-bar" id="typing-bar"></div>
  <button class="btn-scroll-down" id="btn-scroll-down" onclick="scrollToBottom()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="6 9 12 15 18 9"></polyline>
    </svg>
    <span class="unread-badge" id="unread-badge">0</span>
  </button>

  <div class="reply-preview-bar" id="reply-preview-bar">
    <div class="reply-preview-content">
      <div class="reply-preview-title" id="reply-preview-sender">الرد على</div>
      <div id="reply-preview-text">نص الرسالة...</div>
    </div>
    <button class="btn-close-reply" onclick="cancelReply()">✕</button>
  </div>

  <div class="img-preview-wrap" id="img-preview-wrap">
    <div class="img-preview-main">
      <img id="img-preview-main-el" src="" alt="">
    </div>
    <div class="img-preview-strip" id="img-preview-strip"></div>
    <div class="img-preview-actions">
      <div class="img-preview-count" id="img-preview-count"></div>
      <div class="img-preview-btns">
        <button class="btn-cancel-img" onclick="cancelImgPreview()">إلغاء</button>
        <button class="btn-send-img"   onclick="confirmSendImage()">إرسال ✓</button>
      </div>
    </div>
  </div>

  <div class="upload-progress" id="upload-progress">
    <div class="upload-progress-bar" id="upload-progress-bar"></div>
  </div>

  <div class="input-area">
    <input type="file" id="file-chooser" accept="image/*,video/*,.pdf,.doc,.docx,.zip" class="hidden" multiple onchange="handleFileSelect(this)">
    
    <button class="btn-send" id="btn-send" onclick="sendMessage()">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>

    <div class="input-wrap">
      <button class="btn-attach" onclick="document.getElementById('file-chooser').click()" title="إرفاق ملف">📎</button>
      <textarea id="msg-input" class="msg-input" rows="1" placeholder="اكتب رسالة..." onkeydown="handleKey(event)" oninput="handleTyping(this)"></textarea>
      <div class="rec-timer" id="rec-timer">
        <div class="rec-dot"></div>
        <span id="rec-time">0:00</span>

</div>

<div class="toast" id="toast"></div>
<div class="img-modal" id="img-modal" onclick="closeImgModal()">
  <button class="img-modal-close">✕</button>
  <img id="modal-img" src="" alt="">
</div>
</div>

<script>
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyCqkSRiU0n0G4AFSJQCLCO-wqip6sKwCz0",
  authDomain: "syncchat-6e22b.firebaseapp.com",
  databaseURL: "https://syncchat-6e22b-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "syncchat-6e22b",
  storageBucket: "syncchat-6e22b.firebasestorage.app",
  messagingSenderId: "692797381468",
  appId: "1:692797381468:web:9faaed7bf44f0f527a3f99"
};

let db, storage;
let myName, myId, roomId;
let messagesRef, presenceRef, typingRef, roomPresenceGeneralRef;
let currentActivePeerRef = null;
let typingTimeout;
let peerTypingListener;
let isInitialLoad = true;
let currentReplyTarget = null;
let activeMessageKey = null; 
let inactivityTimeout;
let pinnedMsgKey   = null;
let pinnedMsgText  = '';
let allMessages    = {};   
const INACTIVITY_LIMIT = 2 * 60 * 1000;

const $   = id => document.getElementById(id);
const esc = s  => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const initials = n => n.trim().slice(0,2).toUpperCase();
const genId    = () => Math.random().toString(36).slice(2,10);
const fmt      = ts => new Date(ts).toLocaleTimeString('ar-EG',{hour:'2-digit',minute:'2-digit'});

function playNotificationSound() {
  if (document.visibilityState === 'visible') return;
  try {
    const AC = window.AudioContext || window.webkitAudioContext;
    if (!AC) return;
    const ctx = new AC();
    const osc = ctx.createOscillator(); const g = ctx.createGain();
    osc.type='sine'; osc.frequency.setValueAtTime(587.33, ctx.currentTime);
    g.gain.setValueAtTime(0.1, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime+0.15);
    osc.connect(g); g.connect(ctx.destination);
    osc.start(); osc.stop(ctx.currentTime+0.15);
  } catch(e){}
}

function startInactivityTimer() {
  resetInactivityTimer();
  ['mousemove','click','keydown','scroll','touchstart'].forEach(e => window.addEventListener(e, resetInactivityTimer, true));
}
function stopInactivityTimer() {
  clearTimeout(inactivityTimeout);
  ['mousemove','click','keydown','scroll','touchstart'].forEach(e => window.removeEventListener(e, resetInactivityTimer, true));
}
function resetInactivityTimer() {
  clearTimeout(inactivityTimeout);
  if (roomId) inactivityTimeout = setTimeout(leaveRoom, INACTIVITY_LIMIT);
}

function showToast(msg){ 
  const t=$('toast'); 
  t.textContent=msg; 
  t.classList.add('show'); 
  clearTimeout(window.toastTimeout);
  window.toastTimeout = setTimeout(()=>t.classList.remove('show'),2800); 
}
function openImgModal(src){ $('modal-img').src=src; $('img-modal').classList.add('open'); }
function closeImgModal(){ $('img-modal').classList.remove('open'); }
function initFirebase(){ if(!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG); db=firebase.database(); storage=firebase.storage(); }

async function joinRoom(){
  const name=$('name-input').value.trim();
  const room=$('room-input').value.trim().replace(/\s+/g,'');
  const err=$('login-error'); err.textContent='';
  if(!name){ err.textContent='من فضلك أدخل اسمك'; return; }
  if(!room){ err.textContent='من فضلك أدخل رمز الغرفة'; return; }
  const btn=$('join-btn'); btn.disabled=true; btn.textContent='جاري الدخول...';
  try{ initFirebase(); } catch(e){ err.textContent='خطأ في تهيئة Firebase'; btn.disabled=false; return; }

  myName=name; myId=genId(); roomId=room; isInitialLoad=true;
  messagesRef          = db.ref(`rooms/${roomId}/messages`);
  presenceRef          = db.ref(`rooms/${roomId}/presence/${myName}`);
  typingRef            = db.ref(`rooms/${roomId}/typing/${myId}`);
  roomPresenceGeneralRef = db.ref(`rooms/${roomId}/presence`);

  await presenceRef.set({ name:myName, online:true, joinedAt:Date.now() });
  presenceRef.onDisconnect().set({ name:myName, online:false, lastSeen:firebase.database.ServerValue.TIMESTAMP });
  typingRef.onDisconnect().remove();

  $('my-avatar').textContent    = initials(myName);
  $('header-room-id').textContent = 'غرفة: ' + roomId;

  setupListeners(); startInactivityTimer();
  $('login-screen').classList.add('hidden');
  $('chat-screen').classList.remove('hidden');
  setTimeout(initScrollButton, 100);
  await messagesRef.push({ type:'system', text:myName+' انضم إلى المحادثة', ts:Date.now() });
}

function setupListeners(){
  roomPresenceGeneralRef.on('value', snap => {
    const data  = snap.val() || {};
    const dot=$('online-dot'), txt=$('peer-status'), pav=$('peer-avatar');
    const peers = Object.entries(data).filter(([k, u]) => u && u.name && u.name !== myName);

    if (currentActivePeerRef) { currentActivePeerRef.off(); currentActivePeerRef=null; }
    if (peers.length === 0) {
      dot.classList.remove('on'); txt.textContent = 'في انتظار الطرف الآخر...'; pav.textContent = '؟'; return;
    }

    const onlinePeers  = peers.filter(([k,u]) => u.online === true);
    const offlinePeers = peers.filter(([k,u]) => u.online !== true);
    let chosen = onlinePeers.length > 0 
      ? onlinePeers.sort((a,b)=>(b[1].joinedAt||0)-(a[1].joinedAt||0))[0]
      : offlinePeers.sort((a,b)=>(b[1].lastSeen||0)-(a[1].lastSeen||0))[0];

    const [chosenKey, chosenUser] = chosen;
    pav.textContent = initials(chosenUser.name || '؟');

    currentActivePeerRef = db.ref(`rooms/${roomId}/presence/${chosenKey}`);
    currentActivePeerRef.on('value', pSnap => {
      const u = pSnap.val(); if (!u) return;
      pav.textContent = initials(u.name || '؟');
      if (u.online) {
        dot.classList.add('on'); txt.textContent = u.name + ' متصل الآن';
      } else {
        dot.classList.remove('on');
        const shortTime = u.lastSeen ? new Date(u.lastSeen).toLocaleTimeString('ar-EG',{hour:'2-digit',minute:'2-digit'}) : '';
        const shortDate = u.lastSeen ? new Date(u.lastSeen).toLocaleDateString('ar-EG',{day:'numeric',month:'numeric'}) : '';
        const isToday = u.lastSeen && new Date(u.lastSeen).toDateString() === new Date().toDateString();
        txt.textContent = u.lastSeen ? `آخر ظهور ${isToday ? shortTime : (shortDate + ' ' + shortTime)}` : u.name + ' غير متصل';
      }
    });
  });

  if (peerTypingListener) db.ref(`rooms/${roomId}/typing`).off('value', peerTypingListener);
  peerTypingListener = db.ref(`rooms/${roomId}/typing`).on('value', snap => {
    const data = snap.val() || {};
    const activePeer = Object.entries(data).find(([id, v]) => id !== myId && v === true);
    const bar = $('typing-bar');
    if (activePeer) {
      db.ref(`rooms/${roomId}/presence`).once('value', pSnap => {
        const pData = pSnap.val() || {}; const found = Object.values(pData).find(u => u.online && u.name !== myName);
        bar.innerHTML = `<div class="typing-dots"><span></span><span></span><span></span></div><span>${esc(found?found.name:'الطرف الآخر')} يكتب...</span>`;
      });
    } else { bar.innerHTML = ''; }
  });

  db.ref(`rooms/${roomId}/clearSignal`).on('value', snap => {
    if (!snap.exists()) return;
    const area = $('messages-area'); if (!area) return;
    area.innerHTML = `<div class="empty-state" id="empty-state"><div style="font-size:40px;margin-bottom:8px;opacity:.3">🗑️</div><p>تم مسح المحادثة</p></div>`;
  });

  messagesRef.once('value', () => { isInitialLoad=false; });
  messagesRef.on('child_added', snap => {
    const msg=snap.val(); appendMessage(msg, snap.key);
    if (!isInitialLoad && msg.type!=='system' && msg.senderName!==myName) {
      playNotificationSound(); markDelivered(snap.key, msg);
    }
  });

  db.ref(`rooms/${roomId}/readBy`).on('value', snap => {
    const data = snap.val() || {}; const peerRead = Object.entries(data).find(([id]) => id !== myId);
    if (peerRead) {
      document.querySelectorAll('.check-icon').forEach(el => {
        el.classList.remove('tick-sent','tick-delivered'); el.classList.add('tick-read'); el.textContent = '✓✓';
      });
    }
  });

  markAsRead();
  document.addEventListener('visibilitychange', () => { if (document.visibilityState === 'visible' && roomId) markAsRead(); });

  db.ref(`rooms/${roomId}/pinnedMsg`).on('value', snap => {
    const data = snap.val();
    if (data && data.key) {
      pinnedMsgKey = data.key; pinnedMsgText = data.text || 'رسالة مثبتة';
      $('pin-text').textContent = pinnedMsgText; $('pin-bar').classList.add('show');
      document.getElementById('chat-screen').classList.add('has-pin');
    } else {
      pinnedMsgKey = null; $('pin-bar').classList.remove('show');
      document.getElementById('chat-screen').classList.remove('has-pin');
    }
  });
}

function toggleMessageActions(key, event) {
  if (event) event.stopPropagation();
  const currentRow = document.getElementById(`msg-row-${key}`);
  const previousRow = activeMessageKey ? document.getElementById(`msg-row-${activeMessageKey}`) : null;

  if (previousRow && activeMessageKey !== key) previousRow.classList.remove('active-actions');

  if (activeMessageKey === key) {
    if (currentRow) currentRow.classList.remove('active-actions'); activeMessageKey = null;
  } else {
    if (currentRow) currentRow.classList.add('active-actions'); activeMessageKey = key;
  }
}

document.addEventListener('click', () => {
  if (activeMessageKey) {
    const currentRow = document.getElementById(`msg-row-${activeMessageKey}`);
    if (currentRow) currentRow.classList.remove('active-actions'); activeMessageKey = null;
  }
});

function markAsRead() { if (roomId && myId) db.ref(`rooms/${roomId}/readBy/${myId}`).set(Date.now()); }
function markDelivered(key, msg) { if (key && msg.senderName !== myName) { const tick = document.getElementById('tick-' + key); if (tick) { tick.textContent = '✓✓'; tick.classList.add('tick-delivered'); } } }

function initiateReply(senderName, text, targetKey = null) {
  currentReplyTarget = { senderName, text, key: targetKey };
  $('reply-preview-sender').textContent = `الرد على ${senderName}`;
  $('reply-preview-text').textContent   = text || '[ملف / ميديا]';
  $('chat-screen').classList.add('has-reply'); $('msg-input').focus();
}
function cancelReply() { currentReplyTarget = null; $('chat-screen').classList.remove('has-reply'); }

function appendMessage(msg, key){
  const area=$('messages-area'); const empty=$('empty-state'); if(empty) empty.remove();
  const div=document.createElement('div');

  if (key && msg.type !== 'system') allMessages[key] = msg;

  if (msg.type==='system') {
    div.className='system-msg'; div.textContent=msg.text;
  } else {
    const sent = msg.senderName === myName;
    div.className = 'msg-wrapper ' + (sent?'sent':'recv');
    div.setAttribute('data-key', key);

    let mediaHtml = '';
    if (msg.fileUrl) {
      if (msg.fileType === 'audio' || (msg.fileType && msg.fileType.startsWith('audio/'))) {
        const dur = msg.voiceDuration || 0; const mm = Math.floor(dur/60), ss = dur%60;
        const bars = Array.from({length:28}, (_,i) => `<span style="height:${6 + Math.floor(Math.abs(Math.sin(i*0.7))*18)}px"></span>`).join('');
        mediaHtml = `<div class="voice-msg" data-url="${esc(msg.fileUrl)}">
          <button class="btn-play-voice" onclick="toggleVoicePlay(this, event)">▶</button>
          <div class="voice-progress-wrap"><div class="voice-waveform">${bars}</div></div>
          <span class="voice-duration">${mm}:${String(ss).padStart(2,'0')}</span>
        </div>`;
      } else if (msg.fileType && msg.fileType.startsWith('image/')) {
        mediaHtml = `<img src="${esc(msg.fileUrl)}" class="chat-image" loading="lazy">`;
      } else {
        mediaHtml = `<a href="${esc(msg.fileUrl)}" target="_blank" class="file-attachment">
          <span style="font-size:18px">📄</span>
          <div><div style="font-size:12px;font-weight:700">${esc(msg.fileName||'ملف')}</div><div style="font-size:10px;opacity:.7">${(msg.fileName||'').split('.').pop().toUpperCase()}</div></div>
        </a>`;
      }
    }

    const senderNameHtml = !sent ? `<div class="msg-sender-name">${esc(msg.senderName||'')}</div>` : '';
    let replyHtml = '';
    if (msg.replyTo) {
      replyHtml = `<div class="reply-quotation" data-targetkey="${esc(msg.replyTo.key || '')}">
        <div class="reply-quotation-sender">${esc(msg.replyTo.senderName)}</div>
        <span class="reply-quotation-text">${esc((msg.replyTo.text||'[ملف / ميديا]').slice(0,60))}</span>
      </div>`;
    }

    const escapedText = msg.text ? msg.text.replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/"/g, '&quot;').replace(/\n/g, '\\n') : '';

    // بناء الأزرار السريعة بداخل متغير نصي لحماية دالة الدخول
    const actionsGroupHtml = `
      <div class="msg-actions-group" onclick="event.stopPropagation()">
        <button class="msg-action-btn" onclick="initiateReply('${esc(msg.senderName)}', '${escapedText}', '${key}')" title="رد">↩</button>
        ${msg.text ? `<button class="msg-action-btn" onclick="copyToClipboard('${escapedText}', event)" title="نسخ">📋</button>` : ''}
        <button class="msg-action-btn" onclick="pinnedMsgKey==='${key}' ? unpinMessage(event) : pinMessage('${key}', '${escapedText}', event)" title="تثبيت">📌</button>
      </div>`;

    div.innerHTML = `
      <div class="msg-row" data-key="${key}" id="msg-row-${key}">
        <div class="msg-bubble-wrap">
          ${senderNameHtml}
          <div class="msg-bubble" onclick="toggleMessageActions('${key}', event)">
            ${replyHtml}
            ${mediaHtml}
            ${msg.text ? `<span class="actual-msg-text">${esc(msg.text)}</span>` : ''}
            <span class="msg-meta" id="meta-${key}">${fmt(msg.ts)}${sent?` <span class="check-icon tick-sent" id="tick-${key}">✓</span>`:''}</span>
          </div>
          <div class="reactions-bar" data-msgkey="${key}"></div>
        </div>
        ${actionsGroupHtml}
      </div>`;

    const imgEl = div.querySelector('.chat-image'); if (imgEl) imgEl.addEventListener('click', () => openImgModal(msg.fileUrl));
    const quoteEl = div.querySelector('.reply-quotation'); if (quoteEl) quoteEl.addEventListener('click', e => { e.stopPropagation(); const tk = quoteEl.dataset.targetkey; if (tk) jumpToMsg(tk); });

    // ميزة السحب للرد Swipe to Reply
    const msgRow = div.querySelector('.msg-row');
    if (msgRow) {
      let startX = 0, startY = 0, swiping = false;
      msgRow.addEventListener('touchstart', e => { startX = e.touches[0].clientX; startY = e.touches[0].clientY; swiping = false; }, {passive:true});
      msgRow.addEventListener('touchmove', e => {
        const dx = e.touches[0].clientX - startX; const dy = Math.abs(e.touches[0].clientY - startY); if (dy > 12) return;
        if ((sent && dx > 0) || (!sent && dx < 0)) { if (Math.abs(dx) > 8) { swiping = true; msgRow.style.transform = `translateX(${Math.min(dx, 60)}px)`; } }
      }, {passive:true});
      msgRow.addEventListener('touchend', () => {
        const val = parseInt(msgRow.style.transform.replace(/[^0-9-]/g,''))||0; msgRow.style.transform = '';
        if (swiping && Math.abs(val) >= 40) initiateReply(msg.senderName, msg.text||'', key);
      }, {passive:true});
    }

    const bubble = div.querySelector('.msg-bubble');
    if (bubble) {
      bubble.addEventListener('dblclick', e => {
        e.preventDefault(); bubble.classList.add('tapped'); setTimeout(() => bubble.classList.remove('tapped'), 250);
        quickReact(key, '❤️', bubble);
      });
    }
  }

  area.appendChild(div);
  if (isAtBottom) { requestAnimationFrame(() => { area.scrollTop = area.scrollHeight; }); }
  else if (!isInitialLoad) { unreadCount++; updateBadge(); $('btn-scroll-down').classList.add('show'); }

  if (key) db.ref(`rooms/${roomId}/reactions/${key}`).on('value', snap => renderReactions(key, snap.val() || {}));
}

async function sendMessage(){
  const input=$('msg-input'); const text=input.value.trim(); if (!text && !currentReplyTarget) return; if (!messagesRef) return;
  input.value=''; input.style.height='auto'; clearTypingNow(); setTimeout(() => input.focus(), 50);

  const payload = { type:'message', text, senderId:myId, senderName:myName, ts:Date.now() };
  if (currentReplyTarget) { payload.replyTo=currentReplyTarget; cancelReply(); }
  try { await messagesRef.push(payload); } catch(e) { showToast('فشل الإرسال ❌'); input.value=text; }
}

let pendingFiles = [];
function handleFileSelect(input) {
  const files = Array.from(input.files); if (!files.length) return; input.value = '';
  files.filter(f => !f.type.startsWith('image/')).forEach(f => uploadAndSend(f));
  const images = files.filter(f => f.type.startsWith('image/'));
  if (images.length > 0) { pendingFiles = [...pendingFiles, ...images]; renderPreviewWA(0); $('img-preview-wrap').classList.add('open'); }
}

let activePreviewIdx = 0;
function renderPreviewWA(focusIdx) {
  if (focusIdx !== undefined) activePreviewIdx = focusIdx;
  activePreviewIdx = Math.min(activePreviewIdx, pendingFiles.length - 1);
  const strip = $('img-preview-strip'); const mainImg = $('img-preview-main-el'); const count = $('img-preview-count'); strip.innerHTML = '';

  const r0 = new FileReader(); r0.onload = e => { mainImg.src = e.target.result; }; r0.readAsDataURL(pendingFiles[activePreviewIdx]);

  pendingFiles.forEach((file, idx) => {
    const thumb = document.createElement('div'); thumb.className = 'prev-thumb' + (idx === activePreviewIdx ? ' active' : '');
    const img = document.createElement('img'); const r = new FileReader(); r.onload = e => { img.src = e.target.result; }; r.readAsDataURL(file);
    const btn = document.createElement('button'); btn.className = 'remove-thumb'; btn.textContent = '✕';
    btn.onclick = e => { e.stopPropagation(); pendingFiles.splice(idx, 1); if (pendingFiles.length === 0) { cancelImgPreview(); return; } renderPreviewWA(Math.min(idx, pendingFiles.length - 1)); };
    thumb.appendChild(img); thumb.appendChild(btn); strip.appendChild(thumb); thumb.addEventListener('click', () => renderPreviewWA(idx));
  });

  strip.style.display = pendingFiles.length > 1 ? 'flex' : 'none';
  count.textContent = pendingFiles.length > 1 ? `${activePreviewIdx + 1} / ${pendingFiles.length}` : '';
}

function cancelImgPreview() { pendingFiles = []; activePreviewIdx = 0; $('img-preview-wrap').classList.remove('open'); }
async function confirmSendImage() { if (!pendingFiles.length) return; $('img-preview-wrap').classList.remove('open'); const toSend = [...pendingFiles]; pendingFiles = []; for (const f of toSend) await uploadAndSend(f); }

const CLOUDINARY_CLOUD = 'db03wdg7v'; const CLOUDINARY_PRESET = 'ekk7u3hb';
async function uploadAndSend(file) {
  const bar = $('upload-bar'); const prog = $('upload-progress'); const progBar = $('upload-progress-bar');
  bar.classList.add('show'); prog.classList.add('show'); progBar.style.width = '0%';
  try {
    const url = await uploadToCloudinary(file, pct => { progBar.style.width = pct + '%'; });
    const payload = { type:'message', text:'', fileUrl: url, fileName: file.name, fileType: file.type, senderId: myId, senderName: myName, ts: Date.now() };
    if (currentReplyTarget) { payload.replyTo=currentReplyTarget; cancelReply(); }
    await messagesRef.push(payload); showToast('تم الإرسال ✅');
  } catch(e) { showToast('فشل الرفع ❌'); } finally { bar.classList.remove('show'); prog.classList.remove('show'); }
}

function uploadToCloudinary(file, onProgress) {
  return new Promise((resolve, reject) => {
    const fd = new FormData(); fd.append('file', file); fd.append('upload_preset', CLOUDINARY_PRESET); fd.append('folder', `chatbft/${roomId}`);
    const rt = file.type.startsWith('video/') ? 'video' : file.type.startsWith('image/') ? 'image' : 'raw';
    const xhr = new XMLHttpRequest(); xhr.open('POST', `https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD}/${rt}/upload`);
    xhr.upload.onprogress = e => { if (e.lengthComputable) onProgress(Math.round(e.loaded/e.total*100)); };
    xhr.onload = () => { if (xhr.status === 200) resolve(JSON.parse(xhr.responseText).secure_url); else reject(new Error('Upload failed')); };
    xhr.onerror = () => reject(new Error('Network error')); xhr.send(fd);
  });
}

let mediaRecorder = null; let audioChunks = []; let recInterval = null; let recSeconds = 0;
async function toggleVoiceRecord() { if (mediaRecorder && mediaRecorder.state === 'recording') stopRecording(); else startRecording(); }
async function startRecording() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    const mt = MediaRecorder.isTypeSupported('audio/webm;codecs=opus') ? 'audio/webm;codecs=opus' : MediaRecorder.isTypeSupported('audio/mp4') ? 'audio/mp4' : 'audio/webm';
    mediaRecorder = new MediaRecorder(stream, { mimeType: mt }); audioChunks = []; recSeconds = 0;
    mediaRecorder.ondataavailable = e => { if(e.data.size > 0) audioChunks.push(e.data); };
    mediaRecorder.onstop = async () => { stream.getTracks().forEach(t => t.stop()); const blob = new Blob(audioChunks, { type: mt }); await uploadVoice(blob, mt); };
    mediaRecorder.start(200); $('btn-voice').classList.add('recording'); $('btn-voice').textContent = '⏹'; $('rec-timer').classList.add('show'); $('msg-input').style.display = 'none';
    recInterval = setInterval(() => { recSeconds++; const m = Math.floor(recSeconds/60), s = recSeconds % 60; $('rec-time').textContent = m + ':' + String(s).padStart(2,'0'); if (recSeconds >= 120) stopRecording(); }, 1000);
  } catch(e) { showToast('تعذر الوصول للميكروفون ❌'); }
}
function stopRecording() { if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop(); clearInterval(recInterval); $('btn-voice').classList.remove('recording'); $('btn-voice').textContent = '🎤'; $('rec-timer').classList.remove('show'); $('msg-input').style.display = ''; }
async function uploadVoice(blob, mt) {
  const name = `voice_${genId()}.${mt.includes('mp4')?'mp4':'webm'}`; const bar = $('upload-bar'); bar.classList.add('show');
  try {
    const file = new File([blob], name, { type: mt }); const url = await uploadToCloudinary(file, () => {});
    const payload = { type:'message', text:'', fileUrl: url, fileName: name, fileType:'audio', voiceDuration: recSeconds, senderId:myId, senderName:myName, ts:Date.now() };
    if (currentReplyTarget) { payload.replyTo=currentReplyTarget; cancelReply(); }
    await messagesRef.push(payload); showToast('تم إرسال الرسالة الصوتية ✅');
  } catch(e) { showToast('فشل رفع الصوت ❌'); } finally { bar.classList.remove('show'); }
}

function handleTyping(el){ el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,130)+'px'; resetInactivityTimer(); if(!typingRef) return; typingRef.set(true); clearTimeout(typingTimeout); typingTimeout=setTimeout(clearTypingNow, 2000); }
function clearTypingNow(){ clearTimeout(typingTimeout); if(typingRef) typingRef.set(false); }
function handleKey(e){ if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); sendMessage(); } }

async function toggleReaction(msgKey, emoji) { try { const ref = db.ref(`rooms/${roomId}/reactions/${msgKey}/${emoji}/${myId}`); if ((await ref.once('value')).exists()) await ref.remove(); else await ref.set(myName); } catch(e){} }
async function quickReact(msgKey, emoji, bubbleEl) {
  try {
    const ref = db.ref(`rooms/${roomId}/reactions/${msgKey}/${emoji}/${myId}`); const adding = !(await ref.once('value')).exists();
    if (adding) await ref.set(myName); else await ref.remove();
    if (adding && bubbleEl) {
      const h = document.createElement('span'); h.textContent = emoji; h.style.cssText = `position:absolute;font-size:28px;pointer-events:none;z-index:999;animation:floatHeart .7s ease forwards;left:50%;transform:translateX(-50%);bottom:0;`;
      bubbleEl.style.position = 'relative'; bubbleEl.appendChild(h); setTimeout(() => h.remove(), 700);
    }
  } catch(e){}
}

function renderReactions(msgKey, data) {
  const bar = document.querySelector('[data-msgkey="' + msgKey + '"]'); if (!bar) return; bar.innerHTML = '';
  if (!data || Object.keys(data).length === 0) return;
  Object.entries(data).forEach(([emoji, users]) => {
    if (!users || typeof users !== 'object') return; const uids = Object.keys(users); const count = uids.length; if (count === 0) return;
    const chip = document.createElement('div'); chip.className = 'reaction-chip' + (uids.includes(myId) ? ' mine' : ''); chip.title = Object.values(users).join('، ');
    chip.innerHTML = `<span>${emoji}</span>${count > 1 ? '<span class="r-count">' + count + '</span>' : ''}`;
    chip.addEventListener('click', e => { e.stopPropagation(); toggleReaction(msgKey, emoji); }); bar.appendChild(chip);
  });
}

let currentAudio = null, currentPlayBtn = null;
function toggleVoicePlay(btn, event) {
  if(event) event.stopPropagation(); const voiceMsg = btn.closest('.voice-msg'); const url = voiceMsg.dataset.url; const bars = voiceMsg.querySelectorAll('.voice-waveform span'); const durEl = voiceMsg.querySelector('.voice-duration');
  if (currentAudio && !currentAudio.paused) { if (currentPlayBtn === btn) { currentAudio.pause(); btn.textContent = '▶'; return; } else { currentAudio.pause(); currentAudio = null; if (currentPlayBtn) currentPlayBtn.textContent = '▶'; } }
  const audio = new Audio(url); currentAudio = audio; currentPlayBtn = btn; btn.textContent = '⏸';
  audio.ontimeupdate = () => {
    const idx = Math.floor((audio.duration ? audio.currentTime / audio.duration : 0) * bars.length); bars.forEach((b,i) => b.classList.toggle('played', i < idx));
    const rem = audio.duration - audio.currentTime; if (!isNaN(rem)) { const m = Math.floor(rem/60), s = Math.floor(rem%60); durEl.textContent = m + ':' + String(s).padStart(2,'0'); }
  };
  audio.onended = () => { btn.textContent = '▶'; bars.forEach(b => b.classList.remove('played')); currentAudio = null; currentPlayBtn = null; const tot = audio.duration||0; durEl.textContent = Math.floor(tot/60) + ':' + String(Math.floor(tot%60)).padStart(2,'0'); };
  audio.play().catch(() => { btn.textContent = '▶'; });
}

async function pinMessage(key, text, event) { if(event) event.stopPropagation(); try { await db.ref(`rooms/${roomId}/pinnedMsg`).set({ key, text: (text||'رسالة').slice(0,80), by: myName }); showToast('تم تثبيت الرسالة 📌'); if(activeMessageKey) toggleMessageActions(activeMessageKey); } catch(e){} }
async function unpinMessage(e) { if (e) { e.preventDefault(); e.stopPropagation(); } try { await db.ref(`rooms/${roomId}/pinnedMsg`).remove(); showToast('تم إلغاء التثبيت'); } catch(e){} }
function scrollToPinned() { if (pinnedMsgKey) jumpToMsg(pinnedMsgKey); }

function openSearch() { $('search-overlay').classList.add('open'); setTimeout(() => $('search-input').focus(), 100); }
function closeSearch() { $('search-overlay').classList.remove('open'); $('search-input').value = ''; $('search-results').innerHTML = '<div class="search-empty">اكتب للبحث في الرسائل</div>'; }
function doSearch(q) {
  const res = $('search-results'); q = (q||'').trim(); if (!q) { res.innerHTML = '<div class="search-empty">اكتب للبحث في الرسائل</div>'; return; }
  const matches = Object.entries(allMessages).filter(([, m]) => m.text && m.text.toLowerCase().includes(q.toLowerCase())).reverse().slice(0, 40);
  if (!matches.length) { res.innerHTML = '<div class="search-empty">لا توجد نتائج لـ "' + esc(q) + '"</div>'; return; }
  res.innerHTML = matches.map(([key, m]) => `<div class="search-result-item" onclick="jumpToMsg('${key}');closeSearch()"><div class="search-result-sender">${esc(m.senderName||'')}</div><div class="search-result-text">${esc(m.text).replace(new RegExp(esc(q), 'gi'), s => `<mark>${s}</mark>`)}</div><div class="search-result-time">${fmt(m.ts)}</div></div>`).join('');
}

function jumpToMsg(key) {
  if (!key) return; const el = document.querySelector(`[data-key="${key}"]`); if (!el) { showToast('الرسالة غير موجودة حالياً'); return; }
  el.scrollIntoView({ behavior: 'smooth', block: 'center' }); const b = el.querySelector('.msg-bubble');
  if (b) { b.style.outline = '2px solid var(--accent)'; b.style.boxShadow = '0 0 12px rgba(16, 163, 127, 0.4)'; setTimeout(() => { b.style.outline = ''; b.style.boxShadow = ''; }, 1800); }
}

// دالة النسخ المُصلحة والمضمونة للرسائل الكبيرة والمقسّمة
function copyToClipboard(text, event) {
  if (event) event.stopPropagation();
  if (!text) return;
  
  // فك تشفير السطور المكسورة للرسائل الكبيرة
  const cleanText = text.replace(/\\n/g, '\n').replace(/\\'/g, "'");

  if (navigator.clipboard && window.isSecureContext) {
    navigator.clipboard.writeText(cleanText)
      .then(() => { showToast('تم نسخ نص الرسالة بنجاح 📋'); if(activeMessageKey) toggleMessageActions(activeMessageKey); })
      .catch(() => fallbackCopyText(cleanText));
  } else {
    fallbackCopyText(cleanText);
  }
}

function fallbackCopyText(text) {
  const ta = document.createElement('textarea'); ta.value = text;
  ta.style.position = 'fixed'; ta.style.top = '0'; ta.style.left = '0'; ta.style.width = '2em'; ta.style.height = '2em'; ta.style.padding = '0';
  ta.style.border = 'none'; ta.style.outline = 'none'; ta.style.boxShadow = 'none'; ta.style.background = 'transparent';
  document.body.appendChild(ta); ta.focus(); ta.select();
  try {
    if (document.execCommand('copy')) showToast('تم نسخ نص الرسالة بنجاح 📋');
    else showToast('عذراً، فشل نسخ الرسالة ❌');
  } catch (err) {
    showToast('عذراً، المتصفح لا يدعم النسخ ❌');
  }
  document.body.removeChild(ta);
  if(activeMessageKey) toggleMessageActions(activeMessageKey);
}

let unreadCount = 0, isAtBottom = true;
function initScrollButton() {
  const area = $('messages-area'); if (!area) return;
  area.addEventListener('scroll', () => {
    isAtBottom = (area.scrollHeight - area.scrollTop - area.clientHeight) < 60;
    if (isAtBottom) { $('btn-scroll-down').classList.remove('show'); unreadCount = 0; updateBadge(); } else { $('btn-scroll-down').classList.add('show'); }
  }, { passive: true });
}
function scrollToBottom() { const area = $('messages-area'); if (area) area.scrollTo({ top: area.scrollHeight, behavior: 'smooth' }); unreadCount = 0; updateBadge(); $('btn-scroll-down').classList.remove('show'); }
function updateBadge() { const badge = $('unread-badge'); if (unreadCount > 0) { badge.textContent = unreadCount > 99 ? '99+' : unreadCount; $('btn-scroll-down').classList.add('add-unread'); } else { $('btn-scroll-down').classList.remove('add-unread'); } }

async function clearChat(){
  if(!confirm('سيتم حذف الرسائل للجميع، هل أنت متأكد؟')) return;
  try { await db.ref(`rooms/${roomId}/clearSignal`).set({ by: myName, ts: Date.now() }); await db.ref(`rooms/${roomId}/messages`).remove(); showToast('تم مسح المحادثة للجميع 🗑️'); } catch(e){}
}

async function leaveRoom(){
  stopInactivityTimer(); clearTypingNow(); cancelReply();
  try {
    if(messagesRef) await messagesRef.push({ type:'system', text:myName+' غادر المحادثة', ts:Date.now() });
    await presenceRef.set({ name:myName, online:false, lastSeen:firebase.database.ServerValue.TIMESTAMP });
    await typingRef.remove(); if(currentActivePeerRef) currentActivePeerRef.off(); if(roomPresenceGeneralRef) roomPresenceGeneralRef.off();
    db.ref(`rooms/${roomId}/typing`).off(); db.ref(`rooms/${roomId}/clearSignal`).off(); db.ref(`rooms/${roomId}/reactions`).off(); db.ref(`rooms/${roomId}/readBy`).off(); db.ref(`rooms/${roomId}/pinnedMsg`).off();
    allMessages = {}; if(peerTypingListener) db.ref(`rooms/${roomId}/typing`).off('value',peerTypingListener); messagesRef.off();
  } catch(e){}
  myName=myId=roomId=null; messagesRef=presenceRef=typingRef=roomPresenceGeneralRef=null;
  $('messages-area').innerHTML='<div class="empty-state" id="empty-state"><div style="font-size:40px;margin-bottom:8px;opacity:.3">💬</div><p>ابدأ المحادثة الآن</p></div>';
  $('typing-bar').innerHTML=''; $('name-input').value=''; $('room-input').value=''; $('join-btn').disabled=false; $('join-btn').textContent='دخول الغرفة';
  $('msg-input').value=''; $('msg-input').style.height='auto'; $('chat-screen').classList.add('hidden'); $('login-screen').classList.remove('hidden');
}
</script>
