<!DOCTYPE html>

<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
<title>SyncChat Pro</title>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
/* ══════════════════════════════════════════
   RESET & TOKENS — ChatGPT Dark Theme
══════════════════════════════════════════ */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}

:root{
  --bg:            #212121;
  --bg-chat:       #212121;
  --surface:       #2f2f2f;
  --surface2:      #3a3a3a;
  --border:        #3f3f3f;
  --border2:       #4a4a4a;
  --accent:        #10a37f;
  --accent-hover:  #0d8f6f;
  --text:          #ececec;
  --text-2:        #c5c5c5;
  --muted:         #8e8ea0;
  --danger:        #ef4444;
  --sent-bg:       #2f2f2f;
  --recv-bg:       #2f2f2f;
  --header-bg:     #212121;
  --input-bg:      #2f2f2f;
  --shadow-sm:     0 1px 3px rgba(0,0,0,.3);
  --shadow-md:     0 4px 16px rgba(0,0,0,.4);
  --shadow-lg:     0 12px 40px rgba(0,0,0,.5);
  --font:          'Cairo', sans-serif;
}

html,body{width:100%;height:100vh;height:100dvh;overflow:hidden;font-family:var(--font);background:var(--bg);color:var(--text)}

.chat-wallpaper{display:none}

#app{width:100%;height:100%;display:flex;align-items:center;justify-content:center}
.screen{width:100%;height:100%;overflow:hidden}
.hidden{display:none!important}

/* ══════════════════════════════════════════
   LOGIN SCREEN
══════════════════════════════════════════ */
#login-screen{
  display:flex;align-items:center;justify-content:center;
  background:#212121;padding:20px;overflow-y:auto;
}

.login-wrap{width:100%;max-width:380px;animation:loginIn .4s cubic-bezier(.22,1,.36,1)}
@keyframes loginIn{
  from{opacity:0;transform:translateY(20px)}
  to{opacity:1;transform:translateY(0)}
}

.login-card{
  background:#212121;
  border:1px solid var(--border);
  border-radius:16px;
  padding:32px 28px 28px;
  box-shadow:none;
}

/* Brand */
.brand{text-align:center;margin-bottom:28px}
.brand-icon{
  width:64px;height:64px;margin:0 auto 12px;
  background:var(--accent);
  border-radius:16px;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 6px 20px rgba(16,163,127,.3);
}
.brand-icon svg{width:32px;height:32px;fill:white}
.brand-name{font-size:22px;font-weight:700;color:var(--text)}
.brand-name span{color:var(--accent)}
.brand-sub{font-size:12px;color:var(--muted);margin-top:3px}

/* Fields */
.field{margin-bottom:14px}
.field label{display:block;font-size:11px;font-weight:600;color:var(--muted);margin-bottom:6px;letter-spacing:.5px;text-transform:uppercase}
.field input{
  width:100%;
  background:#2f2f2f;
  border:1px solid var(--border);
  border-radius:10px;
  padding:11px 14px;
  color:var(--text);
  font-size:14px;
  font-family:var(--font);
  outline:none;
  transition:border-color .2s,box-shadow .2s;
}
.field input:focus{border-color:var(--accent);box-shadow:0 0 0 2px rgba(16,163,127,.15)}
.field input::placeholder{color:#555}

.field-hint{font-size:11px;color:var(--muted);margin-top:4px}

.btn-login{
  width:100%;border:none;border-radius:10px;
  padding:12px;margin-top:6px;
  background:var(--accent);
  color:white;font-size:14px;font-weight:700;
  font-family:var(--font);cursor:pointer;
  transition:background .2s,transform .15s;
}
.btn-login:hover{background:var(--accent-hover)}
.btn-login:active{transform:scale(.99)}
.btn-login:disabled{opacity:.5;cursor:not-allowed}

.error-msg{min-height:18px;color:var(--danger);font-size:12px;margin-bottom:8px;text-align:center;font-weight:500}

/* ══════════════════════════════════════════
   CHAT SCREEN
══════════════════════════════════════════ */
#chat-screen{
  display:flex;flex-direction:column;
  height:100%;max-width:860px;margin:0 auto;
  background:#212121;
  position:relative;
}

/* ── HEADER ── */
.chat-header{
  position:relative;z-index:100;
  background:var(--header-bg);
  border-bottom:none;
  height:56px;
  display:flex;align-items:center;gap:10px;
  padding:0 14px;
  flex-shrink:0;
}

.peer-avatar{
  width:36px;height:36px;border-radius:50%;
  background:var(--accent);
  display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:700;color:white;
  flex-shrink:0;
}
.my-avatar-sm{
  width:28px;height:28px;border-radius:50%;
  background:#2f2f2f;
  border:1px solid var(--border2);
  display:flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:700;color:var(--text-2);
  flex-shrink:0;
}

.header-info{flex:1;min-width:0}
.header-room{font-size:14px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.header-sub{font-size:11px;color:var(--muted);margin-top:1px;display:flex;align-items:center;gap:5px}
.online-dot{
  width:6px;height:6px;border-radius:50%;
  background:var(--muted);flex-shrink:0;
  transition:background .3s,box-shadow .3s;
}
.online-dot.on{background:#10a37f;box-shadow:0 0 5px rgba(16,163,127,.5)}

.header-actions{display:flex;gap:5px}
.btn-hdr{
  border:1px solid var(--border);
  border-radius:7px;
  padding:5px 10px;
  cursor:pointer;font-size:11px;font-weight:600;
  font-family:var(--font);
  background:transparent;
  transition:all .2s;
}
.btn-hdr.clear{color:var(--muted)}
.btn-hdr.clear:hover{border-color:var(--border2);color:var(--text)}
.btn-hdr.leave{color:var(--danger);border-color:rgba(239,68,68,.3)}
.btn-hdr.leave:hover{background:rgba(239,68,68,.1)}

/* ── MESSAGES WRAP ── */
.messages-wrap{flex:1;position:relative;overflow:hidden;background:#212121}

/* ── MESSAGES ── */
.messages-area{
  position:absolute;inset:0;
  overflow-y:auto;
  padding:16px 16px 8px;
  display:flex;flex-direction:column;gap:1px;
  -webkit-overflow-scrolling:touch;
  scroll-behavior:smooth;
}
.messages-area::-webkit-scrollbar{width:5px}
.messages-area::-webkit-scrollbar-track{background:transparent}
.messages-area::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

/* date divider */
.date-divider{
  align-self:center;
  background:#212121;
  border:1px solid var(--border);
  padding:3px 12px;border-radius:20px;
  font-size:11px;color:var(--muted);
  margin:10px 0 6px;
}

/* bubble wrapper */
.msg-wrapper{
  display:flex;
  margin-bottom:2px;
  animation:bubbleIn .22s ease;
}
@keyframes bubbleIn{
  from{opacity:0;transform:translateY(6px) scale(.98)}
  to{opacity:1;transform:translateY(0) scale(1)}
}
.msg-wrapper.sent{justify-content:flex-end}
.msg-wrapper.recv{justify-content:flex-start}

/* bubble */
.msg-bubble-wrap{max-width:78%}

.msg-name{
  font-size:11px;font-weight:600;
  color:var(--accent);
  margin-bottom:3px;padding-right:4px;
}
.msg-wrapper.sent .msg-name{color:#53bdeb;text-align:left;padding-left:4px;padding-right:0}

.msg-bubble{
  padding:9px 14px 22px;
  border-radius:var(--radius-bubble);
  font-size:14.5px;line-height:1.55;
  word-break:break-word;white-space:pre-wrap;
  position:relative;
}

/* ── MSG WRAPPERS ── */
.msg-wrapper{
  display:flex;
  margin-bottom:2px;
  animation:bubbleIn .18s ease;
  padding:0 10px;
}
@keyframes bubbleIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.msg-wrapper.sent{justify-content:flex-end}
.msg-wrapper.recv{justify-content:flex-start}

/* hide avatar & name — WhatsApp style */
.msg-row{display:flex;max-width:78%}
.msg-av{display:none}
.msg-bubble-wrap{display:flex;flex-direction:column}
.msg-wrapper.sent .msg-bubble-wrap{align-items:flex-end}
.msg-name{display:none}  /* ← مخفي زي واتس */

/* ── BUBBLE — WhatsApp compact ── */
.msg-bubble{
  padding:5px 10px 14px;   /* bottom يحجز مكان للوقت */
  border-radius:8px;
  font-size:14px;
  line-height:1.45;
  word-break:break-word;
  white-space:pre-wrap;
  position:relative;
  max-width:100%;
}
.msg-bubble.sent{
  background:#2a5298;      /* أزرق داكن للمرسل */
  color:#ffffff;
  border-bottom-left-radius:2px;
  border:none;
}
.msg-bubble.recv{
  background:#212121;
  color:var(--text);
  border-bottom-right-radius:2px;
  border:none;
}

/* time — absolute في الأسفل زي واتس بالظبط */
.msg-meta{
  position:absolute;
  bottom:3px;
  left:8px;
  font-size:10px;
  color:rgba(255,255,255,.55);
  display:flex;align-items:center;gap:3px;
  line-height:1;
}
.msg-wrapper.sent .msg-meta{left:auto;right:8px;color:rgba(255,255,255,.6)}
.msg-wrapper.recv .msg-meta{color:var(--muted)}
.check-icon{font-size:10px}

/* image */
.chat-image{
  max-width:100%;max-height:200px;
  border-radius:10px;display:block;
  cursor:pointer;margin-bottom:3px;
  transition:opacity .2s;
}
.chat-image:hover{opacity:.9}

/* file attachment */
.file-attachment{
  display:flex;align-items:center;gap:8px;
  background:rgba(255,255,255,.05);
  padding:8px 10px;border-radius:10px;
  text-decoration:none;color:var(--accent);
  font-weight:600;font-size:12px;
  border:1px solid var(--border);
  margin-bottom:3px;transition:background .2s;
}
.file-attachment:hover{background:rgba(255,255,255,.08)}
.file-icon{font-size:18px;flex-shrink:0}

/* system message */
.system-msg{
  align-self:center;
  background:#212121;
  border:1px solid var(--border);
  padding:4px 14px;border-radius:20px;
  color:var(--muted);font-size:11px;
  margin:8px 0;
}

/* empty state */
.empty-state{margin:auto;text-align:center;color:var(--muted)}
.empty-state .es-icon{font-size:40px;margin-bottom:8px;opacity:.35}
.empty-state p{font-size:13px}

/* ── TYPING ── */
.typing-bar{
  padding:2px 16px 4px;
  font-size:11px;color:var(--muted);
  height:22px;display:flex;align-items:center;gap:6px;
  flex-shrink:0;
}
.typing-dots{display:flex;gap:3px}
.typing-dots span{
  width:4px;height:4px;border-radius:50%;
  background:var(--muted);animation:tdot 1.1s infinite;
}
.typing-dots span:nth-child(2){animation-delay:.18s}
.typing-dots span:nth-child(3){animation-delay:.36s}
@keyframes tdot{
  0%,60%,100%{transform:translateY(0);opacity:.4}
  30%{transform:translateY(-4px);opacity:1}
}

/* ── UPLOAD BAR ── */
.upload-bar{
  background:rgba(16,163,127,.12);
  border-top:1px solid rgba(16,163,127,.2);
  padding:5px 16px;
  font-size:11px;color:var(--accent);font-weight:600;
  display:none;align-items:center;gap:8px;flex-shrink:0;
}
.upload-bar.show{display:flex}
.upload-spin{
  width:12px;height:12px;border-radius:50%;
  border:2px solid var(--accent);border-top-color:transparent;
  animation:spin .7s linear infinite;flex-shrink:0;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── INPUT AREA — ChatGPT style ── */
.input-area{
  background:#212121;
  padding:10px 16px;
  padding-bottom:calc(10px + env(safe-area-inset-bottom));
  display:flex;gap:8px;align-items:flex-end;
  flex-shrink:0;
  border-top:1px solid var(--border);
}

.input-wrap{
  flex:1;
  background:var(--input-bg);
  border-radius:14px;
  display:flex;align-items:flex-end;gap:4px;
  padding:8px 12px 8px 8px;
  border:1px solid var(--border2);
  transition:border-color .2s,box-shadow .2s;
  min-height:44px;
}
.input-wrap:focus-within{
  border-color:var(--accent);
  box-shadow:0 0 0 2px rgba(16,163,127,.12);
}

.btn-attach{
  width:30px;height:30px;
  border:none;background:transparent;
  color:var(--muted);cursor:pointer;font-size:18px;
  display:flex;align-items:center;justify-content:center;
  border-radius:8px;flex-shrink:0;
  transition:background .15s,color .15s;
  align-self:flex-end;margin-bottom:1px;
}
.btn-attach:hover{background:var(--surface2);color:var(--text)}

.msg-input{
  flex:1;border:none;outline:none;
  background:transparent;color:var(--text);
  font-size:14px;font-family:var(--font);
  resize:none;line-height:1.5;
  max-height:120px;align-self:flex-end;padding:2px 0;
}
.msg-input::placeholder{color:#555}

/* send button — ChatGPT style: square rounded */
.btn-send{
  width:36px;height:36px;
  border:none;border-radius:9px;
  background:var(--accent);
  color:white;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
  transition:background .2s,transform .15s;
}
.btn-send:hover{background:var(--accent-hover)}
.btn-send:active{transform:scale(.94)}
.btn-send svg{width:16px;height:16px;fill:white;transform:rotate(180deg)}

/* ── TOAST ── */
.toast{
  position:fixed;bottom:80px;left:50%;
  transform:translateX(-50%) translateY(8px);
  background:var(--surface2);color:var(--text);
  border:1px solid var(--border2);
  padding:8px 18px;border-radius:10px;
  font-size:13px;font-weight:500;
  opacity:0;transition:.3s;
  pointer-events:none;white-space:nowrap;z-index:9999;
  box-shadow:0 6px 20px rgba(0,0,0,.3);
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── MODAL IMAGE ── */
.img-modal{
  position:fixed;inset:0;z-index:9000;
  background:rgba(0,0,0,.88);
  display:none;align-items:center;justify-content:center;
  padding:20px;
}
.img-modal.open{display:flex}
.img-modal img{max-width:100%;max-height:90vh;border-radius:8px;box-shadow:0 20px 60px rgba(0,0,0,.6)}
.img-modal-close{
  position:absolute;top:20px;right:20px;
  width:36px;height:36px;border-radius:50%;
  background:rgba(255,255,255,.15);border:none;
  color:white;font-size:20px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
}
</style>

</head>
<body>
<div id="app">

<!-- ══════ LOGIN ══════ -->

<div id="login-screen" class="screen">
  <div class="login-wrap">
    <div class="login-card">
      <div class="brand">
        <div class="brand-icon">
          <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-2 12H6v-2h12v2zm0-3H6V9h12v2zm0-3H6V6h12v2z"/></svg>
        </div>
        <div class="brand-name">Sync<span>Chat</span></div>
        <div class="brand-sub">محادثة فورية آمنة</div>
      </div>

  <div class="field">
    <label>الاسم</label>
    <input type="text" id="name-input" placeholder="أدخل اسمك" maxlength="20" autocomplete="off">
  </div>
  <div class="field">
    <label>رمز الغرفة</label>
    <input type="text" id="room-input" placeholder="مثال: room2024" maxlength="30" autocomplete="off"
      onkeydown="if(event.key==='Enter') joinRoom()">
    <div class="field-hint">شارك نفس الرمز مع الشخص الآخر</div>
  </div>

  <div class="error-msg" id="login-error"></div>
  <button class="btn-login" id="join-btn" onclick="joinRoom()">دخول الغرفة</button>
</div>


  </div>
</div>

<!-- ══════ CHAT ══════ -->

<div id="chat-screen" class="screen hidden">

  <div class="chat-header">
    <div class="peer-avatar" id="peer-avatar">؟</div>
    <div class="header-info">
      <div class="header-room" id="header-room-id">الغرفة</div>
      <div class="header-sub">
        <div class="online-dot" id="online-dot"></div>
        <span id="peer-status">في انتظار الطرف الآخر...</span>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:6px;margin-right:auto">
      <div class="my-avatar-sm" id="my-avatar">ME</div>
    </div>
    <div class="header-actions">
      <button class="btn-hdr clear" onclick="clearChat()">مسح</button>
      <button class="btn-hdr leave" onclick="leaveRoom()">خروج</button>
    </div>
  </div>

  <div class="upload-bar" id="upload-bar">
    <div class="upload-spin"></div>
    <span>جاري رفع الملف...</span>
  </div>

  <div class="messages-wrap">
    <div class="chat-wallpaper"></div>
    <div class="messages-area" id="messages-area">
      <div class="empty-state" id="empty-state">
        <div class="es-icon">💬</div>
        <p>ابدأ المحادثة الآن</p>
      </div>
    </div>
  </div>

  <div class="typing-bar" id="typing-bar"></div>

  <div class="input-area">
    <input type="file" id="file-chooser" class="hidden" onchange="handleFileSelect(this)">
    <div class="input-wrap">
      <button class="btn-attach" title="إرفاق ملف"
        onclick="document.getElementById('file-chooser').click()">
        📎
      </button>
      <textarea
        id="msg-input"
        class="msg-input"
        rows="1"
        placeholder="اكتب رسالة..."
        onkeydown="handleKey(event)"
        oninput="handleTyping(this)"
      ></textarea>
    </div>
    <button class="btn-send" onclick="sendMessage()" title="إرسال">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- Image lightbox -->

<div class="img-modal" id="img-modal" onclick="closeImgModal()">
  <button class="img-modal-close">✕</button>
  <img id="modal-img" src="" alt="">
</div>

</div><!-- /app -->

<script>
/* ══════════════════════════════════════════
   🔥 FIREBASE CONFIG — ضع بياناتك هنا
══════════════════════════════════════════ */
const FIREBASE_CONFIG = {
apiKey: "AIzaSyCqkSRiU0n0G4AFSJQCLCO-wqip6sKwCz0",
  authDomain: "syncchat-6e22b.firebaseapp.com",
  databaseURL: "https://syncchat-6e22b-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "syncchat-6e22b",
  storageBucket: "syncchat-6e22b.firebasestorage.app",
  messagingSenderId: "692797381468",
  appId: "1:692797381468:web:9faaed7bf44f0f527a3f99",
  measurementId: "G-ZMN7S10M2R"
};
/* ══════════════════════════════════════════ */

let db, storage;
let myName, myId, roomId;
let messagesRef, presenceRef, typingRef;
let typingTimeout;
let peerTypingListener;

const $  = id => document.getElementById(id);
const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const initials = n => n.trim().slice(0,2).toUpperCase();
const genId    = () => Math.random().toString(36).slice(2,10);
const fmt      = ts => new Date(ts).toLocaleTimeString('ar-EG',{hour:'2-digit',minute:'2-digit'});
const fmtFull  = ts => new Date(ts).toLocaleDateString('ar-EG',{day:'numeric',month:'long'}) + ' - ' + fmt(ts);

/* ── toast ── */
function showToast(msg){
  const t=$('toast'); t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2800);
}

/* ── image modal ── */
function openImgModal(src){$('modal-img').src=src;$('img-modal').classList.add('open')}
function closeImgModal(){$('img-modal').classList.remove('open')}

/* ── init firebase ── */
function initFirebase(){
  if(!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
  db      = firebase.database();
  storage = firebase.storage();
}

/* ══════════════════════════════════════════
   JOIN ROOM
══════════════════════════════════════════ */
async function joinRoom(){
  const name = $('name-input').value.trim();
  const room = $('room-input').value.trim().replace(/\s+/g,'');
  const err  = $('login-error');
  err.textContent='';

  if(!name){ err.textContent='من فضلك أدخل اسمك'; return; }
  if(!room){ err.textContent='من فضلك أدخل رمز الغرفة'; return; }

  const btn=$('join-btn');
  btn.disabled=true; btn.textContent='جاري الدخول...';

  try{ initFirebase(); }
  catch(e){ err.textContent='خطأ في تهيئة Firebase'; btn.disabled=false; btn.textContent='دخول الغرفة'; return; }

  myName=name; myId=genId(); roomId=room;

  messagesRef = db.ref(`rooms/${roomId}/messages`);
  presenceRef = db.ref(`rooms/${roomId}/presence/${myId}`);
  typingRef   = db.ref(`rooms/${roomId}/typing/${myId}`);

  await presenceRef.set({ name:myName, online:true, joinedAt:Date.now() });
  presenceRef.onDisconnect().set({ name:myName, online:false, lastSeen:firebase.database.ServerValue.TIMESTAMP });
  typingRef.onDisconnect().remove();

  $('my-avatar').textContent   = initials(myName);
  $('peer-avatar').textContent = '؟';
  $('header-room-id').textContent = 'غرفة: ' + roomId;

  setupListeners();

  $('login-screen').classList.add('hidden');
  $('chat-screen').classList.remove('hidden');

  await messagesRef.push({ type:'system', text: myName+' انضم إلى المحادثة', ts:Date.now() });
}

/* ══════════════════════════════════════════
   REALTIME LISTENERS
══════════════════════════════════════════ */
function setupListeners(){
  /* Presence */
  db.ref(`rooms/${roomId}/presence`).on('value', snap=>{
    const data  = snap.val()||{};
    const peers = Object.entries(data).filter(([id])=>id!==myId);
    const dot=$('online-dot'), txt=$('peer-status'), pav=$('peer-avatar');

    if(peerTypingListener){ db.ref(`rooms/${roomId}/typing`).off('value',peerTypingListener); }

    if(peers.length>0){
      const [peerId, peer] = peers[peers.length-1];
      pav.textContent = initials(peer.name||'؟');

      if(peer.online){
        dot.classList.add('on');
        txt.textContent = peer.name+' متصل الآن';
        /* typing for this peer */
        peerTypingListener = db.ref(`rooms/${roomId}/typing/${peerId}`).on('value', tSnap=>{
          const bar=$('typing-bar');
          if(tSnap.val()===true){
            bar.innerHTML=`<div class="typing-dots"><span></span><span></span><span></span></div><span>${esc(peer.name)} يكتب...</span>`;
          } else { bar.innerHTML=''; }
        });
      } else {
        dot.classList.remove('on');
        const last = peer.lastSeen ? fmtFull(peer.lastSeen) : '';
        txt.textContent = last ? `آخر ظهور: ${last}` : peer.name+' غير متصل';
      }
    } else {
      dot.classList.remove('on');
      txt.textContent='في انتظار الطرف الآخر...';
      pav.textContent='؟';
    }
  });

  /* Messages */
  messagesRef.on('child_added', snap=>{ appendMessage(snap.val()); });

  /* Detect full clear */
  messagesRef.on('value', snap=>{
    if(!snap.exists()){
      $('messages-area').innerHTML=`<div class="empty-state" id="empty-state"><div class="es-icon">🗑️</div><p>تم مسح المحادثة</p></div>`;
    }
  });
}

/* ══════════════════════════════════════════
   RENDER MESSAGE
══════════════════════════════════════════ */
function appendMessage(msg){
  const area=$('messages-area');
  const empty=$('empty-state');
  if(empty) empty.remove();

  const div=document.createElement('div');

  if(msg.type==='system'){
    div.className='system-msg';
    div.textContent=msg.text;
  } else {
    const sent = msg.senderId===myId;
    div.className='msg-wrapper '+(sent?'sent':'recv');

    let mediaHtml='';
    if(msg.fileUrl){
      if(msg.fileType && msg.fileType.startsWith('image/')){
        mediaHtml=`<img src="${esc(msg.fileUrl)}" class="chat-image" onclick="openImgModal('${esc(msg.fileUrl)}')" loading="lazy">`;
      } else {
        const ext=(msg.fileName||'ملف').split('.').pop().toUpperCase();
        mediaHtml=`<a href="${esc(msg.fileUrl)}" target="_blank" class="file-attachment">
          <span class="file-icon">📄</span>
          <div><div style="font-size:12px;font-weight:700">${esc(msg.fileName||'ملف')}</div><div style="font-size:10px;opacity:.7">${ext}</div></div>
        </a>`;
      }
    }

    div.innerHTML=`
      <div class="msg-row">
        <div class="msg-av ${sent?'sent':'recv'}">${esc(initials(msg.senderName||myName||'?'))}</div>
        <div class="msg-bubble-wrap">
          <div class="msg-name">${sent?'أنت':esc(msg.senderName||'')}</div>
          <div class="msg-bubble ${sent?'sent':'recv'}">
            ${mediaHtml}
            ${msg.text ? `<span>${esc(msg.text)}</span>` : ''}
            <span class="msg-meta">${fmt(msg.ts)}${sent?' <span class="check-icon">✓✓</span>':''}</span>
          </div>
        </div>
      </div>`;
  }

  area.appendChild(div);
  requestAnimationFrame(()=>{ area.scrollTop=area.scrollHeight; });
}

/* ══════════════════════════════════════════
   SEND
══════════════════════════════════════════ */
async function sendMessage(){
  const input=$('msg-input');
  const text=input.value.trim();
  if(!text||!messagesRef) return;
  input.value=''; input.style.height='auto';
  clearTypingNow();
  try{
    await messagesRef.push({
      type:'message', text, senderId:myId, senderName:myName, ts:Date.now()
    });
  } catch(e){ showToast('فشل الإرسال ❌'); input.value=text; }
}

/* ══════════════════════════════════════════
   FILE UPLOAD
══════════════════════════════════════════ */
async function handleFileSelect(input){
  const file=input.files[0]; if(!file) return;
  const bar=$('upload-bar'); bar.classList.add('show');
  try{
    const ref=storage.ref(`rooms/${roomId}/${genId()}_${file.name}`);
    const snap=await ref.put(file);
    const url=await snap.ref.getDownloadURL();
    await messagesRef.push({
      type:'message', text:'', fileUrl:url,
      fileName:file.name, fileType:file.type,
      senderId:myId, senderName:myName, ts:Date.now()
    });
    showToast('تم الإرسال ✅');
  } catch(e){ showToast('فشل الرفع ❌'); }
  finally{ bar.classList.remove('show'); input.value=''; }
}

/* ══════════════════════════════════════════
   TYPING
══════════════════════════════════════════ */
function handleTyping(el){
  el.style.height='auto';
  el.style.height=Math.min(el.scrollHeight,130)+'px';
  if(!typingRef) return;
  typingRef.set(true);
  clearTimeout(typingTimeout);
  typingTimeout=setTimeout(clearTypingNow, 2000);
}
function clearTypingNow(){
  clearTimeout(typingTimeout);
  if(typingRef) typingRef.set(false);
}

function handleKey(e){
  if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); sendMessage(); }
}

/* ══════════════════════════════════════════
   CLEAR / LEAVE
══════════════════════════════════════════ */
async function clearChat(){
  if(!confirm('سيتم حذف الرسائل للجميع، هل أنت متأكد؟')) return;
  try{ await db.ref(`rooms/${roomId}/messages`).remove(); showToast('تم مسح المحادثة 🗑️'); }
  catch(e){ showToast('فشل الحذف ❌'); }
}

async function leaveRoom(){
  clearTypingNow();
  try{
    if(messagesRef) await messagesRef.push({ type:'system', text:myName+' غادر المحادثة', ts:Date.now() });
    await presenceRef.set({ name:myName, online:false, lastSeen:firebase.database.ServerValue.TIMESTAMP });
    await typingRef.remove();
    db.ref(`rooms/${roomId}/presence`).off();
    db.ref(`rooms/${roomId}/typing`).off();
    messagesRef.off();
  } catch(e){}

  myName=myId=roomId=null;
  messagesRef=presenceRef=typingRef=null;
  $('messages-area').innerHTML=`<div class="empty-state" id="empty-state"><div class="es-icon">💬</div><p>ابدأ المحادثة الآن</p></div>`;
  $('typing-bar').innerHTML='';
  $('name-input').value=''; $('room-input').value='';
  $('login-error').textContent='';
  $('join-btn').disabled=false; $('join-btn').textContent='دخول الغرفة';
  $('msg-input').value=''; $('msg-input').style.height='auto';
  $('chat-screen').classList.add('hidden');
  $('login-screen').classList.remove('hidden');
}
</script>
