<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
<title>ChatBFT</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --accent:#10a37f; --accent-h:#0d8f6f;
  --bg:#fff; --surface:#f4f4f4; --border:#e5e5e5; --border2:#d9d9d9;
  --text:#0d0d0d; --text2:#353535; --muted:#6e6e80; --danger:#ef4444;
  --sent:#10a37f; --recv:#f1f1f1; --font:'Cairo',sans-serif;
}
html,body{width:100%;height:100dvh;overflow:hidden;font-family:var(--font);background:#fff;color:var(--text)}
#app{width:100%;height:100%;display:flex;align-items:stretch}
.screen{width:100%;height:100%;overflow:hidden}
.hidden{display:none!important}

/* ── LOGIN ── */
#login-screen{display:flex;align-items:center;justify-content:center;background:#fff;padding:20px;overflow-y:auto;height:100%}
.login-wrap{width:100%;max-width:380px;animation:fadeUp .4s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.login-card{background:#fff;border:1px solid var(--border);border-radius:16px;padding:32px 28px 28px}
.brand{text-align:center;margin-bottom:28px}
.brand-name{font-size:26px;font-weight:700}
.brand-name span{color:var(--accent)}
.brand-sub{font-size:12px;color:var(--muted);margin-top:4px}
.field{margin-bottom:14px}
.field label{display:block;font-size:11px;font-weight:600;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.field input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:11px 14px;color:var(--text);font-size:14px;font-family:var(--font);outline:none}
.field input:focus{border-color:var(--accent);box-shadow:0 0 0 2px rgba(16,163,127,.15)}
.field-hint{font-size:11px;color:var(--muted);margin-top:4px}
.btn-login{width:100%;border:none;border-radius:10px;padding:12px;margin-top:6px;background:var(--accent);color:#fff;font-size:14px;font-weight:700;font-family:var(--font);cursor:pointer}
.btn-login:hover{background:var(--accent-h)}
.error-msg{min-height:18px;color:var(--danger);font-size:12px;margin-bottom:8px;text-align:center;font-weight:500}

/* ── CHAT SCREEN ── */
#chat-screen{max-width:860px;margin:0 auto;background:#fff;height:100dvh;display:flex;flex-direction:column;overflow:hidden;position:relative}

/* header */
.chat-header{background:#fff;border-bottom:1px solid var(--border);height:56px;min-height:56px;display:flex;align-items:center;gap:10px;padding:0 14px;z-index:100;flex-shrink:0}
.peer-avatar{width:36px;height:36px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;flex-shrink:0}
.my-avatar-sm{width:28px;height:28px;border-radius:50%;background:var(--surface);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--text2);flex-shrink:0}
.header-info{flex:1;min-width:0}
.header-room{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.header-sub{font-size:11px;color:var(--muted);display:flex;align-items:center;gap:5px;margin-top:1px}
#peer-status{flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.online-dot{width:6px;height:6px;border-radius:50%;background:var(--muted);flex-shrink:0}
.online-dot.on{background:var(--accent);box-shadow:0 0 5px rgba(16,163,127,.5)}
.header-actions{display:flex;gap:5px}
.btn-hdr{border:1px solid var(--border);border-radius:7px;padding:5px 10px;cursor:pointer;font-size:11px;font-weight:600;font-family:var(--font);background:transparent}
.btn-hdr.clear{color:var(--muted)}
.btn-hdr.leave{color:var(--danger);border-color:rgba(239,68,68,.3)}
.btn-hdr.search-btn{color:var(--muted)}
.btn-hdr.call-btn{color:#fff; background: var(--accent); border-color: var(--accent);}

/* pin bar */
.pin-bar{background:#fffbea;border-bottom:1.5px solid #f0d060;border-right:4px solid var(--accent);padding:8px 14px;display:none;align-items:center;gap:10px;cursor:pointer;min-height:40px;flex-shrink:0}
.pin-bar.show{display:flex}
.pin-icon{font-size:14px;flex-shrink:0}
.pin-text{flex:1;font-size:12.5px;color:#5a4500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:600}
.pin-close{background:transparent;border:none;color:#7a6000;font-size:16px;cursor:pointer;opacity:.7}
.pin-close:hover{opacity:1}

/* search overlay */
.search-overlay{position:fixed;top:0;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:860px;z-index:8000;background:#fff;display:none;flex-direction:column}
.search-overlay.open{display:flex}
.search-header{display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:1px solid var(--border);height:56px;flex-shrink:0}
.search-input{flex:1;border:none;outline:none;font-size:15px;font-family:var(--font);color:var(--text);background:transparent}
.search-input::placeholder{color:#aaa}
.btn-close-search{background:transparent;border:none;font-size:18px;color:var(--muted);cursor:pointer}
.search-results{flex:1;overflow-y:auto;padding:12px 16px;display:flex;flex-direction:column;gap:8px}
.search-result-item{padding:10px 14px;border-radius:12px;background:var(--surface);border:1px solid var(--border);cursor:pointer}
.search-result-item:hover{background:#ececec}
.search-result-sender{font-size:11px;font-weight:700;color:var(--accent);margin-bottom:3px}
.search-result-text{font-size:13px;color:var(--text);line-height:1.4}
.search-result-text mark{background:#fff3a3;border-radius:3px;padding:0 2px}
.search-result-time{font-size:10px;color:var(--muted);margin-top:3px}
.search-empty{text-align:center;color:var(--muted);font-size:13px;margin-top:40px}

/* messages */
.messages-wrap{flex:1;position:relative;overflow:hidden;background:#fff;min-height:0;margin-bottom:64px}
#chat-screen.has-reply .messages-wrap{margin-bottom:108px}
.messages-area{width:100%;height:100%;overflow-y:auto;padding:12px 12px 8px;display:flex;flex-direction:column;gap:3px;-webkit-overflow-scrolling:touch;overscroll-behavior:contain}
.messages-area::-webkit-scrollbar{width:3px}
.messages-area::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* system msg */
.system-msg{align-self:center;background:var(--surface);border:1px solid var(--border);padding:4px 14px;border-radius:20px;color:var(--muted);font-size:11px;margin:6px 0;display:flex;align-items:center;gap:6px}
.system-msg-ts{font-size:10px;opacity:.6}
.empty-state{margin:auto;text-align:center;color:var(--muted)}

/* msg bubble */
.msg-wrapper{display:flex;width:100%;animation:fadeUp .18s ease}
.msg-wrapper.sent { justify-content: flex-start; }
.msg-wrapper.recv { justify-content: flex-end; }
.msg-row{display:flex;max-width:78%;width:auto;position:relative;transition:transform .15s cubic-bezier(0.1, 0.8, 0.3, 1)}
.msg-wrapper.sent .msg-row{flex-direction:row}
.msg-wrapper.recv .msg-row{flex-direction:row-reverse}
.msg-bubble-wrap{display:flex;flex-direction:column;width:auto}
.msg-sender-name{font-size:11px;font-weight:600;color:var(--accent);margin-bottom:2px;padding:0 4px}

/* reply quotation inside bubble */
.reply-quotation{
background:rgba(0,0,0,.06);border-right:3px solid var(--accent);
padding:4px 8px;border-radius:6px;margin-bottom:5px;
font-size:11px;color:#4f4f4f;cursor:pointer;
transition:background .15s;
}
.reply-quotation:hover{background:rgba(0,0,0,.1)}
.msg-wrapper.sent .reply-quotation{background:rgba(255,255,255,.18);border-right-color:#fff;color:rgba(255,255,255,.85)}
.msg-wrapper.sent .reply-quotation:hover{background:rgba(255,255,255,.25)}
.reply-quotation-sender{font-weight:700;font-size:10px;margin-bottom:1px;color:var(--accent)}
.msg-wrapper.sent .reply-quotation-sender{color:#fff}
.reply-quotation-text{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:220px;display:block;font-size:11px}

/* فقاعة الرسالة طبيعية ومرنة */
.msg-bubble{
padding:8px 12px 18px; border-radius:12px; font-size:14px; line-height:1.4;
word-break:break-word; white-space:pre-wrap; position:relative;
display:flex; flex-direction:column; max-width:100%; min-width:85px; height:auto;
-webkit-user-select:none; user-select:none; -webkit-touch-callout:none;
}
.msg-wrapper.sent .msg-bubble{background:var(--sent);color:#fff;border-bottom-right-radius:3px}
.msg-wrapper.recv .msg-bubble{background:var(--recv);color:var(--text);border-bottom-left-radius:3px}
.actual-msg-text{display:block; padding-bottom:2px;}
.msg-meta{position:absolute;bottom:3px;right:8px;font-size:10px;color:rgba(255,255,255,.7);display:flex;align-items:center;gap:3px;white-space:nowrap;pointer-events:none}
.msg-wrapper.recv .msg-meta{color:var(--muted);right:auto;left:8px}
.tick-sent{color:rgba(255,255,255,.6)}
.tick-delivered{color:rgba(255,255,255,.8)}
.tick-read{color:#53bdeb}

/* تليجرام أنيميشن للإيموجي المنفرد */
.telegram-emoji {
  animation: telegramBounce 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
  display: inline-block;
  font-size: 42px !important;
  line-height: 1 !important;
  padding: 4px 8px !important;
}
@keyframes telegramBounce {
  0% { transform: scale(0.3); opacity: 0; }
  50% { transform: scale(1.1); }
  70% { transform: scale(0.9); }
  100% { transform: scale(1); opacity: 1; }
}

/* ميديا */
.chat-image, .chat-video{max-width:100%;max-height:220px;border-radius:10px;display:block;cursor:pointer;margin-bottom:3px;outline:none}
.file-attachment{display:flex;align-items:center;gap:8px;background:rgba(0,0,0,.06);padding:8px 10px;border-radius:10px;text-decoration:none;color:var(--accent);font-weight:600;font-size:12px;border:1px solid rgba(0,0,0,.08);margin-bottom:3px}
.msg-wrapper.sent .file-attachment{background:rgba(255,255,255,.15);color:#fff;border-color:rgba(255,255,255,.2)}

/* voice */
.voice-msg{display:flex;align-items:center;gap:8px;min-width:180px;padding:2px 0}
.btn-play-voice{width:32px;height:32px;border-radius:50%;border:none;background:rgba(255,255,255,.25);color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:13px;flex-shrink:0}
.msg-wrapper.recv .btn-play-voice{background:rgba(0,0,0,.1);color:#333}
.voice-waveform{flex:1;height:24px;display:flex;align-items:center;gap:2px;cursor:pointer}
.voice-waveform span{display:inline-block;background:rgba(255,255,255,.5);border-radius:2px;width:3px;transition:background .1s}
.msg-wrapper.recv .voice-waveform span{background:rgba(0,0,0,.2)}
.voice-waveform span.played{background:rgba(255,255,255,.95)}
.msg-wrapper.recv .voice-waveform span.played{background:var(--accent)}
.voice-duration{font-size:11px;color:rgba(255,255,255,.7);min-width:30px}
.msg-wrapper.recv .voice-duration{color:var(--muted)}

/* reactions */
.reactions-bar{display:flex;flex-wrap:wrap;gap:3px;margin-top:3px;padding:0 2px}
.reactions-bar:empty{display:none}
.reaction-chip{display:inline-flex;align-items:center;gap:2px;background:#f0f0f0;border:1px solid #e0e0e0;border-radius:12px;padding:2px 6px;font-size:12px;cursor:pointer;transition:background .1s}
.reaction-chip:hover{background:#e5e5e5}
.reaction-chip.mine{background:#d4f0e8;border-color:#a8dccb}
.r-count{font-size:10px;color:#555}

/* msg actions group */
.msg-actions-group{
display:none;align-self:center;flex-direction:column;gap:3px;
background:#fff;border:1px solid var(--border);border-radius:10px;
padding:4px;box-shadow:0 2px 10px rgba(0,0,0,.1);flex-shrink:0;
position:relative;z-index:10;
}
.msg-wrapper.sent .msg-actions-group{margin-left:6px}
.msg-wrapper.recv .msg-actions-group{margin-right:6px}
.msg-row.active-actions .msg-actions-group{display:flex}
.msg-action-btn{background:transparent;border:none;cursor:pointer;font-size:14px;padding:3px 5px;border-radius:6px;line-height:1;transition:background .1s}
.msg-action-btn:hover{background:var(--surface)}

/* typing */
.typing-bar{position:fixed;bottom:64px;left:0;right:0;max-width:860px;margin:0 auto;padding:2px 16px;font-size:12px;color:var(--accent);font-weight:bold;height:20px;display:flex;align-items:center;gap:6px;z-index:998;pointer-events:none}
.typing-dots{display:flex;gap:3px}
.typing-dots span{width:4px;height:4px;border-radius:50%;background:var(--accent);animation:tdot 1.1s infinite}
.typing-dots span:nth-child(2){animation-delay:.18s}
.typing-dots span:nth-child(3){animation-delay:.36s}
@keyframes tdot{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-4px);opacity:1}}

/* scroll btn */
.btn-scroll-down{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#fff;border:1px solid var(--border);border-radius:50%;width:36px;height:36px;display:none;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 2px 10px rgba(0,0,0,.14);z-index:995;padding:0}
.btn-scroll-down.show{display:flex}
.btn-scroll-down svg{width:18px;height:18px;stroke:#666}
.unread-badge{position:absolute;top:-5px;right:-5px;background:var(--accent);color:#fff;border-radius:50%;width:17px;height:17px;font-size:9px;font-weight:700;display:none;align-items:center;justify-content:center}
.btn-scroll-down.has-unread .unread-badge{display:flex}

/* reply preview bar */
.reply-preview-bar{position:fixed;bottom:64px;left:0;right:0;max-width:860px;margin:0 auto;background:#fdfdfd;border-top:1px solid var(--border);padding:4px 14px;display:none;align-items:center;justify-content:space-between;height:40px;z-index:999}
#chat-screen.has-reply .reply-preview-bar{display:flex}
.reply-preview-content{border-right:3px solid var(--accent);padding-right:8px;font-size:11.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;color:#666}
.reply-preview-title{font-weight:700;font-size:10.5px;color:var(--accent);margin-bottom:1px}
.btn-close-reply{background:transparent;border:none;color:var(--muted);font-size:14px;cursor:pointer;padding:0 4px}

/* edit bar */
.edit-bar{position:fixed;bottom:64px;left:0;right:0;max-width:860px;margin:0 auto;background:#eefaf6;border-top:1px solid #a8dccb;padding:4px 14px;display:none;align-items:center;justify-content:space-between;height:40px;z-index:999}
.edit-bar.show{display:flex}
.edit-bar-content{border-right:3px solid var(--accent);padding-right:8px;font-size:11.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;color:#444}
.edit-bar-title{font-weight:700;font-size:10.5px;color:var(--accent-h);margin-bottom:1px}

/* upload bar */
.upload-bar{background:rgba(16,163,127,.1);padding:5px 16px;font-size:11px;color:var(--accent);font-weight:600;display:none;align-items:center;gap:8px;flex-shrink:0}
.upload-bar.show{display:flex}
.upload-spin{width:12px;height:12px;border-radius:50%;border:2px solid var(--accent);border-top-color:transparent;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.upload-progress{position:fixed;bottom:64px;left:0;right:0;max-width:860px;margin:0 auto;height:3px;background:rgba(16,163,127,.2);z-index:1001;display:none}
.upload-progress.show{display:block}
.upload-progress-bar{height:100%;background:var(--accent);width:0%;transition:width .2s;border-radius:2px}

/* input area */
.input-area{position:fixed;bottom:0;left:0;right:0;max-width:860px;margin:0 auto;background:#fff;padding:10px 12px;padding-bottom:calc(10px + env(safe-area-inset-bottom));display:flex;gap:8px;align-items:flex-end;border-top:1px solid var(--border);z-index:1000}
.input-wrap{flex:1;background:var(--surface);border-radius:22px;display:flex;align-items:flex-end;gap:4px;padding:7px 10px;border:1px solid var(--border2);min-height:42px;transition:border-color .2s}
.input-wrap:focus-within{border-color:var(--accent)}
.btn-attach{border:none;background:transparent;color:var(--muted);cursor:pointer;font-size:17px;display:flex;align-items:center;justify-content:center;width:28px;height:28px;flex-shrink:0;align-self:flex-end;margin-bottom:1px}
.msg-input{flex:1;border:none;outline:none;background:transparent;color:var(--text);font-size:14px;font-family:var(--font);resize:none;max-height:120px;line-height:1.5;padding:1px 0;align-self:flex-end}
.msg-input::placeholder{color:#aaa}
.rec-timer{font-size:12px;color:var(--danger);font-weight:600;display:none;align-items:center;gap:5px;align-self:flex-end;margin-bottom:2px}
.rec-timer.show{display:flex}
.rec-dot{width:7px;height:7px;border-radius:50%;background:var(--danger);animation:recP .8s infinite;flex-shrink:0}
@keyframes recP{0%,100%{transform:scale(1)}50%{transform:scale(1.3)}}

/* زر الإرسال */
.btn-send{width:40px;height:40px;border:none;border-radius:50%;background:var(--accent);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .15s}
.btn-send:hover{background:var(--accent-h)}
.btn-send svg{width:16px;height:16px;fill:#fff;}
.btn-voice{width:40px;height:40px;border:none;border-radius:50%;background:var(--surface);color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:17px;transition:background .15s}
.btn-voice.recording{background:#fee2e2;color:var(--danger);animation:recP .8s infinite}

/* emoji input picker */
.input-emoji-picker{position:fixed;bottom:68px;left:0;right:0;max-width:860px;margin:0 auto;background:#fff;border-top:1px solid var(--border);padding:8px 10px;display:none;flex-wrap:wrap;gap:6px;z-index:1001}
.input-emoji-picker.show{display:flex}
.input-emoji-picker span,.context-emoji-picker span{font-size:22px;cursor:pointer;padding:4px;border-radius:8px;transition:background .1s}
.input-emoji-picker span:hover{background:var(--surface)}
.btn-emoji-input{border:none;background:transparent;color:var(--muted);cursor:pointer;font-size:17px;display:flex;align-items:center;justify-content:center;width:28px;height:28px;flex-shrink:0;align-self:flex-end;margin-bottom:1px}

/* context emoji picker */
.context-emoji-picker{position:fixed;background:#fff;border:1px solid var(--border);border-radius:30px;padding:6px 10px;display:none;gap:4px;z-index:6000;box-shadow:0 4px 20px rgba(0,0,0,.12)}
.context-emoji-picker span:hover{background:var(--surface)}

/* image preview */
.img-preview-wrap{position:fixed;inset:0;z-index:7000;background:#111;display:none;flex-direction:column}
.img-preview-wrap.open{display:flex}
.img-preview-main"><img id="img-preview-main-el" src="" alt=""></div>
.img-preview-strip{display:none;gap:6px;padding:8px 12px;overflow-x:auto;background:rgba(0,0,0,.4);flex-shrink:0;justify-content:center}
.img-preview-strip.multi{display:flex}
.prev-thumb{position:relative;width:56px;height:56px;border-radius:8px;overflow:hidden;border:2px solid transparent;cursor:pointer;flex-shrink:0}
.prev-thumb.active{border-color:#fff}
.prev-thumb img{width:100%;height:100%;object-fit:cover}
.remove-thumb{position:absolute;top:2px;right:2px;width:18px;height:18px;border-radius:50%;background:rgba(0,0,0,.7);color:#fff;border:none;font-size:10px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.img-preview-actions{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;padding-bottom:calc(10px + env(safe-area-inset-bottom));background:rgba(0,0,0,.5);flex-shrink:0}
.img-preview-count{font-size:13px;color:rgba(255,255,255,.8)}
.img-preview-btns{display:flex;gap:10px}
.btn-send-img{background:var(--accent);color:#fff;border:none;border-radius:10px;padding:10px 24px;font-size:14px;font-weight:700;font-family:var(--font);cursor:pointer}
.btn-cancel-img{background:rgba(255,255,255,.15);color:#fff;border:none;border-radius:10px;padding:10px 16px;font-size:14px;font-family:var(--font);cursor:pointer}

/* voice call modal overlay */
.call-modal{position:fixed;inset:0;background:rgba(13,13,13,0.95);z-index:10000;display:none;flex-direction:column;align-items:center;justify-content:center;color:#fff;font-family:var(--font)}
.call-modal.open{display:flex}
.call-avatar{width:100px;height:100px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:36px;font-weight:700;margin-bottom:20px;box-shadow:0 0 20px rgba(16,163,127,0.4)}
.call-avatar.ringing{animation:callPulse 1.5s infinite}
@keyframes callPulse{0%{box-shadow:0 0 0 0 rgba(16,163,127,0.7)}70%{box-shadow:0 0 0 25px rgba(16,163,127,0)}100%{box-shadow:0 0 0 0 rgba(16,163,127,0)}}
.call-name{font-size:22px;font-weight:600;margin-bottom:8px}
.call-status{font-size:14px;color:var(--muted);margin-bottom:40px}
.call-actions{display:flex;gap:30px}
.btn-call-act{width:56px;height:56px;border-radius:50%;border:none;color:#fff;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform 0.1s}
.btn-call-act:active{transform:scale(0.9)}
.btn-call-act.accept{background:var(--accent)}
.btn-call-act.decline{background:var(--danger)}

/* toast */
.toast{position:fixed;bottom:85px;left:50%;transform:translateX(-50%);background:#0d0d0d;color:#fff;padding:8px 18px;border-radius:10px;font-size:13px;opacity:0;transition:.3s;z-index:9999;white-space:nowrap}
.toast.show{opacity:1}

/* img modal */
.img-modal{position:fixed;inset:0;z-index:9000;background:rgba(0,0,0,.9);display:none;align-items:center;justify-content:center;padding:20px}
.img-modal.open{display:flex}
.img-modal img{max-width:100%;max-height:90vh;border-radius:8px}
.img-modal-close{position:absolute;top:20px;right:20px;width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.15);border:none;color:#fff;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center}
</style>
</head>
<body>

<div id="app">
  <div id="login-screen" class="screen">
    <div class="login-wrap">      <div class="login-card">
        <div class="brand">
          <div class="brand-name">Chat<span>BFT</span></div>
          <div class="brand-sub">محادثة فورية آمنة</div>
        </div>
        <div class="field">
          <label>الاسم</label>
          <input type="text" id="name-input" placeholder="أدخل اسمك" maxlength="20" autocomplete="off">
        </div>
        <div class="field">
          <label>رمز الغرفة</label>
          <input type="text" id="room-input" placeholder="مثال: room2024" maxlength="30" autocomplete="off" onkeydown="if(event.key==='Enter')joinRoom()">
          <div class="field-hint">شارك نفس الرمز مع الشخص الآخر</div>
        </div>
        <div class="error-msg" id="login-error"></div>
        <button class="btn-login" id="join-btn" onclick="joinRoom()">دخول الغرفة</button>
      </div>
    </div>
  </div>

  <div id="chat-screen" class="screen hidden">
    <div class="chat-header">
      <div class="peer-avatar" id="peer-avatar">؟</div>
      <div class="header-info">
        <div class="header-room" id="header-room-id">الغرفة</div>
        <div class="header-sub">
          <div class="online-dot" id="online-dot"></div>
          <span id="peer-status">في انتظار الطرف الآخر...</span>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:6px;margin-right:auto">
        <button class="btn-hdr call-btn" onclick="startAudioCall()" title="مكالمة صوتية">📞 مكالمة</button>
        <div class="my-avatar-sm" id="my-avatar">ME</div>
      </div>
      <div class="header-actions">
        <button class="btn-hdr search-btn" onclick="openSearch()">🔍</button>
        <button class="btn-hdr clear" onclick="clearChat()">مسح</button>
        <button class="btn-hdr leave" onclick="leaveRoom()">خروج</button>
      </div>
    </div>

    <div class="pin-bar" id="pin-bar" onclick="scrollToPinned()">
      <span class="pin-icon">📌</span>
      <span class="pin-text" id="pin-text">رسالة مثبتة</span>
      <button class="pin-close" onclick="unpinMessage(event)">✕</button>
    </div>

    <div class="upload-bar" id="upload-bar"><div class="upload-spin"></div><span>جاري الرفع...</span></div>

    <div class="messages-wrap">
      <div class="messages-area" id="messages-area" onclick="closeAllMenus()">
        <div class="empty-state" id="empty-state">
          <div style="font-size:40px;margin-bottom:8px;opacity:.3">💬</div>
          <p>ابدأ المحادثة الآن</p>
        </div>
      </div>
    </div>

    <div class="typing-bar" id="typing-bar"></div>

    <button class="btn-scroll-down" id="btn-scroll-down" onclick="scrollToBottom()">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
      <span class="unread-badge" id="unread-badge">0</span>
    </button>

    <div class="reply-preview-bar" id="reply-preview-bar">
      <div class="reply-preview-content">
        <div class="reply-preview-title" id="reply-preview-sender">الرد على</div>
        <div id="reply-preview-text">نص الرسالة...</div>
      </div>
      <button class="btn-close-reply" onclick="cancelReply()">✕</button>
    </div>

    <div class="edit-bar" id="edit-bar">
      <div class="edit-bar-content">
        <div class="edit-bar-title">تعديل الرسالة ✏️</div>
        <div id="edit-preview-text">...</div>
      </div>
      <button class="btn-close-reply" onclick="cancelEdit()">✕</button>
    </div>

    <div class="input-emoji-picker" id="input-emoji-picker">
      <span onclick="insertEmoji('😀')">😀</span><span onclick="insertEmoji('😂')">😂</span>
      <span onclick="insertEmoji('🥰')">🥰</span><span onclick="insertEmoji('😍')">😍</span>
      <span onclick="insertEmoji('😊')">😊</span><span onclick="insertEmoji('😎')">😎</span>
      <span onclick="insertEmoji('😡')">😡</span><span onclick="insertEmoji('👍')">👍</span>
      <span onclick="insertEmoji('👌')">👌</span><span onclick="insertEmoji('🔥')">🔥</span>
      <span onclick="insertEmoji('❤️')">❤️</span><span onclick="insertEmoji('💔')">💔</span>
      <span onclick="insertEmoji('💯')">💯</span><span onclick="insertEmoji('🎉')">🎉</span>
      <span onclick="insertEmoji('✨')">✨</span><span onclick="insertEmoji('🙏')">🙏</span>
    </div>

    <div class="context-emoji-picker" id="context-emoji-picker">
      <span onclick="triggerCtxReact('❤️')">❤️</span>
      <span onclick="triggerCtxReact('👍')">👍</span>
      <span onclick="triggerCtxReact('😂')">😂</span>
      <span onclick="triggerCtxReact('😮')">😮</span>
      <span onclick="triggerCtxReact('😢')">😢</span>
      <span onclick="triggerCtxReact('😡')">😡</span>
    </div>

    <div class="img-preview-wrap" id="img-preview-wrap">
      <div class="img-preview-main"><img id="img-preview-main-el" src="" alt=""></div>
      <div class="img-preview-strip" id="img-preview-strip"></div>
      <div class="img-preview-actions">
        <div class="img-preview-count" id="img-preview-count"></div>
        <div class="img-preview-btns">
          <button class="btn-cancel-img" onclick="cancelImgPreview()">إلغاء</button>
          <button class="btn-send-img" onclick="confirmSendImage()">إرسال ✓</button>
        </div>
      </div>
    </div>

    <div class="upload-progress" id="upload-progress"><div class="upload-progress-bar" id="upload-progress-bar"></div></div>

    <div class="input-area">
      <button class="btn-send" onclick="sendMessage()">
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
      <input type="file" id="file-chooser" accept="image/*,video/*,.pdf,.doc,.docx,.zip" class="hidden" multiple onchange="handleFileSelect(this)">
      <div class="input-wrap">
        <button class="btn-attach" onclick="document.getElementById('file-chooser').click()" title="ملف">📎</button>
        <textarea id="msg-input" class="msg-input" rows="1" placeholder="اكتب رسالة..." onkeydown="handleKey(event)" oninput="handleTyping(this)"></textarea>
        <button class="btn-emoji-input" onclick="toggleEmojiPicker(event)">😀</button>
        <div class="rec-timer" id="rec-timer"><div class="rec-dot"></div><span id="rec-time">0:00</span></div>
      </div>
      <button class="btn-voice" id="btn-voice" onclick="toggleVoiceRecord()" title="تسجيل">🎤</button>
    </div>

    <div class="search-overlay" id="search-overlay">
      <div class="search-header">
        <button class="btn-close-search" onclick="closeSearch()">✕</button>
        <input class="search-input" id="search-input" placeholder="ابحث في الرسائل..." oninput="doSearch(this.value)" onkeydown="if(event.key==='Escape')closeSearch()" autocomplete="off">
        <span style="font-size:14px">🔍</span>
      </div>
      <div class="search-results" id="search-results"><div class="search-empty">اكتب للبحث في الرسائل</div></div>
    </div>
  </div>

  <div id="call-modal" class="call-modal">
    <div class="call-avatar ringing" id="call-avatar-el">📞</div>
    <div class="call-name" id="call-username">الطرف الآخر</div>
    <div class="call-status" id="call-status-text">جاري الاتصال...</div>
    <div class="call-actions">
      <button class="btn-call-act accept hidden" id="btn-call-accept" onclick="answerCall()">📞</button>
      <button class="btn-call-act decline" onclick="endCall()">❌</button>
    </div>
  </div>

  <div class="toast" id="toast"></div>
  <div class="img-modal" id="img-modal" onclick="closeImgModal()">
    <button class="img-modal-close">✕</button>
    <img id="modal-img" src="" alt="">
  </div>
</div>

<script>
/* ══ FIREBASE CONFIG ══ */
const FIREBASE_CONFIG = {
  apiKey:"AIzaSyCqkSRiU0n0G4AFSJQCLCO-wqip6sKwCz0",
  authDomain:"syncchat-6e22b.firebaseapp.com",
  databaseURL:"https://syncchat-6e22b-default-rtdb.europe-west1.firebasedatabase.app",
  projectId:"syncchat-6e22b",
  storageBucket:"syncchat-6e22b.firebasestorage.app",
  messagingSenderId:"692797381468",
  appId:"1:692797381468:web:9faaed7bf44f0f527a3f99"
};
const CLOUDINARY_CLOUD='db03wdg7v', CLOUDINARY_PRESET='ekk7u3hb';

/* ══ STATE ══ */
let db;
let myName,myId,roomId,peerName=null;
let messagesRef,presenceRef,typingRef,roomPresenceRef,callRef;
let currentActivePeerRef=null, peerTypingListener=null;
let typingTimeout, inactivityTimeout;
let isInitialLoad=true;
let allMessages={};
let currentReplyTarget=null;
let currentEditKey=null;
let pinnedMsgKey=null, pinnedMsgText='';
let activeRowKey=null;
let ctxReactKey=null;
let unreadCount=0, isAtBottom=true;
let pendingFiles=[], activePreviewIdx=0;
let mediaRecorder=null, audioChunks=[], recInterval=null, recSeconds=0;
let currentAudio=null, currentPlayBtn=null;
const INACTIVITY_LIMIT=2*60*1000;

/* ══ WebRTC Voice Call STATE ══ */
let pc = null;
let localStream = null;
let remoteAudioElement = null; // عنصر تشغيل صوت الطرف الآخر

// خوادم STUN مجانية لتجاوز جدران الحماية ونقل الصوت عبر الـ NAT
const rtcConfig = {
  iceServers: [
    { urls: 'stun:stun.l.google.com:19302' },
    { urls: 'stun:stun1.l.google.com:19302' }
  ]
};

/* ══ HELPERS ══ */
const $=id=>document.getElementById(id);
const esc=s=>String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const initials=n=>n.trim().slice(0,2).toUpperCase();
const genId=()=>Math.random().toString(36).slice(2,10);
const fmt=ts=>new Date(ts).toLocaleTimeString('ar-EG',{hour:'2-digit',minute:'2-digit'});

function isSingleEmoji(text) {
  if(!text) return false;
  const emojiRegex = /^[\u{1F300}-\u{1F9FF}\u{1F600}-\u{1F64F}\u{1F680}-\u{1F6FF}\u{2600}-\u{26FF}\u{2700}-\u{27BF}\u{1F1E6}-\u{1F1FF}\u{1F900}-\u{1F9FF}\u{1F300}-\u{1F5FF}\u{1F500}-\u{1F5FF}\u{1F900}-\u{1F9FF}\u{1F004}\u{1F0CF}\u{1F170}-\u{1F251}\u{2B50}\u{2B55}\u{231A}\u{231B}\u{23F0}\u{23F3}\u{25AA}\u{25AB}\u{25B6}\u{25C0}\u{25FB}\u{25FC}\u{25FD}\u{25FE}]$/u;
  return emojiRegex.test(text.trim());
}

function showToast(msg){const t=$('toast');t.textContent=msg;t.classList.add('show');clearTimeout(window._tt);window._tt=setTimeout(()=>t.classList.remove('show'),2800)}

/* ══ INITIALIZATION & ROOM JOIN ══ */
window.onload=()=>{
  firebase.initializeApp(FIREBASE_CONFIG);
  db = firebase.database();
  
  // إنشاء عنصر الصوت المخفي في الخلفية لاستقبال دفق الصوت للاتصالات
  remoteAudioElement = document.createElement('audio');
  remoteAudioElement.autoplay = true;
  document.body.appendChild(remoteAudioElement);

  const savedName = localStorage.getItem('chat_my_name');
  const savedRoom = localStorage.getItem('chat_room_id');
  if(savedName) $('name-input').value = savedName;
  if(savedRoom) $('room-input').value = savedRoom;
};

function joinRoom(){
  const nameIn = $('name-input').value.trim();
  const roomIn = $('room-input').value.trim().toLowerCase();
  if(!nameIn || !roomIn){ $('login-error').textContent='برجاء إدخال الاسم ورمز الغرفة'; return; }
  
  myName = nameIn; roomId = roomIn; myId = genId();
  localStorage.setItem('chat_my_name', myName);
  localStorage.setItem('chat_room_id', roomId);
  
  $('login-screen').classList.add('hidden');
  $('chat-screen').classList.remove('hidden');
  $('header-room-id').textContent = "غرفة: " + roomId;
  $('my-avatar').textContent = initials(myName);
  
  initFirebaseRefs();
}

function initFirebaseRefs(){
  messagesRef = db.ref(`rooms/${roomId}/messages`);
  roomPresenceRef = db.ref(`rooms/${roomId}/presence`);
  presenceRef = db.ref(`rooms/${roomId}/presence/${myId}`);
  typingRef = db.ref(`rooms/${roomId}/typing/${myId}`);
  callRef = db.ref(`rooms/${roomId}/call`);
  
  // ضبط حالة التواجد (Online)
  presenceRef.set({ name: myName, ts: firebase.database.ServerValue.TIMESTAMP });
  presenceRef.onDisconnect().remove();
  typingRef.onDisconnect().remove();
  
  // مراقبة الطرف الآخر في الغرفة
  roomPresenceRef.on('value', snap => {
    let peers = snap.val() || {};
    let peerId = Object.keys(peers).find(k => k !== myId);
    if(peerId){
      peerName = peers[peerId].name;
      $('peer-avatar').textContent = initials(peerName);
      $('online-dot').classList.add('on');
      $('peer-status').textContent = 'نشط الآن';
      listenToPeerTyping(peerId);
    } else {
      peerName = null;
      $('peer-avatar').textContent = '؟';
      $('online-dot').classList.remove('on');
      $('peer-status').textContent = 'في انتظار الطرف الآخر...';
      if(peerTypingListener) { typingRef.parent.child(peerTypingListener).off(); peerTypingListener=null; }
    }
  });
  
  // الاستماع للرسائل والمكالمات
  listenMessages();
  listenToCalls();
  
  // كاشف التمرير لأسفل الصفحة
  $('messages-area').addEventListener('scroll', e => {
    const a = e.target;
    isAtBottom = (a.scrollHeight - a.scrollTop - a.clientHeight) < 40;
    if(isAtBottom){ unreadCount=0; $('btn-scroll-down').classList.remove('show','has-unread'); }
  });
  resetInactivityTimeout();
}

/* ══ TYPING LOGIC (Updated to show text) ══ */
function handleTyping(input) {
  resetInactivityTimeout();
  if(typingTimeout) clearTimeout(typingTimeout);
  typingRef.set(true);
  typingTimeout = setTimeout(() => { typingRef.remove(); }, 2000);
}

function listenToPeerTyping(pId){
  if(peerTypingListener && peerTypingListener !== pId){
    typingRef.parent.child(peerTypingListener).off();
  }
  peerTypingListener = pId;
  typingRef.parent.child(pId).on('value', snap => {
    const bar = $('typing-bar');
    if(snap.val() === true) {
      // تعديل شريط الكتابة ليكتب النص المطلوب صراحة مع الحركات
      bar.innerHTML = `<span>اكتب الان الـ typing</span><div class="typing-dots"><span></span><span></span><span></span></div>`;
    } else {
      bar.innerHTML = '';
    }
  });
}

/* ══ MESSAGES LOGIC ══ */
function listenMessages(){
  messagesRef.limitToLast(150).on('value', snap => {
    const data = snap.val() || {};
    allMessages = data;
    const area = $('messages-area');
    
    // حفظ مكان التمرير الحالي
    const wasAtBottom = isAtBottom;
    
    // تفريغ المحتوى وإعادة البناء
    area.innerHTML = '';
    const keys = Object.keys(data).sort((a,b)=>data[a].ts - data[b].ts);
    
    if(keys.length === 0){
      $('empty-state').style.display = 'block';
      area.appendChild($('empty-state'));
      return;
    }
    $('empty-state').style.display = 'none';
    
    keys.forEach(k => {
      const m = data[k];
      if(m.type === 'system'){
        renderSystemMsg(m);
      } else {
        renderChatBubble(k, m);
      }
    });
    
    if(isInitialLoad || wasAtBottom){
      scrollToBottom();
      isInitialLoad = false;
    } else {
      unreadCount++;
      $('unread-badge').textContent = unreadCount;
      $('btn-scroll-down').classList.add('show', 'has-unread');
    }
  });
}

function renderSystemMsg(m){
  const div = document.createElement('div');
  div.className = 'system-msg';
  div.innerHTML = `<span>${esc(m.text)}</span> <span class="system-msg-ts">${fmt(m.ts)}</span>`;
  $('messages-area').appendChild(div);
}

function renderChatBubble(key, m){
  const wrap = document.createElement('div');
  wrap.className = `msg-wrapper ${m.senderId === myId ? 'sent' : 'recv'}`;
  
  const isMe = (m.senderId === myId);
  let replyHtml = '';
  if(m.replyTo && allMessages[m.replyTo]){
    const r = allMessages[m.replyTo];
    replyHtml = `
      <div class="reply-quotation" onclick="scrollToMessage('${m.replyTo}')">
        <div class="reply-quotation-sender">${esc(r.senderName)}</div>
        <span class="reply-quotation-text">${esc(r.text || '[ملف/ميديا]')}</span>
      </div>
    `;
  }
  
  let contentHtml = '';
  if(m.mediaUrl){
    if(m.mediaType === 'image'){
      contentHtml = `<img class="chat-image" src="${m.mediaUrl}" onclick="openImgModal('${m.mediaUrl}')" onload="if(isAtBottom)scrollToBottom()">`;
    } else if(m.mediaType === 'video'){
      contentHtml = `<video class="chat-video" src="${m.mediaUrl}" controls></video>`;
    } else if(m.mediaType === 'voice'){
      contentHtml = buildVoiceHtml(m.mediaUrl, m.duration);
    } else {
      contentHtml = `<a class="file-attachment" href="${m.mediaUrl}" target="_blank">📄 ${esc(m.fileName || 'ملف مرفق')}</a>`;
    }
  }
  
  let textHtml = '';
  if(m.text){
    const singleE = isSingleEmoji(m.text);
    textHtml = `<span class="actual-msg-text ${singleE ? 'telegram-emoji' : ''}">${esc(m.text)}</span>`;
  }
  
  let editBadge = m.edited ? ' <span style="font-size:9px;opacity:0.5">(معدلة)</span>' : '';
  let tick = '';
  if(isMe){
    tick = `<span class="tick-read">✓✓</span>`;
  }
  
  let reactionsHtml = '';
  if(m.reactions){
    reactionsHtml = `<div class="reactions-bar">`;
    const rMap = {};
    Object.keys(m.reactions).forEach(rk => {
      const emo = m.reactions[rk].emoji;
      const uId = m.reactions[rk].uid;
      if(!rMap[emo]) rMap[emo] = { count: 0, mine: false };
      rMap[emo].count++;
      if(uId === myId) rMap[emo].mine = true;
    });
    Object.keys(rMap).forEach(emo => {
      reactionsHtml += `
        <div class="reaction-chip ${rMap[emo].mine ? 'mine' : ''}" onclick="toggleReact('${key}','${emo}')">
          <span>${emo}</span><span class="r-count">${rMap[emo].count}</span>
        </div>
      `;
    });
    reactionsHtml += `</div>`;
  }

  wrap.innerHTML = `
    <div class="msg-row" id="msg-row-${key}" oncontextmenu="showMsgActions(event,'${key}')" onclick="handleRowClick(event,'${key}')">
      <div class="msg-bubble-wrap">
        ${!isMe ? `<div class="msg-sender-name">${esc(m.senderName)}</div>` : ''}
        <div class="msg-bubble">
          ${replyHtml}
          ${contentHtml}
          ${textHtml}
          <div class="msg-meta">
            <span>${fmt(m.ts)}</span>${editBadge}
            ${tick}
          </div>
        </div>
        ${reactionsHtml}
      </div>
      
      <div class="msg-actions-group">
        <button class="msg-action-btn" onclick="setReplyTarget('${key}')" title="رد">↩️</button>
        <button class="msg-action-btn" onclick="openContextEmoji('${key}', event)" title="تفاعل">❤️</button>
        ${isMe ? `<button class="msg-action-btn" onclick="startEditMessage('${key}')" title="تعديل">✏️</button>` : ''}
        ${isMe ? `<button class="msg-action-btn" style="color:var(--danger)" onclick="deleteMessage('${key}')" title="حذف">🗑️</button>` : ''}
      </div>
    </div>
  `;
  
  $('messages-area').appendChild(wrap);
}

function buildVoiceHtml(url, dur){
  return `
    <div class="voice-msg">
      <button class="btn-play-voice" onclick="playVoice('${url}', this)">▶</button>
      <div class="voice-waveform" onclick="showToast('جاري التشغيل...')">
        <span style="height:10px"></span><span style="height:16px"></span>
        <span style="height:22px"></span><span style="height:14px"></span>
        <span style="height:18px"></span><span style="height:8px"></span>
      </div>
      <div class="voice-duration">${dur || '0:00'}</div>
    </div>
  `;
}

/* ══ SEND MESSAGES ══ */
function handleKey(e){
  if(e.key === 'Enter' && !e.shiftKey){
    e.preventDefault();
    sendMessage();
  }
}

function sendMessage(){
  const input = $('msg-input');
  const text = input.value.trim();
  if(!text && pendingFiles.length === 0) return;
  
  if(pendingFiles.length > 0){
    uploadAndSendMultiple();
    return;
  }
  
  if(currentEditKey){
    messagesRef.child(currentEditKey).update({ text: text, edited: true });
    cancelEdit();
    input.value = ''; input.rows = 1;
    return;
  }
  
  const m = {
    senderId: myId,
    senderName: myName,
    text: text,
    ts: firebase.database.ServerValue.TIMESTAMP
  };
  if(currentActivePeerRef) m.peerRef = currentActivePeerRef;
  if(currentReplyTarget) { m.replyTo = currentReplyTarget; cancelReply(); }
  
  messagesRef.push(m);
  input.value = '';
  input.rows = 1;
  scrollToBottom();
}

/* ══ EDIT, REPLY, ACTIONS ══ */
function showMsgActions(e, key){
  e.preventDefault();
  closeAllMenus();
  activeRowKey = key;
  const row = $(`msg-row-${key}`);
  if(row) row.classList.add('active-actions');
}
function handleRowClick(e, key){
  if(e.target.closest('.msg-actions-group') || e.target.closest('.reaction-chip') || e.target.closest('.reply-quotation')) return;
  closeAllMenus();
}
function closeAllMenus(){
  if(activeRowKey){
    const row = $(`msg-row-${activeRowKey}`);
    if(row) row.classList.remove('active-actions');
    activeRowKey = null;
  }
  $('context-emoji-picker').style.display = 'none';
  $('input-emoji-picker').classList.remove('show');
}
function setReplyTarget(key){
  currentReplyTarget = key;
  const m = allMessages[key];
  $('reply-preview-sender').textContent = `الرد على ${m.senderName}`;
  $('reply-preview-text').textContent = m.text || '[وسائط]';
  $('chat-screen').classList.add('has-reply');
  closeAllMenus();
  $('msg-input').focus();
}
function cancelReply(){ currentReplyTarget = null; $('chat-screen').classList.remove('has-reply'); }

function startEditMessage(key){
  currentEditKey = key;
  const m = allMessages[key];
  if(!m.text) return;
  $('edit-preview-text').textContent = m.text;
  $('edit-bar').classList.add('show');
  $('msg-input').value = m.text;
  closeAllMenus();
  $('msg-input').focus();
}
function cancelEdit(){ currentEditKey = null; $('edit-bar').classList.remove('show'); $('msg-input').value = ''; }

function deleteMessage(key){
  if(confirm('هل تريد حذف هذه الرسالة نهائياً؟')){
    messagesRef.child(key).remove();
  }
  closeAllMenus();
}

/* ══ REACTIONS ══ */
function openContextEmoji(key, e){
  e.stopPropagation();
  ctxReactKey = key;
  const picker = $('context-emoji-picker');
  picker.style.display = 'flex';
  picker.style.top = `${Math.min(e.clientY, window.innerHeight - 80)}px`;
  picker.style.left = `${Math.max(20, e.clientX - 100)}px`;
}
function triggerCtxReact(emo){
  if(ctxReactKey) toggleReact(ctxReactKey, emo);
  $('context-emoji-picker').style.display = 'none';
}
function toggleReact(msgKey, emo){
  const m = allMessages[msgKey];
  if(!m) return;
  const existingReactKey = Object.keys(m.reactions || {}).find(k => m.reactions[k].uid === myId && m.reactions[k].emoji === emo);
  if(existingReactKey){
    messagesRef.child(`${msgKey}/reactions/${existingReactKey}`).remove();
  } else {
    messagesRef.child(`${msgKey}/reactions`).push({ uid: myId, emoji: emo });
  }
}

/* ══ VOICE CALLS (FIXED & IMPROVED AUDIO STREAMING) ══ */
function listenToCalls(){
  callRef.on('value', async snap => {
    const val = snap.val();
    if(!val) { closeModal(); closeAudioCall(); return; }
    
    // إذا تلقيت مكالمة واردة من شخص آخر ولست في مكالمة حالياً
    if(val.status === 'dialing' && val.callerId !== myId && !pc) {
      $('call-username').textContent = val.callerName;
      $('call-status-text').textContent = 'مكالمة صوتية واردة...';
      $('btn-call-accept').classList.remove('hidden');
      $('call-modal').classList.add('open');
    }
    // الطرف الثاني وافق على المكالمة وبدأ الاتصال (للشخص الذي اتصل أولاً)
    else if(val.status === 'accepted' && val.callerId === myId && pc) {
      $('call-status-text').textContent = 'متصل الآن 🟢';
      if(val.answer) {
        await pc.setRemoteDescription(new RTCSessionDescription(val.answer));
      }
    }
    // معالجة مرشحات ICE (مهمة جداً لفتح قنوات الصوت عبر الشبكات المختلفة)
    if(val.iceCandidates && pc) {
      Object.keys(val.iceCandidates).forEach(async k => {
        const candidate = val.iceCandidates[k];
        if(candidate.uid !== myId) {
          try { await pc.addIceCandidate(new RTCIceCandidate(candidate)); } catch(e){}
        }
      });
    }
  });
}

// دالة بدء المكالمة (اتصال جديد)
async function startAudioCall(){
  if(!peerName) { showToast('لا يوجد طرف آخر متصل بالغرفة لإجراء المكالمة'); return; }
  $('call-username').textContent = peerName;
  $('call-status-text').textContent = 'جاري الرنين...';
  $('btn-call-accept').classList.add('hidden');
  $('call-modal').classList.add('open');
  
  try {
    // 1. طلب صلاحية المايك وعمل Stream
    localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
    
    // 2. إنشاء اتصال النظراء وتثبيت الـ Event Listeners
    setupPeerConnection();
    
    // 3. رفع الإشارة والطلب لـ Firebase
    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);
    
    callRef.set({
      status: 'dialing',
      callerId: myId,
      callerName: myName,
      offer: { type: offer.type, sdp: offer.sdp },
      ts: firebase.database.ServerValue.TIMESTAMP
    });
    
  } catch(err) {
    console.error(err);
    showToast('فشل في الوصول إلى المايكروفون: ' + err.message);
    endCall();
  }
}

// دالة الرد على المكالمة الواردة
async function answerCall() {
  $('btn-call-accept').classList.add('hidden');
  $('call-status-text').textContent = 'جاري الاتصال بالصوت...';
  
  try {
    localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
    setupPeerConnection();
    
    // الحصول على العرض المرسل من الطرف الأول
    const snap = await callRef.get();
    const val = snap.val();
    if(!val || !val.offer) { endCall(); return; }
    
    await pc.setRemoteDescription(new RTCSessionDescription(val.offer));
    const answer = await pc.createAnswer();
    await pc.setLocalDescription(answer);
    
    // تحديث قاعدة البيانات بالموافقة والـ Answer الـ SDP
    await callRef.update({
      status: 'accepted',
      answer: { type: answer.type, sdp: answer.sdp }
    });
    
    $('call-status-text').textContent = 'متصل الآن 🟢';
  } catch(err) {
    console.error(err);
    showToast('خطأ أثناء الرد على المكالمة: ' + err.message);
    endCall();
  }
}

// إعداد وتجهيز الـ RTCPeerConnection لنقل البيانات وبث المايكروفون
function setupPeerConnection() {
  pc = new RTCPeerConnection(rtcConfig);
  
  // إضافة مسارات المايكروفون المحلي ليتم نقلها للطرف الآخر فورا
  localStream.getTracks().forEach(track => {
    pc.addTrack(track, localStream);
  });
  
  // عند استقبال دفق الصوت القادم من الطرف الآخر
  pc.ontrack = (event) => {
    if(event.streams && event.streams[0]) {
      // ربط الدفق الصوتي بعنصر الصوت المخفي في الصفحة ليعمل الصوت فورا
      remoteAudioElement.srcObject = event.streams[0];
    }
  };
  
  // إرسال مرشحات الـ ICE وتبادلها عبر Firebase
  pc.onicecandidate = (event) => {
    if(event.candidate) {
      callRef.child('iceCandidates').push({
        uid: myId,
        candidate: event.candidate.candidate,
        sdpMid: event.candidate.sdpMid,
        sdpMLineIndex: event.candidate.sdpMLineIndex
      });
    }
  };
}

// إنهاء وقفل المكالمة للطرفين وتفريغ الذاكرة
function endCall(){
  callRef.remove();
  closeAudioCall();
  closeModal();
}

function closeAudioCall() {
  if(pc) {
    pc.close();
    pc = null;
  }
  if(localStream) {
    localStream.getTracks().forEach(track => track.stop());
    localStream = null;
  }
  if(remoteAudioElement) {
    remoteAudioElement.srcObject = null;
  }
}

function closeModal(){ $('call-modal').classList.remove('open'); }

/* ══ UTILS, SCROLL & REBOOTS ══ */
function scrollToBottom(){ const a=$('messages-area'); a.scrollTop=a.scrollHeight; isAtBottom=true; $('btn-scroll-down').classList.remove('show'); }
function scrollToMessage(id){ const el=$(`msg-row-${id}`); if(el){ el.scrollIntoView({behavior:'smooth',block:'center'}); el.style.background='#fff3a3'; setTimeout(()=>el.style.background='transparent',1500)} }
function resetInactivityTimeout(){ clearTimeout(inactivityTimeout); inactivityTimeout=setTimeout(leaveRoom, INACTIVITY_LIMIT); }
function leaveRoom(){ if(presenceRef) presenceRef.remove(); location.reload(); }
function clearChat(){ if(confirm('مسح محادثتك محلياً؟ لن يمسحها عند الطرف الآخر.')) $('messages-area').innerHTML=''; }

/* ══ ATTACHMENTS & UPLOADS (CLOUDINARY) ══ */
function handleFileSelect(input){
  if(!input.files || input.files.length === 0) return;
  pendingFiles = Array.from(input.files);
  activePreviewIdx = 0;
  openImgPreview();
}
function openImgPreview(){
  const file = pendingFiles[activePreviewIdx];
  if(!file) return;
  $('img-preview-wrap').classList.add('open');
  if(file.type.startsWith('image/')){
    $('img-preview-main-el').src = URL.createObjectURL(file);
    $('img-preview-main-el').style.display = 'block';
  } else {
    $('img-preview-main-el').style.display = 'none';
  }
  $('img-preview-count').textContent = `ملف ${activePreviewIdx + 1} من أصل ${pendingFiles.length}: ${file.name}`;
}
function cancelImgPreview(){ pendingFiles=[]; $('img-preview-wrap').classList.remove('open'); }
function confirmSendImage(){
  if(pendingFiles.length > 0) uploadAndSendMultiple();
}
async function uploadAndSendMultiple(){
  $('img-preview-wrap').classList.remove('open');
  $('upload-bar').classList.add('show');
  const pBar = $('upload-progress'); pBar.classList.add('show');
  const inner = $('upload-progress-bar'); inner.style.width = '0%';
  
  for(let i=0; i<pendingFiles.length; i++){
    const f = pendingFiles[i];
    inner.style.width = `${Math.round((i / pendingFiles.length)*100)}%`;
    try {
      let url = await uploadToCloudinary(f);
      let type = 'file';
      if(f.type.startsWith('image/')) type='image';
      else if(f.type.startsWith('video/')) type='video';
      
      messagesRef.push({
        senderId: myId, senderName: myName,
        mediaUrl: url, mediaType: type, fileName: f.name,
        ts: firebase.database.ServerValue.TIMESTAMP
      });
    } catch(e){ showToast('فشل رفع أحد الملفات!'); }
  }
  inner.style.width = '100%';
  setTimeout(()=>{ pBar.classList.remove('show'); $('upload-bar').classList.remove('show'); pendingFiles=[]; }, 500);
}
function uploadToCloudinary(file){
  return new Promise((resolve, reject)=>{
    const formData = new FormData();
    formData.append('file', file);
    formData.append('upload_preset', CLOUDINARY_PRESET);
    fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD}/upload`, { method:'POST', body:formData })
    .then(r=>r.json()).then(res=>{ if(res.secure_url) resolve(res.secure_url); else reject(); })
    .catch(()=>reject());
  });
}

/* ══ VOICE MESSAGES RECORDING ══ */
async function toggleVoiceRecord(){
  const btn = $('btn-voice');
  if(mediaRecorder && mediaRecorder.state === 'recording'){
    mediaRecorder.stop();
    btn.classList.remove('recording');
    btn.textContent = '🎤';
    $('rec-timer').classList.remove('show');
    clearInterval(recInterval);
    return;
  }
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    mediaRecorder = new MediaRecorder(stream);
    audioChunks = [];
    mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
    mediaRecorder.onstop = async () => {
      const blob = new Blob(audioChunks, { type: 'audio/mp3' });
      const durText = $('rec-time').textContent;
      $('upload-bar').classList.add('show');
      try {
        const url = await uploadToCloudinary(blob);
        messagesRef.push({
          senderId: myId, senderName: myName,
          mediaUrl: url, mediaType: 'voice', duration: durText,
          ts: firebase.database.ServerValue.TIMESTAMP
        });
      } catch(e){ showToast('فشل رفع البصمة الصوتية'); }
      $('upload-bar').classList.remove('show');
    };
    mediaRecorder.start();
    btn.classList.add('recording');
    btn.textContent = '🛑';
    recSeconds = 0; $('rec-time').textContent = '0:00';
    $('rec-timer').classList.add('show');
    recInterval = setInterval(()=>{
      recSeconds++;
      let m = Math.floor(recSeconds/60), s = recSeconds%60;
      $('rec-time').textContent = `${m}:${s < 10 ? '0':''}${s}`;
    },1000);
  } catch(e){ showToast('فشل الوصول للمايك للجيل بصمة صوتية'); }
}
function playVoice(url, btn){
  if(currentAudio && currentAudio.src === url){
    if(!currentAudio.paused){ currentAudio.pause(); btn.textContent='▶'; }
    else { currentAudio.play(); btn.textContent='⏸'; }
    return;
  }
  if(currentAudio){ currentAudio.pause(); if(currentPlayBtn) currentPlayBtn.textContent='▶'; }
  currentPlayBtn = btn;
  currentAudio = new Audio(url);
  currentAudio.play();
  btn.textContent = '⏸';
  currentAudio.onended = () => btn.textContent = '▶';
}

/* ══ SEARCH LOGIC ══ */
function openSearch(){ $('search-overlay').classList.add('open'); $('search-input').focus(); }
function closeSearch(){ $('search-overlay').classList.remove('open'); $('search-input').value=''; }
function doSearch(q){
  const results = $('search-results');
  if(!q.trim()){ results.innerHTML='<div class="search-empty">اكتب للبحث في الرسائل</div>'; return; }
  results.innerHTML = '';
  let count = 0;
  Object.keys(allMessages).forEach(k => {
    const m = allMessages[k];
    if(m.text && m.text.toLowerCase().includes(q.toLowerCase())){
      count++;
      const item = document.createElement('div');
      item.className = 'search-result-item';
      item.onclick = () => { closeSearch(); scrollToMessage(k); };
      const highlighted = esc(m.text).replace(new RegExp(esc(q), 'gi'), match => `<mark>${match}</mark>`);
      item.innerHTML = `
        <div class="search-result-sender">${esc(m.senderName)}</div>
        <div class="search-result-text">${highlighted}</div>
        <div class="search-result-time">${fmt(m.ts)}</div>
      `;
      results.appendChild(item);
    }
  });
  if(count === 0) results.innerHTML = '<div class="search-empty">لم يتم العثور على نتائج للبحث</div>';
}

function insertEmoji(emo){ const input = $('msg-input'); input.value += emo; input.focus(); }
function openImgModal(url){ $('modal-img').src=url; $('img-modal').classList.add('open'); }
function closeImgModal(){ $('img-modal').classList.remove('open'); }
