<!DOCTYPE html>

<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
<title>ChatBFT</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --accent:#10a37f; --accent-h:#0d8f6f;
  --bg:#fff; --surface:#f4f4f4; --border:#e5e5e5; --border2:#d9d9d9;
  --text:#0d0d0d; --text2:#353535; --muted:#6e6e80; --danger:#ef4444;
  --sent:#10a37f; --recv:#f1f1f1; --font:'Cairo',sans-serif;
}
html,body{width:100%;height:100dvh;overflow:hidden;font-family:var(--font);background:#fff;color:var(--text)}
#app{width:100%;height:100%;display:flex;align-items:stretch}
.screen{width:100%;height:100%;overflow:hidden}
.hidden{display:none!important}

/* ── LOGIN ── */
#login-screen{display:flex;align-items:center;justify-content:center;background:#fff;padding:20px;overflow-y:auto;height:100%}
.login-wrap{width:100%;max-width:380px;animation:fadeUp .4s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.login-card{background:#fff;border:1px solid var(–border);border-radius:16px;padding:32px 28px 28px}
.brand{text-align:center;margin-bottom:28px}
.brand-name{font-size:26px;font-weight:700}
.brand-name span{color:var(–accent)}
.brand-sub{font-size:12px;color:var(–muted);margin-top:4px}
.field{margin-bottom:14px}
.field label{display:block;font-size:11px;font-weight:600;color:var(–muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.field input{width:100%;background:var(–surface);border:1px solid var(–border);border-radius:10px;padding:11px 14px;color:var(–text);font-size:14px;font-family:var(–font);outline:none}
.field input:focus{border-color:var(–accent);box-shadow:0 0 0 2px rgba(16,163,127,.15)}
.field-hint{font-size:11px;color:var(–muted);margin-top:4px}
.btn-login{width:100%;border:none;border-radius:10px;padding:12px;margin-top:6px;background:var(–accent);color:#fff;font-size:14px;font-weight:700;font-family:var(–font);cursor:pointer}
.btn-login:hover{background:var(–accent-h)}
.error-msg{min-height:18px;color:var(–danger);font-size:12px;margin-bottom:8px;text-align:center;font-weight:500}

/* ── CHAT SCREEN ── */
#chat-screen{max-width:860px;margin:0 auto;background:#fff;height:100dvh;display:flex;flex-direction:column;overflow:hidden;position:relative}

/* header */
.chat-header{background:#fff;border-bottom:1px solid var(–border);height:56px;min-height:56px;display:flex;align-items:center;gap:10px;padding:0 14px;z-index:100;flex-shrink:0}
.peer-avatar{width:36px;height:36px;border-radius:50%;background:var(–accent);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;flex-shrink:0}
.my-avatar-sm{width:28px;height:28px;border-radius:50%;background:var(–surface);border:1px solid var(–border2);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(–text2);flex-shrink:0}
.header-info{flex:1;min-width:0}
.header-room{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.header-sub{font-size:11px;color:var(–muted);display:flex;align-items:center;gap:5px;margin-top:1px}
#peer-status{flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.online-dot{width:6px;height:6px;border-radius:50%;background:var(–muted);flex-shrink:0}
.online-dot.on{background:var(–accent);box-shadow:0 0 5px rgba(16,163,127,.5)}
.header-actions{display:flex;gap:5px}
.btn-hdr{border:1px solid var(–border);border-radius:7px;padding:5px 10px;cursor:pointer;font-size:11px;font-weight:600;font-family:var(–font);background:transparent}
.btn-hdr.clear{color:var(–muted)}
.btn-hdr.leave{color:var(–danger);border-color:rgba(239,68,68,.3)}
.btn-hdr.search-btn{color:var(–muted)}

/* pin bar */
.pin-bar{background:#fffbea;border-bottom:1.5px solid #f0d060;border-right:4px solid var(–accent);padding:8px 14px;display:none;align-items:center;gap:10px;cursor:pointer;min-height:40px;flex-shrink:0}
.pin-bar.show{display:flex}
.pin-icon{font-size:14px;flex-shrink:0}
.pin-text{flex:1;font-size:12.5px;color:#5a4500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:600}
.pin-close{background:transparent;border:none;color:#7a6000;font-size:16px;cursor:pointer;opacity:.7}
.pin-close:hover{opacity:1}

/* search overlay */
.search-overlay{position:fixed;top:0;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:860px;z-index:8000;background:#fff;display:none;flex-direction:column}
.search-overlay.open{display:flex}
.search-header{display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:1px solid var(–border);height:56px;flex-shrink:0}
.search-input{flex:1;border:none;outline:none;font-size:15px;font-family:var(–font);color:var(–text);background:transparent}
.search-input::placeholder{color:#aaa}
.btn-close-search{background:transparent;border:none;font-size:18px;color:var(–muted);cursor:pointer}
.search-results{flex:1;overflow-y:auto;padding:12px 16px;display:flex;flex-direction:column;gap:8px}
.search-result-item{padding:10px 14px;border-radius:12px;background:var(–surface);border:1px solid var(–border);cursor:pointer}
.search-result-item:hover{background:#ececec}
.search-result-sender{font-size:11px;font-weight:700;color:var(–accent);margin-bottom:3px}
.search-result-text{font-size:13px;color:var(–text);line-height:1.4}
.search-result-text mark{background:#fff3a3;border-radius:3px;padding:0 2px}
.search-result-time{font-size:10px;color:var(–muted);margin-top:3px}
.search-empty{text-align:center;color:var(–muted);font-size:13px;margin-top:40px}

/* messages */
.messages-wrap{flex:1;position:relative;overflow:hidden;background:#fff;min-height:0;margin-bottom:64px}
#chat-screen.has-reply .messages-wrap{margin-bottom:108px}
.messages-area{width:100%;height:100%;overflow-y:auto;padding:12px 12px 8px;display:flex;flex-direction:column;gap:3px;-webkit-overflow-scrolling:touch;overscroll-behavior:contain}
.messages-area::-webkit-scrollbar{width:3px}
.messages-area::-webkit-scrollbar-thumb{background:var(–border2);border-radius:2px}

/* system msg */
.system-msg{align-self:center;background:var(–surface);border:1px solid var(–border);padding:4px 14px;border-radius:20px;color:var(–muted);font-size:11px;margin:6px 0;display:flex;align-items:center;gap:6px}
.system-msg-ts{font-size:10px;opacity:.6}
.empty-state{margin:auto;text-align:center;color:var(–muted)}

/* msg bubble */
.msg-wrapper{display:flex;width:100%;animation:fadeUp .18s ease}
.msg-wrapper.sent{justify-content:flex-start}
.msg-wrapper.recv{justify-content:flex-end}
.msg-row{display:flex;max-width:78%;width:auto;position:relative;transition:transform .15s ease}
.msg-wrapper.sent .msg-row{flex-direction:row}
.msg-wrapper.recv .msg-row{flex-direction:row-reverse}
.msg-bubble-wrap{display:flex;flex-direction:column;width:auto}
.msg-sender-name{font-size:11px;font-weight:600;color:var(–accent);margin-bottom:2px;padding:0 4px}

/* reply quotation inside bubble */
.reply-quotation{
background:rgba(0,0,0,.06);border-right:3px solid var(–accent);
padding:4px 8px;border-radius:6px;margin-bottom:5px;
font-size:11px;color:#4f4f4f;cursor:pointer;
transition:background .15s;
}
.reply-quotation:hover{background:rgba(0,0,0,.1)}
.msg-wrapper.sent .reply-quotation{background:rgba(255,255,255,.18);border-right-color:#fff;color:rgba(255,255,255,.85)}
.msg-wrapper.sent .reply-quotation:hover{background:rgba(255,255,255,.25)}
.reply-quotation-sender{font-weight:700;font-size:10px;margin-bottom:1px;color:var(–accent)}
.msg-wrapper.sent .reply-quotation-sender{color:#fff}
.reply-quotation-text{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:220px;display:block;font-size:11px}

.msg-bubble{
padding:7px 10px 18px;border-radius:12px;font-size:14px;line-height:1.45;
word-break:break-word;white-space:pre-wrap;position:relative;
display:inline-block;max-width:100%;min-width:80px;
-webkit-user-select:none;user-select:none;-webkit-touch-callout:none;
}
.msg-wrapper.sent .msg-bubble{background:var(–sent);color:#fff;border-bottom-right-radius:3px}
.msg-wrapper.recv .msg-bubble{background:var(–recv);color:var(–text);border-bottom-left-radius:3px}
.actual-msg-text{display:block}
.msg-meta{position:absolute;bottom:4px;right:8px;font-size:10px;color:rgba(255,255,255,.7);display:flex;align-items:center;gap:3px;white-space:nowrap;pointer-events:none}
.msg-wrapper.recv .msg-meta{color:var(–muted);right:auto;left:8px}
.tick-sent{color:rgba(255,255,255,.6)}
.tick-delivered{color:rgba(255,255,255,.8)}
.tick-read{color:#53bdeb}

/* media */
.chat-image{max-width:100%;max-height:220px;border-radius:10px;display:block;cursor:pointer;margin-bottom:3px}
.file-attachment{display:flex;align-items:center;gap:8px;background:rgba(0,0,0,.06);padding:8px 10px;border-radius:10px;text-decoration:none;color:var(–accent);font-weight:600;font-size:12px;border:1px solid rgba(0,0,0,.08);margin-bottom:3px}
.msg-wrapper.sent .file-attachment{background:rgba(255,255,255,.15);color:#fff;border-color:rgba(255,255,255,.2)}

/* voice */
.voice-msg{display:flex;align-items:center;gap:8px;min-width:180px;padding:2px 0}
.btn-play-voice{width:32px;height:32px;border-radius:50%;border:none;background:rgba(255,255,255,.25);color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:13px;flex-shrink:0}
.msg-wrapper.recv .btn-play-voice{background:rgba(0,0,0,.1);color:#333}
.voice-waveform{flex:1;height:24px;display:flex;align-items:center;gap:2px;cursor:pointer}
.voice-waveform span{display:inline-block;background:rgba(255,255,255,.5);border-radius:2px;width:3px;transition:background .1s}
.msg-wrapper.recv .voice-waveform span{background:rgba(0,0,0,.2)}
.voice-waveform span.played{background:rgba(255,255,255,.95)}
.msg-wrapper.recv .voice-waveform span.played{background:var(–accent)}
.voice-duration{font-size:11px;color:rgba(255,255,255,.7);min-width:30px}
.msg-wrapper.recv .voice-duration{color:var(–muted)}

/* reactions */
.reactions-bar{display:flex;flex-wrap:wrap;gap:3px;margin-top:3px;padding:0 2px}
.reactions-bar:empty{display:none}
.reaction-chip{display:inline-flex;align-items:center;gap:2px;background:#f0f0f0;border:1px solid #e0e0e0;border-radius:12px;padding:2px 6px;font-size:12px;cursor:pointer;transition:background .1s}
.reaction-chip:hover{background:#e5e5e5}
.reaction-chip.mine{background:#d4f0e8;border-color:#a8dccb}
.r-count{font-size:10px;color:#555}

/* msg actions group */
.msg-actions-group{
display:none;align-self:center;flex-direction:column;gap:3px;
background:#fff;border:1px solid var(–border);border-radius:10px;
padding:4px;box-shadow:0 2px 10px rgba(0,0,0,.1);flex-shrink:0;
position:relative;z-index:10;
}
.msg-wrapper.sent .msg-actions-group{margin-left:6px}
.msg-wrapper.recv .msg-actions-group{margin-right:6px}
.msg-row.active-actions .msg-actions-group{display:flex}
.msg-action-btn{background:transparent;border:none;cursor:pointer;font-size:14px;padding:3px 5px;border-radius:6px;line-height:1;transition:background .1s}
.msg-action-btn:hover{background:var(–surface)}

/* typing */
.typing-bar{position:fixed;bottom:64px;left:0;right:0;max-width:860px;margin:0 auto;padding:2px 16px;font-size:11px;color:var(–muted);height:20px;display:flex;align-items:center;gap:6px;z-index:998;pointer-events:none}
.typing-dots{display:flex;gap:3px}
.typing-dots span{width:4px;height:4px;border-radius:50%;background:var(–muted);animation:tdot 1.1s infinite}
.typing-dots span:nth-child(2){animation-delay:.18s}
.typing-dots span:nth-child(3){animation-delay:.36s}
@keyframes tdot{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-4px);opacity:1}}

/* scroll btn */
.btn-scroll-down{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#fff;border:1px solid var(–border);border-radius:50%;width:36px;height:36px;display:none;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 2px 10px rgba(0,0,0,.14);z-index:995;padding:0}
.btn-scroll-down.show{display:flex}
.btn-scroll-down svg{width:18px;height:18px;stroke:#666}
.unread-badge{position:absolute;top:-5px;right:-5px;background:var(–accent);color:#fff;border-radius:50%;width:17px;height:17px;font-size:9px;font-weight:700;display:none;align-items:center;justify-content:center}
.btn-scroll-down.has-unread .unread-badge{display:flex}

/* reply preview bar */
.reply-preview-bar{position:fixed;bottom:64px;left:0;right:0;max-width:860px;margin:0 auto;background:#fdfdfd;border-top:1px solid var(–border);padding:4px 14px;display:none;align-items:center;justify-content:space-between;height:40px;z-index:999}
#chat-screen.has-reply .reply-preview-bar{display:flex}
.reply-preview-content{border-right:3px solid var(–accent);padding-right:8px;font-size:11.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;color:#666}
.reply-preview-title{font-weight:700;font-size:10.5px;color:var(–accent);margin-bottom:1px}
.btn-close-reply{background:transparent;border:none;color:var(–muted);font-size:14px;cursor:pointer;padding:0 4px}

/* edit bar */
.edit-bar{position:fixed;bottom:64px;left:0;right:0;max-width:860px;margin:0 auto;background:#eefaf6;border-top:1px solid #a8dccb;padding:4px 14px;display:none;align-items:center;justify-content:space-between;height:40px;z-index:999}
.edit-bar.show{display:flex}
.edit-bar-content{border-right:3px solid var(–accent);padding-right:8px;font-size:11.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;color:#444}
.edit-bar-title{font-weight:700;font-size:10.5px;color:var(–accent-h);margin-bottom:1px}

/* upload bar */
.upload-bar{background:rgba(16,163,127,.1);padding:5px 16px;font-size:11px;color:var(–accent);font-weight:600;display:none;align-items:center;gap:8px;flex-shrink:0}
.upload-bar.show{display:flex}
.upload-spin{width:12px;height:12px;border-radius:50%;border:2px solid var(–accent);border-top-color:transparent;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.upload-progress{position:fixed;bottom:64px;left:0;right:0;max-width:860px;margin:0 auto;height:3px;background:rgba(16,163,127,.2);z-index:1001;display:none}
.upload-progress.show{display:block}
.upload-progress-bar{height:100%;background:var(–accent);width:0%;transition:width .2s;border-radius:2px}

/* input area */
.input-area{position:fixed;bottom:0;left:0;right:0;max-width:860px;margin:0 auto;background:#fff;padding:10px 12px;padding-bottom:calc(10px + env(safe-area-inset-bottom));display:flex;gap:8px;align-items:flex-end;border-top:1px solid var(–border);z-index:1000}
.input-wrap{flex:1;background:var(–surface);border-radius:22px;display:flex;align-items:flex-end;gap:4px;padding:7px 10px;border:1px solid var(–border2);min-height:42px;transition:border-color .2s}
.input-wrap:focus-within{border-color:var(–accent)}
.btn-attach{border:none;background:transparent;color:var(–muted);cursor:pointer;font-size:17px;display:flex;align-items:center;justify-content:center;width:28px;height:28px;flex-shrink:0;align-self:flex-end;margin-bottom:1px}
.msg-input{flex:1;border:none;outline:none;background:transparent;color:var(–text);font-size:14px;font-family:var(–font);resize:none;max-height:120px;line-height:1.5;padding:1px 0;align-self:flex-end}
.msg-input::placeholder{color:#aaa}
.rec-timer{font-size:12px;color:var(–danger);font-weight:600;display:none;align-items:center;gap:5px;align-self:flex-end;margin-bottom:2px}
.rec-timer.show{display:flex}
.rec-dot{width:7px;height:7px;border-radius:50%;background:var(–danger);animation:recP .8s infinite;flex-shrink:0}
@keyframes recP{0%,100%{transform:scale(1)}50%{transform:scale(1.3)}}
.btn-send{width:40px;height:40px;border:none;border-radius:50%;background:var(–accent);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .15s}
.btn-send:hover{background:var(–accent-h)}
.btn-send svg{width:16px;height:16px;fill:#fff}
.btn-voice{width:40px;height:40px;border:none;border-radius:50%;background:var(–surface);color:var(–muted);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:17px;transition:background .15s}
.btn-voice.recording{background:#fee2e2;color:var(–danger);animation:recP .8s infinite}

/* emoji input picker */
.input-emoji-picker{position:fixed;bottom:68px;left:0;right:0;max-width:860px;margin:0 auto;background:#fff;border-top:1px solid var(–border);padding:8px 10px;display:none;flex-wrap:wrap;gap:6px;z-index:1001}
.input-emoji-picker.show{display:flex}
.input-emoji-picker span,.context-emoji-picker span{font-size:22px;cursor:pointer;padding:4px;border-radius:8px;transition:background .1s}
.input-emoji-picker span:hover{background:var(–surface)}
.btn-emoji-input{border:none;background:transparent;color:var(–muted);cursor:pointer;font-size:17px;display:flex;align-items:center;justify-content:center;width:28px;height:28px;flex-shrink:0;align-self:flex-end;margin-bottom:1px}

/* context emoji picker */
.context-emoji-picker{position:fixed;background:#fff;border:1px solid var(–border);border-radius:30px;padding:6px 10px;display:none;gap:4px;z-index:6000;box-shadow:0 4px 20px rgba(0,0,0,.12)}
.context-emoji-picker span:hover{background:var(–surface)}

/* image preview */
.img-preview-wrap{position:fixed;inset:0;z-index:7000;background:#111;display:none;flex-direction:column}
.img-preview-wrap.open{display:flex}
.img-preview-main{flex:1;display:flex;align-items:center;justify-content:center;overflow:hidden;padding:16px;min-height:0}
.img-preview-main img{max-width:100%;max-height:100%;object-fit:contain;border-radius:8px}
.img-preview-strip{display:none;gap:6px;padding:8px 12px;overflow-x:auto;background:rgba(0,0,0,.4);flex-shrink:0;justify-content:center}
.img-preview-strip.multi{display:flex}
.prev-thumb{position:relative;width:56px;height:56px;border-radius:8px;overflow:hidden;border:2px solid transparent;cursor:pointer;flex-shrink:0}
.prev-thumb.active{border-color:#fff}
.prev-thumb img{width:100%;height:100%;object-fit:cover}
.remove-thumb{position:absolute;top:2px;right:2px;width:18px;height:18px;border-radius:50%;background:rgba(0,0,0,.7);color:#fff;border:none;font-size:10px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.img-preview-actions{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;padding-bottom:calc(10px + env(safe-area-inset-bottom));background:rgba(0,0,0,.5);flex-shrink:0}
.img-preview-count{font-size:13px;color:rgba(255,255,255,.8)}
.img-preview-btns{display:flex;gap:10px}
.btn-send-img{background:var(–accent);color:#fff;border:none;border-radius:10px;padding:10px 24px;font-size:14px;font-weight:700;font-family:var(–font);cursor:pointer}
.btn-cancel-img{background:rgba(255,255,255,.15);color:#fff;border:none;border-radius:10px;padding:10px 16px;font-size:14px;font-family:var(–font);cursor:pointer}

/* toast */
.toast{position:fixed;bottom:85px;left:50%;transform:translateX(-50%);background:#0d0d0d;color:#fff;padding:8px 18px;border-radius:10px;font-size:13px;opacity:0;transition:.3s;z-index:9999;white-space:nowrap}
.toast.show{opacity:1}

/* img modal */
.img-modal{position:fixed;inset:0;z-index:9000;background:rgba(0,0,0,.9);display:none;align-items:center;justify-content:center;padding:20px}
.img-modal.open{display:flex}
.img-modal img{max-width:100%;max-height:90vh;border-radius:8px}
.img-modal-close{position:absolute;top:20px;right:20px;width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.15);border:none;color:#fff;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center}

/* animations */
@keyframes bubbleIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
@keyframes floatHeart{0%{opacity:1;transform:translateX(-50%) scale(1) translateY(0)}60%{opacity:1;transform:translateX(-50%) scale(1.5) translateY(-24px)}100%{opacity:0;transform:translateX(-50%) scale(1.2) translateY(-40px)}}
.msg-bubble.tapped{filter:brightness(.92)}
</style>

</head>
<body>
<div id="app">

<!-- LOGIN -->

<div id="login-screen" class="screen">
  <div class="login-wrap">
    <div class="login-card">
      <div class="brand">
        <div class="brand-name">Chat<span>BFT</span></div>

<script>
/* ══ FIREBASE CONFIG ══ */
const FIREBASE_CONFIG = {
  apiKey:"AIzaSyCqkSRiU0n0G4AFSJQCLCO-wqip6sKwCz0",
  authDomain:"syncchat-6e22b.firebaseapp.com",
  databaseURL:"https://syncchat-6e22b-default-rtdb.europe-west1.firebasedatabase.app",
  projectId:"syncchat-6e22b",
  storageBucket:"syncchat-6e22b.firebasestorage.app",
  messagingSenderId:"692797381468",
  appId:"1:692797381468:web:9faaed7bf44f0f527a3f99"
};
const CLOUDINARY_CLOUD='db03wdg7v', CLOUDINARY_PRESET='ekk7u3hb';

/* ══ STATE ══ */
let db;
let myName,myId,roomId;
let messagesRef,presenceRef,typingRef,roomPresenceRef;
let currentActivePeerRef=null, peerTypingListener=null;
let typingTimeout, inactivityTimeout;
let isInitialLoad=true;
let allMessages={};
let currentReplyTarget=null;
let currentEditKey=null;
let pinnedMsgKey=null, pinnedMsgText='';
let activeRowKey=null;
let ctxReactKey=null;
let unreadCount=0, isAtBottom=true;
let pendingFiles=[], activePreviewIdx=0;
let mediaRecorder=null, audioChunks=[], recInterval=null, recSeconds=0;
let currentAudio=null, currentPlayBtn=null;
const INACTIVITY_LIMIT=2*60*1000;

/* ══ HELPERS ══ */
const $=id=>document.getElementById(id);
const esc=s=>String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const initials=n=>n.trim().slice(0,2).toUpperCase();
const genId=()=>Math.random().toString(36).slice(2,10);
const fmt=ts=>new Date(ts).toLocaleTimeString('ar-EG',{hour:'2-digit',minute:'2-digit'});

function showToast(msg){const t=$('toast');t.textContent=msg;t.classList.add('show');clearTimeout(window._tt);window._tt=setTimeout(()=>t.classList.remove('show'),2800)}
function openImgModal(src){$('modal-img').src=src;$('img-modal').classList.add('open')}
function closeImgModal(){$('img-modal').classList.remove('open')}
function initFirebase(){if(!firebase.apps.length)firebase.initializeApp(FIREBASE_CONFIG);db=firebase.database()}

function startInactivityTimer(){
  resetInactivityTimer();
  ['mousemove','click','keydown','scroll','touchstart'].forEach(e=>window.addEventListener(e,resetInactivityTimer,true));
}
function stopInactivityTimer(){
  clearTimeout(inactivityTimeout);
  ['mousemove','click','keydown','scroll','touchstart'].forEach(e=>window.removeEventListener(e,resetInactivityTimer,true));
}
function resetInactivityTimer(){clearTimeout(inactivityTimeout);if(roomId)inactivityTimeout=setTimeout(leaveRoom,INACTIVITY_LIMIT)}

/* ══ CLOSE ALL MENUS ══ */
function closeAllMenus(e){
  if(activeRowKey){
    const r=document.getElementById('msgrow-'+activeRowKey);
    if(r)r.classList.remove('active-actions');
    activeRowKey=null;
  }
  $('input-emoji-picker').classList.remove('show');
  $('context-emoji-picker').style.display='none';
}
document.addEventListener('click',closeAllMenus);

/* ══ EMOJI INPUT ══ */
function toggleEmojiPicker(e){e.stopPropagation();$('input-emoji-picker').classList.toggle('show')}
function insertEmoji(em){$('msg-input').value+=(em);$('input-emoji-picker').classList.remove('show');$('msg-input').focus()}

/* ══ JOIN ROOM ══ */
async function joinRoom(){
  const name=$('name-input').value.trim();
  const room=$('room-input').value.trim().replace(/\s+/g,'');
  const err=$('login-error');err.textContent='';
  if(!name){err.textContent='من فضلك أدخل اسمك';return}
  if(!room){err.textContent='من فضلك أدخل رمز الغرفة';return}
  const btn=$('join-btn');btn.disabled=true;btn.textContent='جاري الدخول...';
  try{initFirebase()}catch(e){err.textContent='خطأ في Firebase';btn.disabled=false;return}

  myName=name;myId=genId();roomId=room;isInitialLoad=true;allMessages={};
  messagesRef=db.ref(`rooms/${roomId}/messages`);
  presenceRef=db.ref(`rooms/${roomId}/presence/${myName}`);
  typingRef=db.ref(`rooms/${roomId}/typing/${myId}`);
  roomPresenceRef=db.ref(`rooms/${roomId}/presence`);

  await presenceRef.set({name:myName,online:true,joinedAt:Date.now()});
  presenceRef.onDisconnect().set({name:myName,online:false,lastSeen:firebase.database.ServerValue.TIMESTAMP});
  typingRef.onDisconnect().remove();

  $('my-avatar').textContent=initials(myName);
  $('header-room-id').textContent='غرفة: '+roomId;

  setupListeners();
  startInactivityTimer();
  initScrollButton();

  $('login-screen').classList.add('hidden');
  $('chat-screen').classList.remove('hidden');
  await messagesRef.push({type:'system',text:myName+' انضم إلى المحادثة',ts:Date.now()});
}

/* ══ LISTENERS ══ */
function setupListeners(){
  /* Presence */
  roomPresenceRef.on('value',snap=>{
    const data=snap.val()||{};
    const dot=$('online-dot'),txt=$('peer-status'),pav=$('peer-avatar');
    const peers=Object.entries(data).filter(([k,u])=>u&&u.name&&u.name!==myName);
    if(currentActivePeerRef){currentActivePeerRef.off();currentActivePeerRef=null}
    if(!peers.length){dot.classList.remove('on');txt.textContent='في انتظار الطرف الآخر...';pav.textContent='؟';return}
    const online=peers.filter(([,u])=>u.online===true);
    const offline=peers.filter(([,u])=>u.online!==true);
    const [ck,cu]=(online.length?online.sort((a,b)=>(b[1].joinedAt||0)-(a[1].joinedAt||0)):offline.sort((a,b)=>(b[1].lastSeen||0)-(a[1].lastSeen||0)))[0];
    pav.textContent=initials(cu.name||'؟');
    currentActivePeerRef=db.ref(`rooms/${roomId}/presence/${ck}`);
    currentActivePeerRef.on('value',ps=>{
      const u=ps.val();if(!u)return;
      pav.textContent=initials(u.name||'؟');
      if(u.online){dot.classList.add('on');txt.textContent=u.name+' متصل الآن'}
      else{
        dot.classList.remove('on');
        if(u.lastSeen){
          const d=new Date(u.lastSeen),now=new Date();
          const t=d.toLocaleTimeString('ar-EG',{hour:'2-digit',minute:'2-digit'});
          const isToday=d.toDateString()===now.toDateString();
          const dt=isToday?t:d.toLocaleDateString('ar-EG',{day:'numeric',month:'numeric'})+' '+t;
          txt.textContent='آخر ظهور '+dt;
        }else{txt.textContent=u.name+' غير متصل'}
      }
    });
  });

  /* Typing */
  if(peerTypingListener)db.ref(`rooms/${roomId}/typing`).off('value',peerTypingListener);
  peerTypingListener=db.ref(`rooms/${roomId}/typing`).on('value',snap=>{
    const data=snap.val()||{};
    const active=Object.entries(data).find(([id,v])=>id!==myId&&v===true);
    const bar=$('typing-bar');
    if(active){
      db.ref(`rooms/${roomId}/presence`).once('value',ps=>{
        const pd=ps.val()||{};const found=Object.values(pd).find(u=>u.online&&u.name!==myName);
        bar.innerHTML=`<div class="typing-dots"><span></span><span></span><span></span></div><span>${esc(found?found.name:'الطرف الآخر')} يكتب الآن...</span>`;
      });
    }else{bar.innerHTML=''}
  });

  /* Clear signal */
  db.ref(`rooms/${roomId}/clearSignal`).on('child_added',()=>{
    allMessages={};
    const area=$('messages-area');
    if(area)area.innerHTML='<div class="empty-state" id="empty-state"><div style="font-size:40px;margin-bottom:8px;opacity:.3">🗑️</div><p>تم مسح المحادثة</p></div>';
  });

  /* Messages — load all sorted first */
  messagesRef.once('value',snap=>{
    isInitialLoad=false;
    const data=snap.val()||{};
    Object.entries(data).forEach(([k,m])=>{allMessages[k]=m});
    renderAllMessages();
    setTimeout(scrollToBottom,100);
  });

  /* New messages */
  messagesRef.on('child_added',snap=>{
    if(isInitialLoad)return;
    if(allMessages[snap.key])return;
    allMessages[snap.key]=snap.val();
    appendMsgToDOM(snap.val(),snap.key);
    if(snap.val().type!=='system'&&snap.val().senderName!==myName){
      playNotifSound();
      if(!isAtBottom){unreadCount++;updateBadge();$('btn-scroll-down').classList.add('show')}
    }
    if(isAtBottom||snap.val().senderName===myName)setTimeout(scrollToBottom,50);
  });

  /* Edit */
  messagesRef.on('child_changed',snap=>{
    allMessages[snap.key]=snap.val();
    const el=document.getElementById('msgrow-'+snap.key);
    if(!el)return;
    const t=el.querySelector('.actual-msg-text');
    if(t&&snap.val().text)t.innerHTML=esc(snap.val().text)+(snap.val().isEdited?'<small style="font-size:10px;opacity:.5;font-style:italic"> (معدلة)</small>':'');
  });

  /* Delete */
  messagesRef.on('child_removed',snap=>{
    delete allMessages[snap.key];
    const wrap=document.querySelector(`[data-key="${snap.key}"]`);
    if(wrap)wrap.remove();
  });

  /* Read receipts */
  db.ref(`rooms/${roomId}/readBy`).on('value',snap=>{
    const data=snap.val()||{};
    if(Object.entries(data).find(([id])=>id!==myId)){
      document.querySelectorAll('.check-icon').forEach(el=>{el.classList.remove('tick-sent','tick-delivered');el.classList.add('tick-read');el.textContent='✓✓'});
    }
  });
  markAsRead();
  document.addEventListener('visibilitychange',()=>{if(document.visibilityState==='visible'&&roomId)markAsRead()});

  /* Pin */
  db.ref(`rooms/${roomId}/pinnedMsg`).on('value',snap=>{
    const d=snap.val();
    if(d&&d.key){pinnedMsgKey=d.key;pinnedMsgText=d.text||'رسالة مثبتة';$('pin-text').textContent=pinnedMsgText;$('pin-bar').classList.add('show')}
    else{pinnedMsgKey=null;$('pin-bar').classList.remove('show')}
  });
}

function markAsRead(){if(roomId&&myId)db.ref(`rooms/${roomId}/readBy/${myId}`).set(Date.now())}

/* ══ RENDER ══ */
function renderAllMessages(){
  const area=$('messages-area');if(!area)return;
  area.innerHTML='';
  const sorted=Object.entries(allMessages).sort((a,b)=>(a[1].ts||0)-(b[1].ts||0));
  if(!sorted.length){
    area.innerHTML='<div class="empty-state" id="empty-state"><div style="font-size:40px;margin-bottom:8px;opacity:.3">💬</div><p>ابدأ المحادثة الآن</p></div>';
    return;
  }
  sorted.forEach(([k,m])=>appendMsgToDOM(m,k,area));
}

function appendMsgToDOM(msg,key,areaEl){
  const area=areaEl||$('messages-area');
  if(!area)return;
  const empty=$('empty-state');if(empty)empty.remove();
  const div=document.createElement('div');

  if(msg.type==='system'){
    div.className='system-msg';
    div.innerHTML=`<span>${esc(msg.text)}</span><span class="system-msg-ts">${fmt(msg.ts||Date.now())}</span>`;
  }else{
    const sent=msg.senderName===myName;
    div.className='msg-wrapper '+(sent?'sent':'recv');
    div.setAttribute('data-key',key);

    /* media */
    let mediaHtml='';
    if(msg.fileUrl){
      if(msg.fileType==='audio'||(msg.fileType&&msg.fileType.startsWith('audio/'))){
        const dur=msg.voiceDuration||0,mm=Math.floor(dur/60),ss=dur%60;
        const bars=Array.from({length:26},(_,i)=>`<span style="height:${6+Math.floor(Math.abs(Math.sin(i*.7))*16)}px"></span>`).join('');
        mediaHtml=`<div class="voice-msg" data-url="${esc(msg.fileUrl)}"><button class="btn-play-voice" onclick="playVoice(this,event)">▶</button><div class="voice-progress-wrap"><div class="voice-waveform">${bars}</div></div><span class="voice-duration">${mm}:${String(ss).padStart(2,'0')}</span></div>`;
      }else if(msg.fileType&&msg.fileType.startsWith('image/')){
        mediaHtml=`<img src="${esc(msg.fileUrl)}" class="chat-image" loading="lazy">`;
      }else{
        mediaHtml=`<a href="${esc(msg.fileUrl)}" target="_blank" class="file-attachment"><span style="font-size:18px">📄</span><div><div style="font-size:12px;font-weight:700">${esc(msg.fileName||'ملف')}</div><div style="font-size:10px;opacity:.7">${(msg.fileName||'').split('.').pop().toUpperCase()}</div></div></a>`;
      }
    }

    /* reply quotation */
    let replyHtml='';
    if(msg.replyTo){
      const rt=msg.replyTo;
      const preview=rt.fileUrl&&!rt.text?'[ملف / ميديا]':(rt.text||'').slice(0,60);
      replyHtml=`<div class="reply-quotation" data-targetkey="${esc(rt.key||'')}"><div class="reply-quotation-sender">${esc(rt.senderName||'')}</div><span class="reply-quotation-text">${esc(preview)}</span></div>`;
    }

    const senderHtml=!sent?`<div class="msg-sender-name">${esc(msg.senderName||'')}</div>`:'';
    const edited=msg.isEdited?'<small style="font-size:10px;opacity:.5;font-style:italic"> (معدلة)</small>':'';
    const safeText=(msg.text||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'&quot;').replace(/\n/g,'\\n');

    /* actions */
    const actHtml=`<div class="msg-actions-group">
      <button class="msg-action-btn" onclick="initiateReply('${esc(msg.senderName)}','${safeText}','${key}',event)" title="رد">↩</button>
      ${(sent&&!msg.fileUrl)?`<button class="msg-action-btn" onclick="initiateEdit('${key}','${safeText}',event)" title="تعديل">✏️</button>`:''}
      ${msg.text?`<button class="msg-action-btn" onclick="copyText('${safeText}',event)" title="نسخ">📋</button>`:''}
      <button class="msg-action-btn" onclick="togglePin('${key}','${safeText}',event)" title="تثبيت">📌</button>
      ${sent?`<button class="msg-action-btn" onclick="deleteMsg('${key}',event)" title="حذف">🗑️</button>`:''}
    </div>`;

    div.innerHTML=`<div class="msg-row" id="msgrow-${key}" data-key="${key}">
      <div class="msg-bubble-wrap">
        ${senderHtml}
        <div class="msg-bubble" onclick="toggleActions('${key}',event)" oncontextmenu="showCtxEmoji('${key}',event)">
          ${replyHtml}
          ${mediaHtml}
          ${msg.text?`<span class="actual-msg-text">${esc(msg.text)}${edited}</span>`:''}
          <span class="msg-meta">${fmt(msg.ts||Date.now())}${sent?` <span class="check-icon tick-sent" id="tick-${key}">✓</span>`:''}</span>
        </div>
        <div class="reactions-bar" data-msgkey="${key}"></div>
      </div>
      ${actHtml}
    </div>`;

    /* image click */
    const img=div.querySelector('.chat-image');
    if(img)img.addEventListener('click',e=>{e.stopPropagation();openImgModal(msg.fileUrl)});

    /* reply quotation click → jump */
    const qt=div.querySelector('.reply-quotation');
    if(qt)qt.addEventListener('click',e=>{e.stopPropagation();jumpToMsg(qt.dataset.targetkey)});

    /* swipe to reply */
    const row=div.querySelector('.msg-row');
    if(row){
      let sx=0,sy=0,sw=false;
      row.addEventListener('touchstart',e=>{sx=e.touches[0].clientX;sy=e.touches[0].clientY;sw=false},{passive:true});
      row.addEventListener('touchmove',e=>{
        const dx=e.touches[0].clientX-sx,dy=Math.abs(e.touches[0].clientY-sy);
        if(dy>12)return;
        if((sent&&dx>0)||(!sent&&dx<0)){sw=true;row.style.transform=`translateX(${Math.min(Math.abs(dx),55)*(sent?1:-1)}px)`}
      },{passive:true});
      row.addEventListener('touchend',()=>{
        const v=parseInt(row.style.transform.replace(/[^0-9-]/g,''))||0;
        row.style.transform='';row.style.transition='transform .2s';
        setTimeout(()=>row.style.transition='',200);
        if(sw&&Math.abs(v)>=40)initiateReply(msg.senderName,msg.text||'',key);
      },{passive:true});
    }

    /* double tap → ❤️ */
    const bubble=div.querySelector('.msg-bubble');
    if(bubble){
      let lastTap=0;
      bubble.addEventListener('touchstart',e=>{
        const now=Date.now();
        if(now-lastTap<380){
          e.preventDefault();
          bubble.classList.add('tapped');setTimeout(()=>bubble.classList.remove('tapped'),250);
          quickReact(key,'❤️',bubble);lastTap=0;
        }else{lastTap=now}
      },{passive:false});
      bubble.addEventListener('dblclick',e=>{
        e.preventDefault();bubble.classList.add('tapped');setTimeout(()=>bubble.classList.remove('tapped'),250);
        quickReact(key,'❤️',bubble);
      });
      bubble.addEventListener('contextmenu',e=>{e.preventDefault();showCtxEmoji(key,e)});
    }
  }

  area.appendChild(div);

  /* reactions listener */
  if(key)db.ref(`rooms/${roomId}/reactions/${key}`).on('value',snap=>renderReactions(key,snap.val()||{}));
}

/* ══ ACTIONS ══ */
function toggleActions(key,e){
  if(e)e.stopPropagation();
  const row=document.getElementById('msgrow-'+key);
  if(activeRowKey&&activeRowKey!==key){
    const prev=document.getElementById('msgrow-'+activeRowKey);
    if(prev)prev.classList.remove('active-actions');
  }
  if(activeRowKey===key){row&&row.classList.remove('active-actions');activeRowKey=null}
  else{row&&row.classList.add('active-actions');activeRowKey=key}
}

function showCtxEmoji(key,e){
  e.preventDefault();e.stopPropagation();
  ctxReactKey=key;
  const picker=$('context-emoji-picker');
  picker.style.display='flex';
  const x=Math.min(e.clientX,window.innerWidth-220);
  const y=Math.min(e.clientY,window.innerHeight-60);
  picker.style.left=x+'px';picker.style.top=y+'px';
}
function triggerCtxReact(emoji){
  if(ctxReactKey){const el=document.querySelector(`#msgrow-${ctxReactKey} .msg-bubble`);quickReact(ctxReactKey,emoji,el)}
  $('context-emoji-picker').style.display='none';
}

function initiateReply(senderName,text,targetKey,e){
  if(e)e.stopPropagation();
  cancelEdit();
  currentReplyTarget={senderName,text,key:targetKey};
  $('reply-preview-sender').textContent='الرد على '+senderName;
  $('reply-preview-text').textContent=(text||'[ملف / ميديا]').slice(0,60);
  $('chat-screen').classList.add('has-reply');
  $('msg-input').focus();
  if(activeRowKey)toggleActions(activeRowKey);
}
function cancelReply(){currentReplyTarget=null;$('chat-screen').classList.remove('has-reply')}

function initiateEdit(key,rawText,e){
  if(e)e.stopPropagation();
  cancelReply();
  currentEditKey=key;
  const clean=rawText.replace(/\\n/g,'\n').replace(/\\'/g,"'");
  $('msg-input').value=clean;
  $('edit-preview-text').textContent=clean.slice(0,60);
  $('edit-bar').classList.add('show');
  $('msg-input').focus();
  if(activeRowKey)toggleActions(activeRowKey);
}
function cancelEdit(){
  currentEditKey=null;
  $('edit-bar').classList.remove('show');
  $('msg-input').value='';
  $('msg-input').style.height='auto';
}

function copyText(rawText,e){
  if(e)e.stopPropagation();
  const clean=rawText.replace(/\\n/g,'\n').replace(/\\'/g,"'");
  if(navigator.clipboard&&window.isSecureContext){
    navigator.clipboard.writeText(clean).then(()=>showToast('تم النسخ 📋')).catch(()=>fallbackCopy(clean));
  }else{fallbackCopy(clean)}
  if(activeRowKey)toggleActions(activeRowKey);
}
function fallbackCopy(text){
  const ta=document.createElement('textarea');ta.value=text;ta.style.cssText='position:fixed;top:0;left:0;opacity:0';
  document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);showToast('تم النسخ 📋');
}

async function deleteMsg(key,e){
  if(e)e.stopPropagation();
  if(!confirm('حذف الرسالة للجميع؟'))return;
  try{
    await db.ref(`rooms/${roomId}/messages/${key}`).remove();
    await db.ref(`rooms/${roomId}/reactions/${key}`).remove();
    if(pinnedMsgKey===key)await db.ref(`rooms/${roomId}/pinnedMsg`).remove();
    showToast('تم الحذف 🗑️');
  }catch(e){showToast('فشل الحذف ❌')}
}

async function togglePin(key,text,e){
  if(e)e.stopPropagation();
  if(pinnedMsgKey===key){await unpinMessage()}
  else{await pinMsg(key,text)}
  if(activeRowKey)toggleActions(activeRowKey);
}
async function pinMsg(key,text){
  try{await db.ref(`rooms/${roomId}/pinnedMsg`).set({key,text:(text||'').replace(/\\n/g,' ').slice(0,80),by:myName});showToast('تم التثبيت 📌')}catch(e){showToast('فشل التثبيت')}
}
async function unpinMessage(e){
  if(e){e.preventDefault();e.stopPropagation()}
  try{await db.ref(`rooms/${roomId}/pinnedMsg`).remove();showToast('تم إلغاء التثبيت')}catch(e){}
}
function scrollToPinned(){if(pinnedMsgKey)jumpToMsg(pinnedMsgKey)}

/* ══ SEND ══ */
async function sendMessage(){
  const input=$('msg-input');const text=input.value.trim();
  if(!text&&!currentReplyTarget&&!currentEditKey)return;
  if(!messagesRef)return;

  if(currentEditKey){
    const k=currentEditKey;cancelEdit();
    try{
      await db.ref(`rooms/${roomId}/messages/${k}`).update({text,isEdited:true,editedAt:firebase.database.ServerValue.TIMESTAMP});
      showToast('تم التعديل ✨');
    }catch(e){showToast('فشل التعديل ❌')}
    return;
  }

  input.value='';input.style.height='auto';clearTypingNow();
  setTimeout(()=>input.focus(),50);

  const payload={type:'message',text,senderId:myId,senderName:myName,ts:Date.now()};
  if(currentReplyTarget){payload.replyTo=currentReplyTarget;cancelReply()}
  try{await messagesRef.push(payload);setTimeout(scrollToBottom,50)}
  catch(e){showToast('فشل الإرسال ❌');input.value=text}
}

/* ══ FILE UPLOAD ══ */
function handleFileSelect(input){
  const files=Array.from(input.files);if(!files.length)return;input.value='';
  const imgs=files.filter(f=>f.type.startsWith('image/'));
  const rest=files.filter(f=>!f.type.startsWith('image/'));
  rest.forEach(f=>uploadAndSend(f));
  if(imgs.length){pendingFiles=[...pendingFiles,...imgs];renderPreview(0);$('img-preview-wrap').classList.add('open')}
}

function renderPreview(idx){
  if(idx!==undefined)activePreviewIdx=idx;
  activePreviewIdx=Math.max(0,Math.min(activePreviewIdx,pendingFiles.length-1));
  const strip=$('img-preview-strip');const main=$('img-preview-main-el');const cnt=$('img-preview-count');
  strip.innerHTML='';
  const r=new FileReader();r.onload=e=>{main.src=e.target.result};r.readAsDataURL(pendingFiles[activePreviewIdx]);
  pendingFiles.forEach((f,i)=>{
    const th=document.createElement('div');th.className='prev-thumb'+(i===activePreviewIdx?' active':'');
    const im=document.createElement('img');const r2=new FileReader();r2.onload=e=>{im.src=e.target.result};r2.readAsDataURL(f);
    const rm=document.createElement('button');rm.className='remove-thumb';rm.textContent='✕';
    rm.onclick=e=>{e.stopPropagation();pendingFiles.splice(i,1);if(!pendingFiles.length){cancelImgPreview();return}renderPreview(Math.min(i,pendingFiles.length-1))};
    th.appendChild(im);th.appendChild(rm);th.addEventListener('click',()=>renderPreview(i));strip.appendChild(th);
  });
  strip.className='img-preview-strip'+(pendingFiles.length>1?' multi':'');
  cnt.textContent=pendingFiles.length>1?`${activePreviewIdx+1} / ${pendingFiles.length}`:'';
}
function cancelImgPreview(){pendingFiles=[];activePreviewIdx=0;$('img-preview-wrap').classList.remove('open');$('img-preview-main-el').src=''}
async function confirmSendImage(){
  if(!pendingFiles.length)return;
  $('img-preview-wrap').classList.remove('open');
  const toSend=[...pendingFiles];pendingFiles=[];
  for(const f of toSend)await uploadAndSend(f);
}

async function uploadAndSend(file){
  const bar=$('upload-bar'),prog=$('upload-progress'),pb=$('upload-progress-bar');
  bar.classList.add('show');prog.classList.add('show');pb.style.width='0%';
  try{
    const url=await uploadCloudinary(file,p=>pb.style.width=p+'%');
    const payload={type:'message',text:'',fileUrl:url,fileName:file.name,fileType:file.type,senderId:myId,senderName:myName,ts:Date.now()};
    if(currentReplyTarget){payload.replyTo=currentReplyTarget;cancelReply()}
    await messagesRef.push(payload);showToast('تم الإرسال ✅');setTimeout(scrollToBottom,50);
  }catch(e){showToast('فشل الرفع ❌')}
  finally{bar.classList.remove('show');prog.classList.remove('show')}
}

function uploadCloudinary(file,onProg){
  return new Promise((res,rej)=>{
    const fd=new FormData();fd.append('file',file);fd.append('upload_preset',CLOUDINARY_PRESET);fd.append('folder',`chatbft/${roomId}`);
    const rt=file.type.startsWith('video/')?'video':file.type.startsWith('image/')?'image':'raw';
    const xhr=new XMLHttpRequest();xhr.open('POST',`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD}/${rt}/upload`);
    xhr.upload.onprogress=e=>{if(e.lengthComputable)onProg(Math.round(e.loaded/e.total*100))};
    xhr.onload=()=>{if(xhr.status===200)res(JSON.parse(xhr.responseText).secure_url);else rej(new Error('Upload failed'))};
    xhr.onerror=()=>rej(new Error('Network'));xhr.send(fd);
  });
}

/* ══ VOICE ══ */
async function toggleVoiceRecord(){if(mediaRecorder&&mediaRecorder.state==='recording')stopRec();else startRec()}
async function startRec(){
  try{
    const stream=await navigator.mediaDevices.getUserMedia({audio:true});
    const mt=MediaRecorder.isTypeSupported('audio/webm;codecs=opus')?'audio/webm;codecs=opus':MediaRecorder.isTypeSupported('audio/mp4')?'audio/mp4':'audio/webm';
    mediaRecorder=new MediaRecorder(stream,{mimeType:mt});audioChunks=[];recSeconds=0;
    mediaRecorder.ondataavailable=e=>{if(e.data.size>0)audioChunks.push(e.data)};
    mediaRecorder.onstop=async()=>{stream.getTracks().forEach(t=>t.stop());const blob=new Blob(audioChunks,{type:mt});await uploadVoice(blob,mt)};
    mediaRecorder.start(200);
    $('btn-voice').classList.add('recording');$('btn-voice').textContent='⏹';
    $('rec-timer').classList.add('show');$('msg-input').style.display='none';
    recInterval=setInterval(()=>{recSeconds++;const mm=Math.floor(recSeconds/60),ss=recSeconds%60;$('rec-time').textContent=mm+':'+String(ss).padStart(2,'0');if(recSeconds>=120)stopRec()},1000);
  }catch(e){showToast('تعذر الوصول للميكروفون ❌')}
}
function stopRec(){
  if(mediaRecorder&&mediaRecorder.state!=='inactive')mediaRecorder.stop();
  clearInterval(recInterval);$('btn-voice').classList.remove('recording');$('btn-voice').textContent='🎤';
  $('rec-timer').classList.remove('show');$('msg-input').style.display='';
}
async function uploadVoice(blob,mt){
  const name=`voice_${genId()}.${mt.includes('mp4')?'mp4':'webm'}`;
  const bar=$('upload-bar');bar.classList.add('show');
  try{
    const file=new File([blob],name,{type:mt});
    const url=await uploadCloudinary(file,()=>{});
    const payload={type:'message',text:'',fileUrl:url,fileName:name,fileType:'audio',voiceDuration:recSeconds,senderId:myId,senderName:myName,ts:Date.now()};
    if(currentReplyTarget){payload.replyTo=currentReplyTarget;cancelReply()}
    await messagesRef.push(payload);showToast('تم إرسال الرسالة الصوتية ✅');setTimeout(scrollToBottom,50);
  }catch(e){showToast('فشل رفع الصوت ❌')}
  finally{bar.classList.remove('show')}
}

/* ══ VOICE PLAYER ══ */
function playVoice(btn,e){
  if(e)e.stopPropagation();
  const vm=btn.closest('.voice-msg');const url=vm.dataset.url;
  const bars=vm.querySelectorAll('.voice-waveform span');const durEl=vm.querySelector('.voice-duration');
  if(currentAudio&&!currentAudio.paused){
    if(currentPlayBtn===btn){currentAudio.pause();btn.textContent='▶';return}
    else{currentAudio.pause();if(currentPlayBtn)currentPlayBtn.textContent='▶';currentAudio=null}
  }
  const audio=new Audio(url);currentAudio=audio;currentPlayBtn=btn;btn.textContent='⏸';
  audio.ontimeupdate=()=>{
    const pct=audio.duration?audio.currentTime/audio.duration:0;
    const idx=Math.floor(pct*bars.length);bars.forEach((b,i)=>b.classList.toggle('played',i<idx));
    const rem=audio.duration-audio.currentTime;if(!isNaN(rem))durEl.textContent=Math.floor(rem/60)+':'+String(Math.floor(rem%60)).padStart(2,'0');
  };
  audio.onended=()=>{btn.textContent='▶';bars.forEach(b=>b.classList.remove('played'));currentAudio=null;currentPlayBtn=null;const t=audio.duration||0;durEl.textContent=Math.floor(t/60)+':'+String(Math.floor(t%60)).padStart(2,'0')};
  audio.play().catch(()=>{btn.textContent='▶'});
}

/* ══ REACTIONS ══ */
async function quickReact(key,emoji,bubbleEl){
  try{
    const ref=db.ref(`rooms/${roomId}/reactions/${key}/${emoji}/${myId}`);
    const adding=!(await ref.once('value')).exists();
    if(adding)await ref.set(myName);else await ref.remove();
    if(adding&&bubbleEl){
      const h=document.createElement('span');h.textContent=emoji;
      h.style.cssText='position:absolute;font-size:28px;pointer-events:none;z-index:999;animation:floatHeart .7s ease forwards;left:50%;transform:translateX(-50%);bottom:0';
      bubbleEl.style.position='relative';bubbleEl.appendChild(h);setTimeout(()=>h.remove(),700);
    }
  }catch(e){}
}
async function toggleReaction(key,emoji){
  try{const ref=db.ref(`rooms/${roomId}/reactions/${key}/${emoji}/${myId}`);if((await ref.once('value')).exists())await ref.remove();else await ref.set(myName)}catch(e){}
}
function renderReactions(key,data){
  const bar=document.querySelector(`[data-msgkey="${key}"]`);if(!bar)return;
  bar.innerHTML='';if(!data||!Object.keys(data).length)return;
  Object.entries(data).forEach(([emoji,users])=>{
    if(!users||typeof users!=='object')return;
    const uids=Object.keys(users);if(!uids.length)return;
    const chip=document.createElement('div');
    chip.className='reaction-chip'+(uids.includes(myId)?' mine':'');
    chip.title=Object.values(users).join('، ');
    chip.innerHTML=`<span>${emoji}</span>${uids.length>1?`<span class="r-count">${uids.length}</span>`:''}`;
    chip.addEventListener('click',e=>{e.stopPropagation();toggleReaction(key,emoji)});
    bar.appendChild(chip);
  });
}

/* ══ TYPING ══ */
function handleTyping(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,130)+'px';resetInactivityTimer();if(!typingRef)return;typingRef.set(true);clearTimeout(typingTimeout);typingTimeout=setTimeout(clearTypingNow,2000)}
function clearTypingNow(){clearTimeout(typingTimeout);if(typingRef)typingRef.set(false)}
function handleKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage()}}

/* ══ SCROLL ══ */
function initScrollButton(){
  const area=$('messages-area');if(!area)return;
  area.addEventListener('scroll',()=>{
    const diff=area.scrollHeight-area.scrollTop-area.clientHeight;
    isAtBottom=diff<100;
    if(isAtBottom){$('btn-scroll-down').classList.remove('show');unreadCount=0;updateBadge()}
    else $('btn-scroll-down').classList.add('show');
  },{passive:true});
}
function scrollToBottom(){const area=$('messages-area');if(area)area.scrollTop=area.scrollHeight;unreadCount=0;updateBadge();$('btn-scroll-down').classList.remove('show')}
function updateBadge(){const b=$('unread-badge');if(unreadCount>0){b.textContent=unreadCount>99?'99+':unreadCount;$('btn-scroll-down').classList.add('has-unread')}else $('btn-scroll-down').classList.remove('has-unread')}

/* ══ SEARCH ══ */
function openSearch(){$('search-overlay').classList.add('open');setTimeout(()=>$('search-input').focus(),100)}
function closeSearch(){$('search-overlay').classList.remove('open');$('search-input').value='';$('search-results').innerHTML='<div class="search-empty">اكتب للبحث في الرسائل</div>'}
function doSearch(q){
  const res=$('search-results');q=(q||'').trim();
  if(!q){res.innerHTML='<div class="search-empty">اكتب للبحث في الرسائل</div>';return}
  const matches=Object.entries(allMessages).filter(([,m])=>m.text&&m.text.toLowerCase().includes(q.toLowerCase())).reverse().slice(0,40);
  if(!matches.length){res.innerHTML=`<div class="search-empty">لا توجد نتائج لـ "${esc(q)}"</div>`;return}
  res.innerHTML=matches.map(([k,m])=>`<div class="search-result-item" onclick="jumpToMsg('${k}');closeSearch()"><div class="search-result-sender">${esc(m.senderName||'')}</div><div class="search-result-text">${esc(m.text).replace(new RegExp(esc(q),'gi'),s=>`<mark>${s}</mark>`)}</div><div class="search-result-time">${fmt(m.ts)}</div></div>`).join('');
}
function jumpToMsg(key){
  if(!key)return;
  const el=document.querySelector(`[data-key="${key}"]`);
  if(!el){showToast('الرسالة غير موجودة في الشاشة');return}
  el.scrollIntoView({behavior:'smooth',block:'center'});
  const b=el.querySelector('.msg-bubble');
  if(b){b.style.outline='2px solid var(--accent)';b.style.boxShadow='0 0 10px rgba(16,163,127,.3)';setTimeout(()=>{b.style.outline='';b.style.boxShadow=''},1800)}
}

/* ══ CLEAR / LEAVE ══ */
async function clearChat(){
  if(!confirm('سيتم حذف الرسائل للجميع، هل أنت متأكد؟'))return;
  try{
    await db.ref(`rooms/${roomId}/messages`).remove();
    allMessages={};
    await db.ref(`rooms/${roomId}/clearSignal`).push({by:myName,ts:Date.now()});
    showToast('تم مسح المحادثة 🗑️');
  }catch(e){showToast('فشل المسح ❌')}
}
async function leaveRoom(){
  stopInactivityTimer();clearTypingNow();cancelReply();cancelEdit();
  try{
    if(messagesRef)await messagesRef.push({type:'system',text:myName+' غادر المحادثة',ts:Date.now()});
    await presenceRef.set({name:myName,online:false,lastSeen:firebase.database.ServerValue.TIMESTAMP});
    await typingRef.remove();
    if(currentActivePeerRef)currentActivePeerRef.off();
    if(roomPresenceRef)roomPresenceRef.off();
    ['typing','clearSignal','reactions','readBy','pinnedMsg'].forEach(n=>db.ref(`rooms/${roomId}/${n}`).off());
    allMessages={};messagesRef.off();
  }catch(e){}
  myName=myId=roomId=null;messagesRef=presenceRef=typingRef=roomPresenceRef=null;
  $('messages-area').innerHTML='<div class="empty-state" id="empty-state"><div style="font-size:40px;margin-bottom:8px;opacity:.3">💬</div><p>ابدأ المحادثة الآن</p></div>';
  $('typing-bar').innerHTML='';$('pin-bar').classList.remove('show');
  $('name-input').value='';$('room-input').value='';
  $('join-btn').disabled=false;$('join-btn').textContent='دخول الغرفة';
  $('msg-input').value='';$('msg-input').style.height='auto';
  $('chat-screen').classList.add('hidden');$('login-screen').classList.remove('hidden');
}

function playNotifSound(){
  if(document.visibilityState==='visible')return;
  try{const AC=window.AudioContext||window.webkitAudioContext;if(!AC)return;const ctx=new AC();const osc=ctx.createOscillator();const g=ctx.createGain();osc.type='sine';osc.frequency.setValueAtTime(587.33,ctx.currentTime);g.gain.setValueAtTime(0.1,ctx.currentTime);g.gain.exponentialRampToValueAtTime(0.01,ctx.currentTime+0.15);osc.connect(g);g.connect(ctx.destination);osc.start();osc.stop(ctx.currentTime+0.15)}catch(e){}
}
