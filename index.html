<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
<title>ChatBFT</title>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
/* ══════════════════════════════════════════
   RESET & TOKENS — ChatGPT White Style
══════════════════════════════════════════ */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}

:root{
  --bg:            #ffffff;
  --bg-chat:       #ffffff;
  --surface:       #f9f9f9;
  --surface2:      #efefef;
  --border:        #e5e5e5;
  --border2:       #d9d9d9;
  --accent:        #10a37f;
  --accent-hover:  #0d8f6f;
  --text:          #0d0d0d;
  --text-2:        #353535;
  --muted:         #6e6e80;
  --danger:        #ef4444;
  --sent-bg:       #10a37f;
  --recv-bg:       #f4f4f4;
  --header-bg:     #ffffff;
  --input-bg:      #f4f4f4;
  --font:          'Cairo', sans-serif;
}

html,body{width:100%;height:100vh;height:100dvh;overflow:hidden;font-family:var(--font);background:#ffffff;color:#0d0d0d}

#app{width:100%;height:100%;display:flex;align-items:center;justify-content:center}
.screen{width:100%;height:100%;overflow:hidden}
.hidden{display:none!important}

/* ══════════════════════════════════════════
   LOGIN SCREEN
══════════════════════════════════════════ */
#login-screen{
  display:flex;align-items:center;justify-content:center;
  background:#ffffff;padding:20px;overflow-y:auto;height:100%;
}
.login-wrap{width:100%;max-width:380px;animation:loginIn .4s cubic-bezier(.22,1,.36,1)}
@keyframes loginIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

.login-card{background:#ffffff;border:1px solid #e5e5e5;border-radius:16px;padding:32px 28px 28px;}
.brand{text-align:center;margin-bottom:28px}
.brand-name{font-size:26px;font-weight:700;color:var(--text)}
.brand-name span{color:var(--accent)}
.brand-sub{font-size:12px;color:var(--muted);margin-top:4px}

.field{margin-bottom:14px}
.field label{display:block;font-size:11px;font-weight:600;color:var(--muted);margin-bottom:6px;letter-spacing:.5px;text-transform:uppercase}
.field input{
  width:100%;background:#f4f4f4;border:1px solid var(--border);border-radius:10px;
  padding:11px 14px;color:var(--text);font-size:14px;font-family:var(--font);outline:none;
}
.field input:focus{border-color:var(--accent);box-shadow:0 0 0 2px rgba(16,163,127,.15)}
.field-hint{font-size:11px;color:var(--muted);margin-top:4px}

.btn-login{
  width:100%;border:none;border-radius:10px;padding:12px;margin-top:6px;
  background:var(--accent);color:white;font-size:14px;font-weight:700;font-family:var(--font);cursor:pointer;
}
.btn-login:hover{background:var(--accent-hover)}
.error-msg{min-height:18px;color:var(--danger);font-size:12px;margin-bottom:8px;text-align:center;font-weight:500}

/* ══════════════════════════════════════════
   CHAT SCREEN
══════════════════════════════════════════ */
#chat-screen {
  max-width: 860px;
  margin: 0 auto;
  background: #ffffff;
  position: relative;
  height: 100%;
  display: flex;
  flex-direction: column;
}

.chat-header{
  position: fixed;
  top: 0; left: 0; right: 0;
  max-width: 860px; margin: 0 auto;
  background: var(--header-bg);
  border-bottom: 1px solid #e5e5e5;
  height: 56px;
  display: flex;align-items: center;gap: 10px;
  padding: 0 14px;
  z-index: 1000;
}

.peer-avatar{
  width:36px;height:36px;border-radius:50%;background:var(--accent);
  display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:white;flex-shrink:0;
}
.my-avatar-sm{
  width:28px;height:28px;border-radius:50%;background:#f4f4f4;border:1px solid #d9d9d9;
  display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--text-2);flex-shrink:0;
}
.header-info{flex:1;min-width:0}
.header-room{font-size:14px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.header-sub{font-size:11px;color:var(--muted);margin-top:1px;display:flex;align-items:center;gap:5px}
.online-dot{width:6px;height:6px;border-radius:50%;background:var(--muted);flex-shrink:0;}
.online-dot.on{background:#10a37f;box-shadow:0 0 5px rgba(16,163,127,.5)}

.header-actions{display:flex;gap:5px}
.btn-hdr{
  border:1px solid var(--border);border-radius:7px;padding:5px 10px;
  cursor:pointer;font-size:11px;font-weight:600;font-family:var(--font);background:transparent;
}
.btn-hdr.clear{color:var(--muted)}
.btn-hdr.leave{color:var(--danger);border-color:rgba(239,68,68,.3)}

.messages-wrap {
  position: absolute;
  top: 56px;
  bottom: 74px;
  left: 0; right: 0;
  background: #ffffff;
  overflow: hidden;
}

/* تعديل الـ bottom ليتناسب ديناميكياً مع شريط الـ Reply */
#chat-screen.has-reply .messages-wrap {
  bottom: 124px;
}

.messages-area{
  width: 100%;
  height: 100%;
  overflow-y:auto;
  padding: 16px;
  display:flex;flex-direction:column;gap:12px;
  -webkit-overflow-scrolling:touch;
}

.date-divider{
  align-self:center;background:#f0f0f0;padding:4px 14px;border-radius:20px;font-size:11px;color:var(--muted);margin:10px 0;
}

/* ══════════════════════════════════════════
   MESSAGES LAYOUT & BUBBLES WITH REPLY BUTTON
══════════════════════════════════════════ */
.msg-wrapper{
  display:flex;
  width: 100%;
  position: relative;
  animation:bubbleIn .18s ease;
}

.msg-wrapper.sent{justify-content: flex-start;} 
.msg-wrapper.recv{justify-content: flex-end;}   

.msg-row{
  display:flex;
  max-width: 75%; 
  width: auto;
  position: relative;
}

/* زر الرد الهوفري الثابت والمخفي افتراضياً */
.btn-msg-reply {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--muted);
  border-radius: 50%;
  width: 28px;
  height: 28px;
  font-size: 12px;
  cursor: pointer;
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 10;
  box-shadow: 0 2px 5px rgba(0,0,0,0.05);
}
.msg-wrapper.sent .btn-msg-reply { left: -36px; }
.msg-wrapper.recv .btn-msg-reply { right: -36px; }
.msg-row:hover .btn-msg-reply { display: flex; }

.msg-bubble-wrap{
  display:flex;
  flex-direction:column; 
  width: auto;
}

.msg-sender-name {
  font-size: 11px;
  font-weight: 600;
  color: var(--muted);
  margin-bottom: 2px;
  padding: 0 4px;
  align-self: flex-start;
}

/* ستايل الجزء المقتبس داخل الرسالة */
.reply-quotation {
  background: rgba(0, 0, 0, 0.05);
  border-right: 3px solid var(--accent);
  padding: 4px 8px;
  border-radius: 6px;
  font-size: 12px;
  margin-bottom: 6px;
  color: var(--text-2);
  max-width: 100%;
  display: block;
}
.msg-wrapper.sent .reply-quotation {
  background: rgba(255, 255, 255, 0.15);
  border-right-color: #ffffff;
  color: #f9f9f9;
}
.reply-quotation-sender {
  font-weight: 700;
  font-size: 11px;
  margin-bottom: 2px;
}

.msg-bubble{
  padding: 10px 14px;
  font-size: 15px;
  line-height: 1.4;
  word-break: break-word;
  overflow-wrap: anywhere;
  white-space: pre-wrap;
  display: flex;
  flex-direction: column;
  width: fit-content;
  max-width: 100%;
  min-width: 80px;
}

.msg-wrapper.sent .msg-bubble{
  background: #10a37f;
  color: #ffffff;
  border-top-left-radius: 16px;
  border-top-right-radius: 16px;
  border-bottom-left-radius: 16px;
  border-bottom-right-radius: 4px;
}

.msg-wrapper.recv .msg-bubble{
  background: #f1f1f1;
  color: #0d0d0d;
  border-top-left-radius: 16px;
  border-top-right-radius: 16px;
  border-bottom-left-radius: 4px;
  border-bottom-right-radius: 16px;
}

.msg-meta{
  display: flex;
  align-items: center;
  justify-content: flex-end;
  gap: 3px;
  font-size: 10px;
  margin-top: 5px;
  white-space: nowrap;
  pointer-events: none;
  align-self: flex-end;
  width: 100%;
}

.msg-wrapper.sent .msg-meta{ color: rgba(255, 255, 255, 0.75); }
.msg-wrapper.recv .msg-meta{ color: #8e8e93; }
.check-icon{ font-size: 9px; }

.chat-image{max-width:100%;max-height:200px;border-radius:10px;display:block;cursor:pointer;margin-bottom:3px;}
.file-attachment{
  display:flex;align-items:center;gap:8px;background:rgba(0,0,0,.03);
  padding:8px 10px;border-radius:10px;text-decoration:none;color:var(--accent);
  font-weight:600;font-size:12px;border:1px solid var(--border);margin-bottom:3px;
}
.system-msg{align-self:center;background:#f4f4f4;border:1px solid var(--border);padding:4px 14px;border-radius:20px;color:var(--muted);font-size:11px;margin:8px 0;}
.empty-state{margin:auto;text-align:center;color:var(--muted)}

/* شريط الـ Reply Preview فوق شريط الإدخال */
.reply-preview-bar {
  position: fixed;
  bottom: 64px; left: 0; right: 0;
  max-width: 860px; margin: 0 auto;
  background: #f7f7f8;
  border-top: 1px solid var(--border);
  padding: 8px 16px;
  display: none;
  align-items: center;
  justify-content: space-between;
  height: 50px;
  z-index: 1001;
}
#chat-screen.has-reply .reply-preview-bar { display: flex; }
.reply-preview-content {
  border-right: 3px solid var(--accent);
  padding-right: 8px;
  font-size: 13px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  flex: 1;
}
.reply-preview-title { font-weight: 700; font-size: 11px; color: var(--accent); }
.btn-close-reply { background: transparent; border: none; color: var(--muted); font-size: 16px; cursor: pointer; padding: 0 4px; }

.typing-bar{
  position: fixed;
  bottom: 64px; left: 0; right: 0;
  max-width: 860px; margin: 0 auto;
  padding:2px 16px;font-size:11px;color:var(--muted);
  height:20px;display:flex;align-items:center;gap:6px;
  z-index: 999; background: transparent;
}
#chat-screen.has-reply .typing-bar { bottom: 114px; }

.typing-dots{display:flex;gap:3px}
.typing-dots span{width:4px;height:4px;border-radius:50%;background:var(--muted);animation:tdot 1.1s infinite;}
.typing-dots span:nth-child(2){animation-delay:.18s}
.typing-dots span:nth-child(3){animation-delay:.36s}
@keyframes tdot{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-4px);opacity:1}}

.upload-bar{
  background:rgba(16,163,127,.12);padding:5px 16px;font-size:11px;color:var(--accent);font-weight:600;
  display:none;align-items:center;gap:8px;
}
.upload-bar.show{display:flex}
.upload-spin{width:12px;height:12px;border-radius:50%;border:2px solid var(--accent);border-top-color:transparent;animation:spin .7s linear infinite;}

.input-area{
  position: fixed;
  bottom: 0; left: 0; right: 0;
  max-width: 860px; margin: 0 auto;
  background:#ffffff;
  padding:10px 16px;
  padding-bottom:calc(10px + env(safe-area-inset-bottom));
  display:flex;gap:8px;align-items:flex-end;
  border-top:1px solid #e5e5e5;
  z-index: 1000;
}
.input-wrap{
  flex:1;background:var(--input-bg);border-radius:14px;display:flex;align-items:flex-end;gap:4px;
  padding:8px 12px;border:1px solid #d9d9d9;min-height:44px;
}
.btn-attach{border:none;background:transparent;color:var(--muted);cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;width:30px;height:30px;}
.msg-input{flex:1;border:none;outline:none;background:transparent;color:var(--text);font-size:14px;font-family:var(--font);resize:none;max-height:120px;}

.btn-send{
  width:36px;height:36px;border:none;border-radius:9px;background:var(--accent);color:white;cursor:pointer;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.btn-send svg{width:16px;height:16px;fill:white;}

.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#0d0d0d;color:#ffffff;padding:8px 18px;border-radius:10px;font-size:13px;opacity:0;transition:.3s;z-index:9999;}
.toast.show{opacity:1}
.img-modal{position:fixed;inset:0;z-index:9000;background:rgba(0,0,0,.88);display:none;align-items:center;justify-content:center;padding:20px;}
.img-modal.open{display:flex}
.img-modal img{max-width:100%;max-height:90vh;border-radius:8px;}
.img-modal-close{position:absolute;top:20px;right:20px;width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.15);border:none;color:white;font-size:20px;}
</style>
</head>
<body>
<div id="app">

<div id="login-screen" class="screen">
  <div class="login-wrap">
    <div class="login-card">
      <div class="brand">
        <div class="brand-name">Chat<span>BFT</span></div>
        <div class="brand-sub">محادثة فورية آمنة</div>
      </div>
      <div class="field">
        <label>الاسم</label>
        <input type="text" id="name-input" placeholder="أدخل اسمك" maxlength="20" autocomplete="off">
      </div>
      <div class="field">
        <label>رمز الغرفة</label>
        <input type="text" id="room-input" placeholder="مثال: room2024" maxlength="30" autocomplete="off" onkeydown="if(event.key==='Enter') joinRoom()">
        <div class="field-hint">شارك نفس الرمز مع الشخص الآخر</div>
      </div>
      <div class="error-msg" id="login-error"></div>
      <button class="btn-login" id="join-btn" onclick="joinRoom()">دخول الغرفة</button>
    </div>
  </div>
</div>

<div id="chat-screen" class="screen hidden">
  <div class="chat-header">
    <div class="peer-avatar" id="peer-avatar">؟</div>
    <div class="header-info">
      <div class="header-room" id="header-room-id">الغرفة</div>
      <div class="header-sub">
        <div class="online-dot" id="online-dot"></div>
        <span id="peer-status">في انتظار الطرف الآخر...</span>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:6px;margin-right:auto">
      <div class="my-avatar-sm" id="my-avatar">ME</div>
    </div>
    <div class="header-actions">
      <button class="btn-hdr clear" onclick="clearChat()">مسح</button>
      <button class="btn-hdr leave" onclick="leaveRoom()">خروج</button>
    </div>
  </div>

  <div class="upload-bar" id="upload-bar">
    <div class="upload-spin"></div>
    <span>جاري رفع الملف...</span>
  </div>

  <div class="messages-wrap">
    <div class="messages-area" id="messages-area">
      <div class="empty-state" id="empty-state">
        <div class="es-icon">💬</div>
        <p>ابدأ المحادثة الآن</p>
      </div>
    </div>
  </div>

  <div class="typing-bar" id="typing-bar"></div>

  <div class="reply-preview-bar" id="reply-preview-bar">
    <div class="reply-preview-content">
      <div class="reply-preview-title" id="reply-preview-sender">الرد على فلان</div>
      <div id="reply-preview-text">نص الرسالة هنا...</div>
    </div>
    <button class="btn-close-reply" onclick="cancelReply()">✕</button>
  </div>

  <div class="input-area">
    <input type="file" id="file-chooser" class="hidden" onchange="handleFileSelect(this)">
    <div class="input-wrap">
      <button class="btn-attach" title="إرفاق ملف" onclick="document.getElementById('file-chooser').click()">📎</button>
      <textarea id="msg-input" class="msg-input" rows="1" placeholder="اكتب رسالة..." onkeydown="handleKey(event)" oninput="handleTyping(this)"></textarea>
    </div>
    <button class="btn-send" onclick="sendMessage()" title="إرسال">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
</div>

<div class="toast" id="toast"></div>

<div class="img-modal" id="img-modal" onclick="closeImgModal()">
  <button class="img-modal-close">✕</button>
  <img id="modal-img" src="" alt="">
</div>

</div>

<script>
/* ══════════════════════════════════════════
   🔥 FIREBASE CONFIG
══════════════════════════════════════════ */
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyCqkSRiU0n0G4AFSJQCLCO-wqip6sKwCz0",
  authDomain: "syncchat-6e22b.firebaseapp.com",
  databaseURL: "https://syncchat-6e22b-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "syncchat-6e22b",
  storageBucket: "syncchat-6e22b.firebasestorage.app",
  messagingSenderId: "692797381468",
  appId: "1:692797381468:web:9faaed7bf44f0f527a3f99",
  measurementId: "G-ZMN7S10M2R"
};
/* ══════════════════════════════════════════ */

let db, storage;
let myName, myId, roomId;
let messagesRef, presenceRef, typingRef;
let typingTimeout;
let peerTypingListener;
let isInitialLoad = true;
let currentReplyTarget = null; // يحمل كائن الرسالة المُراد الرد عليها

let inactivityTimeout;
const INACTIVITY_LIMIT = 2 * 60 * 1000; 

const $  = id => document.getElementById(id);
const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const initials = n => n.trim().slice(0,2).toUpperCase();
const genId    = () => Math.random().toString(36).slice(2,10);
const fmt      = ts => new Date(ts).toLocaleTimeString('ar-EG',{hour:'2-digit',minute:'2-digit'});
const fmtFull  = ts => new Date(ts).toLocaleDateString('ar-EG',{day:'numeric',month:'long'}) + ' - ' + fmt(ts);

function playNotificationSound() {
  if (document.visibilityState === 'visible') return;
  try {
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    if (!AudioContext) return;
    const ctx = new AudioContext();
    const osc1 = ctx.createOscillator();
    const gain1 = ctx.createGain();
    osc1.type = 'sine'; osc1.frequency.setValueAtTime(587.33, ctx.currentTime);
    gain1.gain.setValueAtTime(0.1, ctx.currentTime);
    gain1.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.15);
    osc1.connect(gain1); gain1.connect(ctx.destination);
    osc1.start(); osc1.stop(ctx.currentTime + 0.15);
    setTimeout(() => {
      const osc2 = ctx.createOscillator(); const gain2 = ctx.createGain();
      osc2.type = 'sine'; osc2.frequency.setValueAtTime(880, ctx.currentTime);
      gain2.gain.setValueAtTime(0.1, ctx.currentTime);
      gain2.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.25);
      osc2.connect(gain2); gain2.connect(ctx.destination);
      osc2.start(); osc2.stop(ctx.currentTime + 0.25);
    }, 80);
  } catch (e) {}
}

function startInactivityTimer() {
  resetInactivityTimer();
  ['mousemove', 'click', 'keydown', 'scroll', 'touchstart'].forEach(e => window.addEventListener(e, resetInactivityTimer, true));
}
function stopInactivityTimer() {
  clearTimeout(inactivityTimeout);
  ['mousemove', 'click', 'keydown', 'scroll', 'touchstart'].forEach(e => window.removeEventListener(e, resetInactivityTimer, true));
}
function resetInactivityTimer() {
  clearTimeout(inactivityTimeout);
  if (roomId) { inactivityTimeout = setTimeout(leaveRoom, INACTIVITY_LIMIT); }
}

function showToast(msg){
  const t=$('toast'); t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2800);
}
function openImgModal(src){$('modal-img').src=src;$('img-modal').classList.add('open')}
function closeImgModal(){$('img-modal').classList.remove('open')}
function initFirebase(){
  if(!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
  db = firebase.database(); storage = firebase.storage();
}

async function joinRoom(){
  const name = $('name-input').value.trim();
  const room = $('room-input').value.trim().replace(/\s+/g,'');
  const err  = $('login-error'); err.textContent='';
  if(!name){ err.textContent='من فضلك أدخل اسمك'; return; }
  if(!room){ err.textContent='من فضلك أدخل رمز الغرفة'; return; }

  const btn=$('join-btn'); btn.disabled=true; btn.textContent='جاري الدخول...';
  try{ initFirebase(); } catch(e){ err.textContent='خطأ في تهيئة Firebase'; btn.disabled=false; return; }

  myName=name; myId=genId(); roomId=room; isInitialLoad = true;
  messagesRef = db.ref(`rooms/${roomId}/messages`);
  
  // 🔥 التعديل الجوهري: هيكلة عُقدة الـ Presence بالاسم بدلاً من الـ ID لمنع تكرار اليوزر وضبط التزامن بالكامل
  presenceRef = db.ref(`rooms/${roomId}/presence/${myName}`);
  typingRef   = db.ref(`rooms/${roomId}/typing/${myId}`);

  await presenceRef.set({ name:myName, online:true, joinedAt:Date.now() });
  presenceRef.onDisconnect().set({ name:myName, online:false, lastSeen:firebase.database.ServerValue.TIMESTAMP });
  typingRef.onDisconnect().remove();

  $('my-avatar').textContent = initials(myName);
  $('header-room-id').textContent = 'غرفة: ' + roomId;

  setupListeners(); startInactivityTimer();
  $('login-screen').classList.add('hidden'); $('chat-screen').classList.remove('hidden');
  await messagesRef.push({ type:'system', text: myName+' انضم إلى المحادثة', ts:Date.now() });
}

function setupListeners(){
  // جلب آخر من دخل الغرفة بخلافك أنت وبشكل دقيق جداً
  db.ref(`rooms/${roomId}/presence`).on('value', snap=>{
    const data  = snap.val()||{};
    const filterPeers = [];
    Object.entries(data).forEach(([key, u]) => {
      if (u && u.name && u.name !== myName) { filterPeers.push(u); }
    });

    const dot=$('online-dot'), txt=$('peer-status'), pav=$('peer-avatar');
    if(filterPeers.length > 0){
      filterPeers.sort((a, b) => (a.joinedAt || 0) - (b.joinedAt || 0));
      const latestPeer = filterPeers[filterPeers.length - 1];
      pav.textContent = initials(latestPeer.name || '؟');

      if(latestPeer.online){
        dot.classList.add('on'); txt.textContent = latestPeer.name + ' متصل الآن';
      } else {
        dot.classList.remove('on');
        const last = latestPeer.lastSeen ? fmtFull(latestPeer.lastSeen) : '';
        txt.textContent = last ? `آخر ظهور لـ ${latestPeer.name}: ${last}` : latestPeer.name + ' غير متصل';
      }
    } else {
      dot.classList.remove('on'); txt.textContent='في انتظار الطرف الآخر...'; pav.textContent='؟';
    }
  });

  if(peerTypingListener) { db.ref(`rooms/${roomId}/typing`).off('value', peerTypingListener); }
  peerTypingListener = db.ref(`rooms/${roomId}/typing`).on('value', snap => {
    const data = snap.val() || {};
    const activeTypingPeer = Object.entries(data).find(([id, isTyping]) => id !== myId && isTyping === true);
    const bar = $('typing-bar');
    if(activeTypingPeer) {
      const peerId = activeTypingPeer[0];
      db.ref(`rooms/${roomId}/presence`).once('value', pSnap => {
        // البحث عن الاسم المرتبط بـ الـ ID التابع لكتابة النص
        const pData = pSnap.val() || {};
        const found = Object.values(pData).find(u => u.online === true);
        bar.innerHTML = `<div class="typing-dots"><span></span><span></span><span></span></div><span>${esc(found?found.name:'الطرف الآخر')} يكتب...</span>`;
      });
    } else { bar.innerHTML = ''; }
  });

  messagesRef.once('value', () => { isInitialLoad = false; });
  messagesRef.on('child_added', snap=>{ 
    const msg = snap.val(); appendMessage(msg); 
    if (!isInitialLoad && msg.type !== 'system' && msg.senderName !== myName) { playNotificationSound(); }
  });
  messagesRef.on('value', snap=>{
    if(!snap.exists()){ $('messages-area').innerHTML=`<div class="empty-state" id="empty-state"><div class="es-icon">🗑️</div><p>تم مسح المحادثة</p></div>`; }
  });
}

function initiateReply(senderName, text) {
  currentReplyTarget = { senderName, text };
  $('reply-preview-sender').textContent = `الرد على ${senderName}`;
  $('reply-preview-text').textContent = text || "[مرفق ملتميديا]";
  $('chat-screen').classList.add('has-reply');
  $('msg-input').focus();
}

function cancelReply() {
  currentReplyTarget = null;
  $('chat-screen').classList.remove('has-reply');
}

function appendMessage(msg){
  const area=$('messages-area'); const empty=$('empty-state'); if(empty) empty.remove();
  const div=document.createElement('div');

  if(msg.type==='system'){
    div.className='system-msg'; div.textContent=msg.text;
  } else {
    const sent = msg.senderName === myName;
    div.className='msg-wrapper '+(sent?'sent':'recv');

    let mediaHtml='';
    if(msg.fileUrl){
      if(msg.fileType && msg.fileType.startsWith('image/')){
        mediaHtml=`<img src="${esc(msg.fileUrl)}" class="chat-image" onclick="openImgModal('${esc(msg.fileUrl)}')" loading="lazy">`;
      } else {
        const ext=(msg.fileName||'ملف').split('.').pop().toUpperCase();
        mediaHtml=`<a href="${esc(msg.fileUrl)}" target="_blank" class="file-attachment">
          <span class="file-icon">📄</span>
          <div><div style="font-size:12px;font-weight:700">${esc(msg.fileName||'ملف')}</div><div style="font-size:10px;opacity:.7">${ext}</div></div>
        </a>`;
      }
    }

    const senderNameHtml = !sent ? `<div class="msg-sender-name">${esc(msg.senderName || 'مجهول')}</div>` : '';
    
    // بناء الهيكل الخاص بالـ Reply Quotation إن وُجد داخل الرسالة المستلمة
    let replyBlockHtml = '';
    if(msg.replyTo) {
      replyBlockHtml = `
        <div class="reply-quotation">
          <div class="reply-quotation-sender">${esc(msg.replyTo.senderName)}</div>
          <div>${esc(msg.replyTo.text)}</div>
        </div>
      `;
    }

    // تجهيز النص الآمن لتمريره في دالة الـ Reply عند الضغط على الزر
    const safeText = esc(msg.text || '').replace(/'/g, "\\'");

    div.innerHTML=`
      <div class="msg-row">
        <button class="btn-msg-reply" title="رد" onclick="initiateReply('${esc(msg.senderName)}', '${safeText}')">↩️</button>
        <div class="msg-bubble-wrap">
          ${senderNameHtml}
          <div class="msg-bubble">
            ${replyBlockHtml}
            ${mediaHtml}
            ${msg.text ? `<span>${esc(msg.text)}</span>` : ''}
            <span class="msg-meta">${fmt(msg.ts)}${sent?' <span class="check-icon">✓✓</span>':''}</span>
          </div>
        </div>
      </div>`;
  }

  area.appendChild(div);
  requestAnimationFrame(()=>{ area.scrollTop=area.scrollHeight; });
}

async function sendMessage(){
  const input=$('msg-input'); const text=input.value.trim();
  if(!text && !currentReplyTarget || !messagesRef) return;
  input.value=''; input.style.height='auto';
  clearTypingNow();

  const msgPayload = {
    type: 'message', text, senderId: myId, senderName: myName, ts: Date.now()
  };

  // ربط الـ Reply بالرسالة إن كانت ميزة الرد نشطة
  if(currentReplyTarget) {
    msgPayload.replyTo = currentReplyTarget;
    cancelReply();
  }

  try{ await messagesRef.push(msgPayload); } 
  catch(e){ showToast('فشل الإرسال ❌'); input.value=text; }
}

async function handleFileSelect(input){
  const file=input.files[0]; if(!file) return;
  const bar=$('upload-bar'); bar.classList.add('show');
  try{
    const ref=storage.ref(`rooms/${roomId}/${genId()}_${file.name}`);
    const snap=await ref.put(file); const url=await snap.ref.getDownloadURL();
    
    const msgPayload = {
      type:'message', text:'', fileUrl:url, fileName:file.name, fileType:file.type,
      senderId:myId, senderName:myName, ts:Date.now()
    };
    if(currentReplyTarget) { msgPayload.replyTo = currentReplyTarget; cancelReply(); }

    await messagesRef.push(msgPayload); showToast('تم الإرسال ✅');
  } catch(e){ showToast('فشل الرفع ❌'); }
  finally{ bar.classList.remove('show'); input.value=''; }
}

function handleTyping(el){
  el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,130)+'px';
  resetInactivityTimer(); if(!typingRef) return;
  typingRef.set(true); clearTimeout(typingTimeout);
  typingTimeout=setTimeout(clearTypingNow, 2000);
}
function clearTypingNow(){ clearTimeout(typingTimeout); if(typingRef) typingRef.set(false); }
function handleKey(e){ if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); sendMessage(); } }

async function clearChat(){
  if(!confirm('سيتم حذف الرسائل للجميع، هل أنت متأكد؟')) return;
  try{ await db.ref(`rooms/${roomId}/messages`).remove(); showToast('تم مسح المحادثة 🗑️'); } catch(e){ showToast('فشل الحذف ❌'); }
}

async function leaveRoom(){
  stopInactivityTimer(); clearTypingNow(); cancelReply();
  try{
    if(messagesRef) await messagesRef.push({ type:'system', text:myName+' غادر المحادثة', ts:Date.now() });
    await presenceRef.set({ name:myName, online:false, lastSeen:firebase.database.ServerValue.TIMESTAMP });
    await typingRef.remove();
    db.ref(`rooms/${roomId}/presence`).off(); db.ref(`rooms/${roomId}/typing`).off();
    if(peerTypingListener) db.ref(`rooms/${roomId}/typing`).off('value', peerTypingListener);
    messagesRef.off();
  } catch(e){}

  myName=myId=roomId=null; messagesRef=presenceRef=typingRef=null;
  $('messages-area').innerHTML=`<div class="empty-state" id="empty-state"><div class="es-icon">💬</div><p>ابدأ المحادثة الآن</p></div>`;
  $('typing-bar').innerHTML=''; $('name-input').value=''; $('room-input').value='';
  $('join-btn').disabled=false; $('join-btn').textContent='دخول الغرفة';
  $('msg-input').value=''; $('msg-input').style.height='auto';
  $('chat-screen').classList.add('hidden'); $('login-screen').classList.remove('hidden');
}
</script>
</body>
</html>
