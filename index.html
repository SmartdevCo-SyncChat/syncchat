<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
<title>ChatBFT</title>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}

:root{
  --bg:            #ffffff;
  --bg-chat:       #ffffff;
  --surface:       #f9f9f9;
  --surface2:      #efefef;
  --border:        #e5e5e5;
  --border2:       #d9d9d9;
  --accent:        #10a37f;
  --accent-hover:  #0d8f6f;
  --text:          #0d0d0d;
  --text-2:        #353535;
  --muted:         #6e6e80;
  --danger:        #ef4444;
  --sent-bg:       #10a37f;
  --recv-bg:       #f4f4f4;
  --header-bg:     #ffffff;
  --input-bg:      #f4f4f4;
  --font:          'Cairo', sans-serif;
}

html,body{
  width:100%;
  height:100%;
  height:100dvh;
  overflow:hidden;
  font-family:var(--font);
  background:#ffffff;color:#0d0d0d;
}

#app{width:100%;height:100%;height:100dvh;display:flex;align-items:stretch;}
.screen{width:100%;height:100%;overflow:hidden}
.hidden{display:none!important}

/* LOGIN */
#login-screen{
  display:flex;align-items:center;justify-content:center;
  background:#ffffff;padding:20px;overflow-y:auto;height:100%;
}
.login-wrap{width:100%;max-width:380px;animation:loginIn .4s cubic-bezier(.22,1,.36,1)}
@keyframes loginIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.login-card{background:#ffffff;border:1px solid #e5e5e5;border-radius:16px;padding:32px 28px 28px;}
.brand{text-align:center;margin-bottom:28px}
.brand-name{font-size:26px;font-weight:700;color:var(--text)}
.brand-name span{color:var(--accent)}
.brand-sub{font-size:12px;color:var(--muted);margin-top:4px}
.field{margin-bottom:14px}
.field label{display:block;font-size:11px;font-weight:600;color:var(--muted);margin-bottom:6px;letter-spacing:.5px;text-transform:uppercase}
.field input{
  width:100%;background:#f4f4f4;border:1px solid var(--border);border-radius:10px;
  padding:11px 14px;color:var(--text);font-size:14px;font-family:var(--font);outline:none;
}
.field input:focus{border-color:var(--accent);box-shadow:0 0 0 2px rgba(16,163,127,.15)}
.field-hint{font-size:11px;color:var(--muted);margin-top:4px}
.btn-login{
  width:100%;border:none;border-radius:10px;padding:12px;margin-top:6px;
  background:var(--accent);color:white;font-size:14px;font-weight:700;font-family:var(--font);cursor:pointer;
}
.btn-login:hover{background:var(--accent-hover)}
.error-msg{min-height:18px;color:var(--danger);font-size:12px;margin-bottom:8px;text-align:center;font-weight:500}

/* CHAT SCREEN */
#chat-screen{
  max-width:860px;margin:0 auto;background:#ffffff;
  position:relative;
  height:100dvh;
  display:flex;flex-direction:column;
  overflow:hidden;
}

.chat-header{
  position:relative;
  background:var(--header-bg);border-bottom:1px solid #e5e5e5;
  height:56px;min-height:56px;max-height:56px;
  display:flex;align-items:center;gap:10px;padding:0 14px;
  z-index:100;flex-shrink:0;overflow:hidden;
}
.peer-avatar{width:36px;height:36px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:white;flex-shrink:0;}
.my-avatar-sm{width:28px;height:28px;border-radius:50%;background:#f4f4f4;border:1px solid #d9d9d9;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--text-2);flex-shrink:0;}
.header-info{flex:1;min-width:0}
.header-room{font-size:14px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.header-sub{
  font-size:11px;color:var(--muted);
  margin-top:1px;
  display:flex;align-items:center;gap:5px;
  line-height:1.3;min-width:0;
}
#peer-status{
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
  flex:1;min-width:0;
  font-size:11px;
}
.online-dot{width:6px;height:6px;border-radius:50%;background:var(--muted);flex-shrink:0;}
.online-dot.on{background:#10a37f;box-shadow:0 0 5px rgba(16,163,127,.5)}
.header-actions{display:flex;gap:5px}
.btn-hdr.clear{color:var(--muted)}
.btn-hdr.leave{color:var(--danger);border-color:rgba(239,68,68,.3)}

.messages-wrap{
  flex:1;
  position:relative;
  background:#ffffff;
  overflow:hidden;
  min-height:0;
  margin-bottom:64px;
}
#chat-screen.has-reply .messages-wrap{margin-bottom:108px;}

.messages-area{
  width:100%;height:100%;
  overflow-y:auto;
  padding:16px;
  display:flex;flex-direction:column;gap:12px;
  -webkit-overflow-scrolling:touch;
  overscroll-behavior:contain;
}

.date-divider{align-self:center;background:#f0f0f0;padding:4px 14px;border-radius:20px;font-size:11px;color:var(--muted);margin:10px 0;}

/* MESSAGES */
.msg-wrapper{display:flex;width:100%;position:relative;animation:bubbleIn .18s ease;}
.msg-wrapper.sent{justify-content:flex-start;}
.msg-wrapper.recv{justify-content:flex-end;}
.msg-row{display:flex;max-width:85%;width:auto;position:relative;align-items:center;}

/* الإجراءات السريعة بجانب الرسالة */
.msg-actions-group{
  display:none; /* مخفية دائماً افتراضياً */
  flex-direction:row;
  gap:4px;
  align-self:center;
  flex-shrink:0;
}
.msg-action-btn{
  width:30px;height:30px;
  border-radius:50%;
  border:1px solid #e5e5e5;
  background:#ffffff;
  color:#6e6e80;
  font-size:13px;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:0 1px 4px rgba(0,0,0,.08);
  transition:background .15s,color .15s;
}
.msg-action-btn:hover{background:#f0f0f0;color:#0d0d0d;}

/* عندما تصبح الرسالة نشطة بالضغط، تظهر الأزرار */
.msg-row.active-actions .msg-actions-group {
  display: inline-flex !important;
}

/* إلغاء الـ Hover والظهور التلقائي على الموبايل */
@media (max-width: 768px) {
  .msg-actions-group { display: none; }
}

.msg-wrapper.sent .msg-row{ flex-direction:row; gap:6px; }
.msg-wrapper.recv .msg-row{ flex-direction:row-reverse; gap:6px; }

/* highlight عند الضغط */
.msg-bubble.tapped{
  filter:brightness(.92);
  transition:filter .15s;
}

.msg-bubble-wrap{display:flex;flex-direction:column;width:auto;}
.msg-sender-name{font-size:11px;font-weight:600;color:var(--muted);margin-bottom:2px;padding:0 4px;align-self:flex-start;}

/* ═══ REPLY QUOTATION ═══ */
.reply-quotation{
  background:rgba(0,0,0,.06);
  border-right:3px solid var(--accent);
  padding:3px 7px;
  border-radius:5px;
  font-size:11px;
  margin-bottom:5px;
  color:#4f4f4f;
  display:block;
  max-width:100%;
  line-height:1.3;
  cursor:pointer;
}
.msg-wrapper.sent .reply-quotation{
  background:rgba(255,255,255,.18);
  border-right-color:#ffffff;
  color:rgba(255,255,255,.85);
}
.reply-quotation-sender{
  font-weight:700;
  font-size:10px;
  margin-bottom:1px;
  color:var(--accent);
}
.msg-wrapper.sent .reply-quotation-sender{color:#ffffff;}
.reply-quotation-text{
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  max-width:200px;
  display:block;
}

/* BUBBLE */
.msg-bubble{
  padding:8px 12px;font-size:14.5px;line-height:1.4;
  word-break:break-word;overflow-wrap:anywhere;white-space:pre-wrap;
  display:flex;flex-direction:column;width:fit-content;max-width:100%;min-width:90px;
  -webkit-user-select:none;user-select:none;
  -webkit-touch-callout:none;
  cursor: pointer;
}
.msg-wrapper.sent .msg-bubble{
  background:#10a37f;color:#ffffff;
  border-top-left-radius:14px;border-top-right-radius:14px;
  border-bottom-left-radius:14px;border-bottom-right-radius:4px;
}
.msg-wrapper.recv .msg-bubble{
  background:#f1f1f1;color:#0d0d0d;
  border-top-left-radius:14px;border-top-right-radius:14px;
  border-bottom-left-radius:4px;border-bottom-right-radius:14px;
}
.msg-meta{display:flex;align-items:center;justify-content:flex-end;gap:3px;font-size:9.5px;margin-top:4px;white-space:nowrap;pointer-events:none;align-self:flex-end;width:100%;}
.msg-wrapper.sent .msg-meta{color:rgba(255,255,255,.7);}
.msg-wrapper.recv .msg-meta{color:#8e8e93;}
.check-icon{font-size:9px;}

.chat-image{max-width:100%;max-height:200px;border-radius:10px;display:block;cursor:pointer;margin-bottom:3px;}
.file-attachment{display:flex;align-items:center;gap:8px;background:rgba(0,0,0,.03);padding:8px 10px;border-radius:10px;text-decoration:none;color:var(--accent);font-weight:600;font-size:12px;border:1px solid var(--border);margin-bottom:3px;}
.system-msg{align-self:center;background:#f4f4f4;border:1px solid var(--border);padding:4px 14px;border-radius:20px;color:var(--muted);font-size:11px;margin:8px 0;}

/* Scroll to bottom */
.btn-scroll-down{
  position:fixed;
  bottom:80px;
  left:50%;
  transform:translateX(-50%);
  background:#ffffff;
  border:1px solid #e5e5e5;
  border-radius:50%;
  width:36px;height:36px;
  display:none;
  align-items:center;justify-content:center;
  cursor:pointer;
  box-shadow:0 2px 12px rgba(0,0,0,.15);
  z-index:995;
  transition:opacity .2s,transform .2s;
  padding:0;
}
.btn-scroll-down.show{display:flex;}
.btn-scroll-down:hover{transform:translateX(-50%) scale(1.08);}
.btn-scroll-down svg{width:18px;height:18px;stroke:#666;}
.btn-scroll-down .unread-badge{
  position:absolute;top:-5px;right:-5px;
  background:var(--accent);color:white;
  border-radius:50%;width:17px;height:17px;
  font-size:9px;font-weight:700;
  display:none;align-items:center;justify-content:center;
  font-family:var(--font);
}
.btn-scroll-down.add-unread .unread-badge{display:flex;}

/* PIN BAR */
.pin-bar{
  position:relative;
  background:#fffbea;
  border-bottom:1.5px solid #f0d060;
  border-right:4px solid var(--accent);
  padding:8px 14px;
  display:none;
  align-items:center;gap:10px;
  cursor:pointer;
  min-height:40px;
  flex-shrink:0;
  z-index:10;
}
.pin-bar.show{display:flex;}
.pin-icon{font-size:14px;flex-shrink:0;}
.pin-text{
  flex:1;
  font-size:12.5px;
  color:#5a4500;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  font-weight:600;
  line-height:1.4;
}
.pin-close{
  background:transparent;border:none;
  color:#7a6000;font-size:16px;
  cursor:pointer;padding:0 2px;
  flex-shrink:0;line-height:1;
  opacity:.7;
}
.pin-close:hover{opacity:1;}

/* SEARCH OVERLAY */
.search-overlay{
  position:fixed;
  top:0;bottom:0;
  left:50%;transform:translateX(-50%);
  width:100%;max-width:860px;
  z-index:8000;
  background:#ffffff;
  display:none;flex-direction:column;
  box-shadow:0 0 40px rgba(0,0,0,.12);
}
.search-overlay.open{display:flex;}
.search-header{
  display:flex;align-items:center;gap:10px;
  padding:12px 16px;
  border-bottom:1px solid var(--border);
  background:#fff;
  height:56px;flex-shrink:0;
}
.search-input{
  flex:1;border:none;outline:none;font-size:15px;
  font-family:var(--font);color:var(--text);background:transparent;
}
.search-input::placeholder{color:#aaa;}
.btn-close-search{background:transparent;border:none;font-size:18px;color:var(--muted);cursor:pointer;}
.search-results{
  flex:1;overflow-y:auto;padding:12px 16px;
  display:flex;flex-direction:column;gap:8px;
}
.search-result-item{
  padding:10px 14px;border-radius:12px;
  background:#f9f9f9;border:1px solid var(--border);
  cursor:pointer;transition:background .15s;
}
.search-result-item:hover{background:#f0f0f0;}
.search-result-sender{font-size:11px;font-weight:700;color:var(--accent);margin-bottom:3px;}
.search-result-text{font-size:13px;color:var(--text);line-height:1.4;}
.search-result-text mark{background:#fff3a3;border-radius:3px;padding:0 2px;}
.search-result-time{font-size:10px;color:var(--muted);margin-top:3px;}
.search-empty{text-align:center;color:var(--muted);font-size:13px;margin-top:40px;}

/* SWIPE TO REPLY */
.swipe-hint{
  position:absolute;top:50%;transform:translateY(-50%);
  font-size:18px;opacity:0;transition:opacity .15s;
  pointer-events:none;
}
.msg-wrapper.sent  .swipe-hint{left:-32px;}
.msg-wrapper.recv  .swipe-hint{right:-32px;}

/* READ RECEIPTS */
.tick-sent    {color:rgba(255,255,255,.6);}
.tick-delivered{color:rgba(255,255,255,.7);}
.tick-read    {color:#53bdeb;}
.msg-wrapper.recv .tick-read{color:var(--accent);}

.btn-hdr.search-btn{color:var(--muted);}

/* Emoji Reactions */
.reactions-bar{
  display:flex;flex-wrap:wrap;gap:4px;
  margin-top:3px;
  min-height:0;
  padding: 0 4px;
}
.reactions-bar:empty{ display:none; }
.reaction-chip{
  display:inline-flex;align-items:center;gap:3px;
  background:#f0f0f0;border:1px solid #e0e0e0;
  border-radius:12px;padding:2px 7px;
  font-size:13px;cursor:pointer;
  transition:background .15s,transform .1s;
  user-select:none;
}
.reaction-chip:hover{background:#e5e5e5;transform:scale(1.05);}
.reaction-chip.mine{background:#d4f0e8;border-color:#a8dccb;}
.reaction-chip .r-count{font-size:11px;color:#555;font-family:var(--font);}

/* picker popup */
.emoji-picker{
  position:fixed;
  background:#fff;
  border:1px solid #e5e5e5;
  border-radius:14px;
  box-shadow:0 8px 28px rgba(0,0,0,.13);
  padding:8px 10px;
  display:flex;gap:6px;
  z-index:6000;
  animation:ctxIn .15s ease;
}
@keyframes ctxIn{from{opacity:0;transform:scale(.92)}to{opacity:1;transform:scale(1)}}
.emoji-picker span{
  font-size:22px;cursor:pointer;
  padding:4px;border-radius:8px;
  transition:background .12s,transform .1s;
  line-height:1;
}
.emoji-picker span:hover{background:#f0f0f0;transform:scale(1.2);}
.empty-state{margin:auto;text-align:center;color:var(--muted)}

/* Reply preview bar */
.reply-preview-bar{
  position:fixed;bottom:64px;left:0;right:0;
  max-width:860px;margin:0 auto;
  background:#fdfdfd;border-top:1px solid var(--border);
  padding:4px 14px;display:none;align-items:center;justify-content:space-between;
  height:40px;z-index:1001;
}
#chat-screen.has-reply .reply-preview-bar{display:flex;}
.reply-preview-content{border-right:3px solid var(--accent);padding-right:8px;font-size:11.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;color:#666;}
.reply-preview-title{font-weight:700;font-size:10.5px;color:var(--accent);margin-bottom:1px;}
.btn-close-reply{background:transparent;border:none;color:var(--muted);font-size:14px;cursor:pointer;padding:0 4px;}

/* Typing */
.typing-bar{position:fixed;bottom:64px;left:0;right:0;max-width:860px;margin:0 auto;padding:2px 16px;font-size:11px;color:var(--muted);height:20px;display:flex;align-items:center;gap:6px;z-index:999;background:transparent;}
#chat-screen.has-reply .typing-bar{bottom:104px;}
.typing-dots{display:flex;gap:3px}
.typing-dots span{width:4px;height:4px;border-radius:50%;background:var(--muted);animation:tdot 1.1s infinite;}
.typing-dots span:nth-child(2){animation-delay:.18s}
.typing-dots span:nth-child(3){animation-delay:.36s}
@keyframes tdot{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-4px);opacity:1}}

.upload-bar{background:rgba(16,163,127,.12);padding:5px 16px;font-size:11px;color:var(--accent);font-weight:600;display:none;align-items:center;gap:8px;}
.upload-bar.show{display:flex}
.upload-spin{width:12px;height:12px;border-radius:50%;border:2px solid var(--accent);border-top-color:transparent;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}

/* INPUT AREA */
.input-area {
  position:fixed;
  bottom:0;left:0;right:0;
  max-width:860px;margin:0 auto;
  background:#ffffff;
  padding:10px 16px;
  padding-bottom:calc(10px + env(safe-area-inset-bottom));
  display:flex;
  gap:8px;
  align-items:flex-end;
  border-top:1px solid #e5e5e5;
  z-index:1000;
  flex-direction: row;
}

.btn-send {
  width:36px;height:36px;border:none;border-radius:9px;
  background:var(--accent);color:white;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
  order: 1;
}
.btn-send svg {
  width:16px;height:16px;fill:white;
  transform: scaleX(-1);
}

.input-wrap {
  flex:1;
  background:var(--input-bg);
  border-radius:14px;
  display:flex;
  align-items:flex-end;
  gap:4px;
  padding:8px 12px;
  border:1px solid #d9d9d9;
  min-height:44px;
  order: 2;
  flex-direction: row-reverse;
}
.msg-input {
  flex:1;border:none;outline:none;background:transparent;
  color:var(--text);font-size:14px;font-family:var(--font);
  resize:none;max-height:120px;
  text-align: right;
}
.btn-attach {
  border:none;background:transparent;color:var(--muted);
  cursor:pointer;font-size:18px;display:flex;
  align-items:center;justify-content:center;
  width:30px;height:30px;
}

.btn-voice {
  width:36px;height:36px;border:none;border-radius:50%;
  background:transparent;color:var(--muted);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;flex-shrink:0;font-size:18px;
  transition:background .15s,color .15s,transform .15s;
  order: 3;
}
.btn-voice:hover{background:#f0f0f0;color:var(--accent);}
.btn-voice.recording{
  background:#fee2e2;color:#ef4444;
  animation:recPulse 1s infinite;
}

.rec-timer{
  font-size:12px;color:#ef4444;font-weight:600;
  display:none;align-items:center;gap:5px;
  font-family:var(--font);
}
.rec-timer.show{display:flex;}
.rec-dot{width:7px;height:7px;border-radius:50%;background:#ef4444;animation:recPulse .8s infinite;}

.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#0d0d0d;color:#ffffff;padding:8px 18px;border-radius:10px;font-size:13px;opacity:0;transition:.3s;z-index:9999;}
.toast.show{opacity:1}

/* Image Preview */
.img-preview-wrap{
  position:fixed;inset:0;z-index:7000;
  background:#111;
  display:none;flex-direction:column;
}
.img-preview-wrap.open{display:flex;}
.img-preview-main{
  flex:1;display:flex;align-items:center;justify-content:center;
  overflow:hidden;padding:16px;min-height:0;
}
.img-preview-main img{max-width:100%;max-height:100%;object-fit:contain;border-radius:8px;}
.img-preview-strip{
  display:flex;gap:6px;padding:8px 12px;overflow-x:auto;
  background:rgba(0,0,0,.4);flex-shrink:0;
  -webkit-overflow-scrolling:touch;justify-content:center;
}
.img-preview-strip::-webkit-scrollbar{display:none;}
.prev-thumb{
  position:relative;width:56px;height:56px;
  border-radius:8px;overflow:hidden;border:2px solid transparent;
  cursor:pointer;flex-shrink:0;transition:border-color .15s;
}
.prev-thumb.active{border-color:#ffffff;}
.prev-thumb img{width:100%;height:100%;object-fit:cover;}
.prev-thumb .remove-thumb{
  position:absolute;top:2px;right:2px;
  width:18px;height:18px;border-radius:50%;
  background:rgba(0,0,0,.7);color:#fff;
  border:none;font-size:10px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
}
.img-preview-actions{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 16px;padding-bottom:calc(10px + env(safe-area-inset-bottom));
  background:rgba(0,0,0,.5);flex-shrink:0;
}
.img-preview-count{font-size:13px;color:rgba(255,255,255,.8);}

<script>
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyCqkSRiU0n0G4AFSJQCLCO-wqip6sKwCz0",
  authDomain: "syncchat-6e22b.firebaseapp.com",
  databaseURL: "https://syncchat-6e22b-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "syncchat-6e22b",
  storageBucket: "syncchat-6e22b.firebasestorage.app",
  messagingSenderId: "692797381468",
  appId: "1:692797381468:web:9faaed7bf44f0f527a3f99"
};

let db, storage;
let myName, myId, roomId;
let messagesRef, presenceRef, typingRef, roomPresenceGeneralRef;
let currentActivePeerRef = null;
let typingTimeout;
let peerTypingListener;
let isInitialLoad = true;
let currentReplyTarget = null;
let activeMessageKey = null; // يحفظ كود الرسالة النشطة حالياً لإظهار أزرارها
let inactivityTimeout;
let pinnedMsgKey   = null;
let pinnedMsgText  = '';
let allMessages    = {};   
const INACTIVITY_LIMIT = 2 * 60 * 1000;

const $   = id => document.getElementById(id);
const esc = s  => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const initials = n => n.trim().slice(0,2).toUpperCase();
const genId    = () => Math.random().toString(36).slice(2,10);
const fmt      = ts => new Date(ts).toLocaleTimeString('ar-EG',{hour:'2-digit',minute:'2-digit'});

const fmtFull = ts => {
  if (!ts || typeof ts === 'object') { ts = Date.now(); }
  try {
    const d = new Date(ts);
    if (isNaN(d.getTime())) return '';
    return d.toLocaleDateString('ar-EG',{day:'numeric',month:'long'}) + ' - ' + d.toLocaleTimeString('ar-EG',{hour:'2-digit',minute:'2-digit'});
  } catch(e){ return ''; }
};

function playNotificationSound() {
  if (document.visibilityState === 'visible') return;
  try {
    const AC = window.AudioContext || window.webkitAudioContext;
    if (!AC) return;
    const ctx = new AC();
    const osc = ctx.createOscillator(); const g = ctx.createGain();
    osc.type='sine'; osc.frequency.setValueAtTime(587.33, ctx.currentTime);
    g.gain.setValueAtTime(0.1, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime+0.15);
    osc.connect(g); g.connect(ctx.destination);
    osc.start(); osc.stop(ctx.currentTime+0.15);
  } catch(e){}
}

function startInactivityTimer() {
  resetInactivityTimer();
  ['mousemove','click','keydown','scroll','touchstart'].forEach(e => window.addEventListener(e, resetInactivityTimer, true));
}
function stopInactivityTimer() {
  clearTimeout(inactivityTimeout);
  ['mousemove','click','keydown','scroll','touchstart'].forEach(e => window.removeEventListener(e, resetInactivityTimer, true));
}
function resetInactivityTimer() {
  clearTimeout(inactivityTimeout);
  if (roomId) inactivityTimeout = setTimeout(leaveRoom, INACTIVITY_LIMIT);
}

function showToast(msg){ 
  const t=$('toast'); 
  t.textContent=msg; 
  t.classList.add('show'); 
  clearTimeout(window.toastTimeout);
  window.toastTimeout = setTimeout(()=>t.classList.remove('show'),2800); 
}
function openImgModal(src){ $('modal-img').src=src; $('img-modal').classList.add('open'); }
function closeImgModal(){ $('img-modal').classList.remove('open'); }
function initFirebase(){ if(!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG); db=firebase.database(); storage=firebase.storage(); }

async function joinRoom(){
  const name=$('name-input').value.trim();
  const room=$('room-input').value.trim().replace(/\s+/g,'');
  const err=$('login-error'); err.textContent='';
  if(!name){ err.textContent='من فضلك أدخل اسمك'; return; }
  if(!room){ err.textContent='من فضلك أدخل رمز الغرفة'; return; }
  const btn=$('join-btn'); btn.disabled=true; btn.textContent='جاري الدخول...';
  try{ initFirebase(); } catch(e){ err.textContent='خطأ في تهيئة Firebase'; btn.disabled=false; return; }

  myName=name; myId=genId(); roomId=room; isInitialLoad=true;
  messagesRef          = db.ref(`rooms/${roomId}/messages`);
  presenceRef          = db.ref(`rooms/${roomId}/presence/${myName}`);
  typingRef            = db.ref(`rooms/${roomId}/typing/${myId}`);
  roomPresenceGeneralRef = db.ref(`rooms/${roomId}/presence`);

  await presenceRef.set({ name:myName, online:true, joinedAt:Date.now() });
  presenceRef.onDisconnect().set({ name:myName, online:false, lastSeen:firebase.database.ServerValue.TIMESTAMP });
  typingRef.onDisconnect().remove();

  $('my-avatar').textContent    = initials(myName);
  $('header-room-id').textContent = 'غرفة: ' + roomId;

  setupListeners(); startInactivityTimer();
  $('login-screen').classList.add('hidden');
  $('chat-screen').classList.remove('hidden');
  setTimeout(initScrollButton, 100);
  await messagesRef.push({ type:'system', text:myName+' انضم إلى المحادثة', ts:Date.now() });
}

function setupListeners(){
  roomPresenceGeneralRef.on('value', snap => {
    const data  = snap.val() || {};
    const dot=$('online-dot'), txt=$('peer-status'), pav=$('peer-avatar');

    const peers = Object.entries(data)
      .filter(([k, u]) => u && u.name && u.name !== myName);

    if (currentActivePeerRef) { currentActivePeerRef.off(); currentActivePeerRef=null; }

    if (peers.length === 0) {
      dot.classList.remove('on');
      txt.textContent = 'في انتظار الطرف الآخر...';
      pav.textContent = '؟';
      return;
    }

    const onlinePeers  = peers.filter(([k,u]) => u.online === true);
    const offlinePeers = peers.filter(([k,u]) => u.online !== true);

    let chosen;
    if (onlinePeers.length > 0) {
      chosen = onlinePeers.sort((a,b)=>(b[1].joinedAt||0)-(a[1].joinedAt||0))[0];
    } else {
      chosen = offlinePeers.sort((a,b)=>(b[1].lastSeen||0)-(a[1].lastSeen||0))[0];
    }

    const [chosenKey, chosenUser] = chosen;
    pav.textContent = initials(chosenUser.name || '؟');

    currentActivePeerRef = db.ref(`rooms/${roomId}/presence/${chosenKey}`);
    currentActivePeerRef.on('value', pSnap => {
      const u = pSnap.val(); if (!u) return;
      pav.textContent = initials(u.name || '؟');
      if (u.online) {
        dot.classList.add('on');
        txt.textContent = u.name + ' متصل الآن';
      } else {
        dot.classList.remove('on');
        const shortTime = u.lastSeen ? new Date(u.lastSeen).toLocaleTimeString('ar-EG',{hour:'2-digit',minute:'2-digit'}) : '';
        const shortDate = u.lastSeen ? new Date(u.lastSeen).toLocaleDateString('ar-EG',{day:'numeric',month:'numeric'}) : '';
        const now = new Date();
        const seenDate = u.lastSeen ? new Date(u.lastSeen) : null;
        const isToday = seenDate && seenDate.toDateString() === now.toDateString();
        const displayTime = isToday ? shortTime : (shortDate + ' ' + shortTime);
        txt.textContent = displayTime ? `آخر ظهور ${displayTime}` : u.name + ' غير متصل';
      }
    });
  });

  if (peerTypingListener) db.ref(`rooms/${roomId}/typing`).off('value', peerTypingListener);
  peerTypingListener = db.ref(`rooms/${roomId}/typing`).on('value', snap => {
    const data = snap.val() || {};
    const activePeer = Object.entries(data).find(([id, v]) => id !== myId && v === true);
    const bar = $('typing-bar');
    if (activePeer) {
      db.ref(`rooms/${roomId}/presence`).once('value', pSnap => {
        const pData = pSnap.val() || {};
        const found = Object.values(pData).find(u => u.online && u.name !== myName);
        bar.innerHTML = `<div class="typing-dots"><span></span><span></span><span></span></div><span>${esc(found?found.name:'الطرف الآخر')} يكتب...</span>`;
      });
    } else { bar.innerHTML = ''; }
  });

  db.ref(`rooms/${roomId}/clearSignal`).on('value', snap => {
    if (!snap.exists()) return;
    const area = $('messages-area');
    if (!area) return;
    area.innerHTML = `<div class="empty-state" id="empty-state">
      <div style="font-size:40px;margin-bottom:8px;opacity:.3">🗑️</div>
      <p>تم مسح المحادثة</p>
    </div>`;
  });

  messagesRef.once('value', () => { isInitialLoad=false; });
  messagesRef.on('child_added', snap => {
    const msg=snap.val(); appendMessage(msg, snap.key);
    if (!isInitialLoad && msg.type!=='system' && msg.senderName!==myName) {
      playNotificationSound();
      markDelivered(snap.key, msg);
    }
  });

  db.ref(`rooms/${roomId}/readBy`).on('value', snap => {
    const data = snap.val() || {};
    const peerRead = Object.entries(data).find(([id]) => id !== myId);
    if (peerRead) {
      document.querySelectorAll('.check-icon').forEach(el => {
        el.classList.remove('tick-sent','tick-delivered');
        el.classList.add('tick-read');
        el.textContent = '✓✓';
      });
    }
  });

  markAsRead();
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible' && roomId) markAsRead();
  });

  db.ref(`rooms/${roomId}/pinnedMsg`).on('value', snap => {
    const data = snap.val();
    if (data && data.key) {
      pinnedMsgKey  = data.key;
      pinnedMsgText = data.text || 'رسالة مثبتة';
      $('pin-text').textContent = pinnedMsgText;
      $('pin-bar').classList.add('show');
      document.getElementById('chat-screen').classList.add('has-pin');
    } else {
      pinnedMsgKey = null;
      $('pin-bar').classList.remove('show');
      document.getElementById('chat-screen').classList.remove('has-pin');
    }
  });
}

function markAsRead() {
  if (!roomId || !myId) return;
  db.ref(`rooms/${roomId}/readBy/${myId}`).set(Date.now());
}

function markDelivered(key, msg) {
  if (!key || msg.senderName === myName) return;
  const tick = document.getElementById('tick-' + key);
  if (tick) { tick.textContent = '✓✓'; tick.classList.add('tick-delivered'); }
}

function toggleMessageActions(key, event) {
  if (event) event.stopPropagation(); // منع انتشار الحدث إلى مستند الصفحة لئلا يغلق القائمة فوراً
  
  const currentRow = document.getElementById(`msg-row-${key}`);
  const previousRow = activeMessageKey ? document.getElementById(`msg-row-${activeMessageKey}`) : null;

  // إغلاق أي منيو أخرى مفتوحة أولاً
  if (previousRow && activeMessageKey !== key) {
    previousRow.classList.remove('active-actions');
  }

  // عمل Toggle لحالة الرسالة الحالية
  if (activeMessageKey === key) {
    currentRow.classList.remove('active-actions');
    activeMessageKey = null;
  } else {
    currentRow.classList.add('active-actions');
    activeMessageKey = key;
  }
}

// مستمع لغلق الأزرار عند الضغط على أي مكان فارغ بالشاشة
document.addEventListener('click', () => {
  if (activeMessageKey) {
    const currentRow = document.getElementById(`msg-row-${activeMessageKey}`);
    if (currentRow) currentRow.classList.remove('active-actions');
    activeMessageKey = null;
  }
});

function initiateReply(senderName, text, targetKey = null) {
  currentReplyTarget = { senderName, text, key: targetKey };
  $('reply-preview-sender').textContent = `الرد على ${senderName}`;
  $('reply-preview-text').textContent   = text || '[ملف / ميديا]';
  $('chat-screen').classList.add('has-reply');
  $('msg-input').focus();
}

function cancelReply() {
  currentReplyTarget = null;
  $('chat-screen').classList.remove('has-reply');
}

function appendMessage(msg, key){
  const area=$('messages-area'); const empty=$('empty-state'); if(empty) empty.remove();
  const div=document.createElement('div');

  if (key && msg.type !== 'system') allMessages[key] = msg;

  if (msg.type==='system') {
    div.className='system-msg'; div.textContent=msg.text;
  }
