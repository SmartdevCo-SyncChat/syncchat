<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>غرفة الدردشة الذكية</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Font Awesome لترقية الأيقونات -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* تحسينات مخصصة لتجربة مستخدم سلسة */
        .message-bubble .actions-group {
            display: none;
        }
        /* إظهار الأزرار عند الحوم بالماوس في الشاشات الكبيرة */
        @media (min-width: 768px) {
            .message-bubble:hover .actions-group {
                display: flex;
            }
        }
        /* الفئة التي سيتم إضافتها عبر الجافاسكريبت عند الضغط على الرسالة في الموبايل */
        .message-bubble.show-actions .actions-group {
            display: flex;
        }
    </style>
</head>
<body class="bg-slate-100 font-sans h-screen flex flex-col">

    <!-- شاشة تسجيل الدخول -->
    <div id="login-screen" class="fixed inset-0 bg-slate-900/5xl flex items-center justify-center z-50 p-4 bg-opacity-90 bg-slate-900">
        <div class="bg-white rounded-2xl shadow-2xl p-8 max-w-md w-full text-center space-y-6">
            <div class="w-20 h-20 bg-blue-600 rounded-full flex items-center justify-center mx-auto shadow-lg shadow-blue-500/30">
                <i class="fas fa-comments text-white text-3xl"></i>
            </div>
            <h2 class="text-2xl font-bold text-slate-800">مرحباً بك في الدردشة</h2>
            <p class="text-slate-500 text-sm">أدخل اسمك للانضمام إلى غرفة المحادثة الفورية</p>
            <div class="space-y-4">
                <input type="text" id="username-input" placeholder="اكتب اسمك هنا..." class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:border-blue-500 text-center text-lg font-medium">
                <button onclick="joinRoom()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-xl transition duration-2xl shadow-lg shadow-blue-500/20 cursor-pointer">
                    دخول الغرفة
                </button>
            </div>
        </div>
    </div>

    <!-- الواجهة الرئيسية للتطبيق -->
    <div id="app-container" class="flex flex-col h-full max-w-4xl w-full mx-auto bg-white shadow-xl hidden">
        
        <!-- الهيدر (رأس الصفحة) -->
        <header class="bg-white border-b border-slate-100 px-6 py-4 flex items-center justify-between sticky top-0 z-10">
            <div class="flex items-center space-y-2 gap-3">
                <div class="w-10 h-10 bg-blue-100 rounded-xl flex items-center justify-center text-blue-600 font-bold" id="user-avatar">
                    U
                </div>
                <div>
                    <h1 class="font-bold text-slate-800 text-md" id="user-display-name">المستخدم</h1>
                    <span class="text-xs text-green-500 flex items-center gap-1">
                        <span class="w-2 h-2 bg-green-500 rounded-full inline-block animate-pulse"></span> متصل الآن
                    </span>
                </div>
            </div>
            <!-- زر البحث المبدئي -->
            <button class="text-slate-400 hover:text-slate-600 p-2 rounded-lg hover:bg-slate-50 transition">
                <i class="fas fa-search text-lg"></i>
            </button>
        </header>

        <!-- منطقة الرسائل والمحادثة -->
        <main id="chat-messages" class="flex-1 overflow-y-auto p-6 space-y-4 bg-slate-50/50">
            <!-- رسالة ترحيبية كمثال -->
            <div class="flex justify-center my-4">
                <span class="bg-blue-50 text-blue-600 text-xs px-3 py-1.5 rounded-full font-medium">بدأت المحادثة الآمنة</span>
            </div>
        </main>

        <!-- صندوق المدخلات (إرسال الرسائل) -->
        <footer class="p-4 bg-white border-t border-slate-100 sticky bottom-0">
            <div class="flex items-center gap-2 bg-slate-100 rounded-2xl p-2 border border-slate-200/50">
                <button class="text-slate-400 hover:text-blue-600 p-2 rounded-xl hover:bg-white transition cursor-pointer">
                    <i class="fas fa-paperclip text-lg"></i>
                </button>
                <input type="text" id="message-input" placeholder="اكتب رسالتك هنا..." class="flex-1 bg-transparent border-none outline-none px-2 py-2 text-slate-700 placeholder-slate-400">
                <button onclick="sendMessage()" class="bg-blue-600 hover:bg-blue-700 text-white w-10 h-10 rounded-xl flex items-center justify-center transition shadow-md shadow-blue-500/20 cursor-pointer">
                    <i class="fas fa-paper-plane text-sm transform -rotate-45"></i>
                </button>
            </div>
        </footer>
    </div>

    <!-- كود التشغيل والـ JavaScript المُصلح -->
    <script>
        let currentUser = "";

        // دالة الانضمام للغرفة وتخطي شاشة الدخول
        function joinRoom() {
            const usernameInput = document.getElementById('username-input');
            const name = usernameInput.value.trim();
            
            if (name === "") {
                alert("برجاء إدخال اسم صحيح أولاً!");
                return;
            }

            currentUser = name;
            document.getElementById('user-display-name').innerText = currentUser;
            document.getElementById('user-avatar').innerText = currentUser.charAt(0).toUpperCase();
            
            // إخفاء شاشة الدخول وإظهار التطبيق
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('app-container').classList.remove('hidden');
            
            // التركيز الفوري على صندوق الكتابة
            document.getElementById('message-input').focus();
        }

        // دالة إرسال الرسالة وبناء الهيكل الخاص بها
        function sendMessage() {
            const messageInput = document.getElementById('message-input');
            const text = messageInput.value.trim();

            if (text === "") return;

            const chatMessages = document.getElementById('chat-messages');

            // هيكل الأزرار السريعة الذكية (رد، نسخ، تثبيت)
            const actionsGroupHtml = `
                <div class="actions-group absolute -top-8 left-2 bg-white border border-slate-100 rounded-lg shadow-md flex items-center p-1 gap-1 z-10 transition-all duration-200">
                    <button onclick="replyMessage(this, event)" class="p-1 px-2 text-xs text-slate-500 hover:text-blue-600 hover:bg-slate-50 rounded" title="رد">
                        <i class="fas fa-reply"></i>
                    </button>
                    <button onclick="copyMessage(this, event)" class="p-1 px-2 text-xs text-slate-500 hover:text-green-600 hover:bg-slate-50 rounded" title="نسخ">
                        <i class="fas fa-copy"></i>
                    </button>
                    <button onclick="pinMessage(this, event)" class="p-1 px-2 text-xs text-slate-500 hover:text-amber-500 hover:bg-slate-50 rounded" title="تثبيت">
                        <i class="fas fa-thumbtack"></i>
                    </button>
                </div>
            `;

            // بناء عنصر الرسالة بالكامل
            const messageWrapper = document.createElement('div');
            messageWrapper.className = "flex flex-col items-end space-y-1 max-w-[85%] ms-auto";
            
            messageWrapper.innerHTML = `
                <span class="text-xs text-slate-400 px-2">${currentUser}</span>
                <div class="message-bubble relative bg-blue-600 text-white p-3.5 rounded-2xl rounded-tl-none shadow-sm cursor-pointer transition-all duration-200" onclick="toggleMobileActions(this)">
                    ${actionsGroupHtml}
                    <p class="text-sm leading-relaxed break-words"><span class="message-text">${text}</span></p>
                </div>
                <span class="text-[10px] text-slate-400 px-2">${new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</span>
            `;

            chatMessages.appendChild(messageWrapper);
            
            // تصفير صندوق المدخلات والنزول لآخر رسالة
            messageInput.value = "";
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        // دالة التحكم في إظهار الأزرار عند الضغط في شاشات الموبايل
        function toggleMobileActions(bubbleElement) {
            // التحقق مما إذا كان المستخدم يفتح من جهاز لوحي أو هاتف ذكي
            if (window.innerWidth < 768) {
                // إغلاق أي أزرار مفتوحة في رسائل أخرى أولاً لمظهر نظيف
                document.querySelectorAll('.message-bubble').forEach(el => {
                    if (el !== bubbleElement) el.classList.remove('show-actions');
                });
                // تبديل حالة الرسالة الحالية
                bubbleElement.classList.toggle('show-actions');
            }
        }

        // إمكانية الإرسال عبر زر Enter من لوحة المفاتيح
        document.getElementById('message-input')?.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });

        // دالة نسخ نص الرسالة للحافظة (مُعدلة ومضمونة للرسائل الكبيرة)
        function copyMessage(btn, event) {
            event.stopPropagation(); // منع إغلاق القائمة عند الضغط على الزر نفسه
            const bubble = btn.closest('.message-bubble');
            const text = bubble.querySelector('.message-text').innerText;
            
            navigator.clipboard.writeText(text).then(() => {
                alert('تم نسخ النص بنجاح!');
                bubble.classList.remove('show-actions');
            }).catch(err => {
                console.error('فشل النسخ: ', err);
            });
        }

        // دوال وهمية جاهزة للربط مستقبلاً بـ Firebase
        function replyMessage(btn, event) {
            event.stopPropagation();
            const bubble = btn.closest('.message-bubble');
            const text = bubble.querySelector('.message-text').innerText;
            document.getElementById('message-input').value = `رداً على (${text.substring(0, 20)}...): `;
            document.getElementById('message-input').focus();
            bubble.classList.remove('show-actions');
        }

        function pinMessage(btn, event) {
            event.stopPropagation();
            alert('تم تثبيت الرسالة بنجاح!');
            btn.closest('.message-bubble').classList.remove('show-actions');
        }
    </script>
</body>
</html>
