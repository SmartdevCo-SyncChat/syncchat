<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
<title>ChatBFT</title>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

:root{
  --accent:#10a37f;
  --text:#0d0d0d;
  --muted:#6e6e80;
  --border:#e5e5e5;
  --input-bg:#f4f4f4;
  --font:'Cairo',sans-serif;
}

html,body{height:100%;font-family:var(--font);background:#fff}

/* HEADER */
.chat-header{
  position:fixed;top:0;left:0;right:0;
  height:56px;background:#fff;
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;
  padding:0 12px;z-index:1000;
}

.peer-avatar{
  width:34px;height:34px;border-radius:50%;
  background:var(--accent);color:#fff;
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:700;
}

.header-info{flex:1;margin-right:10px}
.header-room{font-size:14px;font-weight:600}
.header-sub{font-size:11px;color:var(--muted)}

.online-dot{width:6px;height:6px;border-radius:50%;background:var(--muted);display:inline-block;margin-left:5px}
.online-dot.on{background:var(--accent)}

/* MESSAGES */
.messages-area{
  padding:70px 12px 90px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.msg-wrapper{display:flex}
.msg-wrapper.sent{justify-content:flex-start}
.msg-wrapper.recv{justify-content:flex-end}

.msg-bubble{
  max-width:75%;
  padding:8px 10px;
  border-radius:12px;
  font-size:14px;
  word-break:break-word;
}

.msg-wrapper.sent .msg-bubble{
  background:var(--accent);color:#fff;
  border-bottom-left-radius:4px;
}

.msg-wrapper.recv .msg-bubble{
  background:#f1f1f1;color:#000;
  border-bottom-right-radius:4px;
}

.msg-meta{
  font-size:9px;margin-top:4px;opacity:.7;text-align:left
}

/* 🔥 REPLY FIX (واتساب ستايل صغير جداً) */
.reply-quotation{
  background:rgba(0,0,0,0.04);
  border-right:3px solid var(--accent);
  padding:3px 6px;
  border-radius:6px;
  font-size:11px;
  margin-bottom:4px;
  max-width:220px;
  line-height:1.2;
}

.reply-quotation-sender{
  font-size:10px;
  font-weight:700;
  margin-bottom:1px;
  color:var(--accent);
}

/* INPUT */
.input-area{
  position:fixed;bottom:0;left:0;right:0;
  background:#fff;border-top:1px solid var(--border);
  display:flex;gap:8px;padding:10px;
}

.input-area input{
  flex:1;padding:10px;border-radius:10px;
  border:1px solid var(--border);
  background:var(--input-bg);
}

button{
  background:var(--accent);
  border:none;color:#fff;
  padding:10px 14px;border-radius:10px;
}

/* LOGIN */
#login-screen{
  display:flex;align-items:center;justify-content:center;
  height:100%;
}
.login-box{width:300px}
.login-box input{
  width:100%;margin-bottom:10px;padding:10px;
  border:1px solid var(--border);border-radius:8px;
}
</style>
</head>

<body>

<div id="login-screen">
  <div class="login-box">
    <input id="name" placeholder="اسمك"/>
    <input id="room" placeholder="روم"/>
    <button onclick="join()">دخول</button>
  </div>
</div>

<div id="chat" style="display:none">

  <div class="chat-header">
    <div class="peer-avatar" id="avatar">?</div>
    <div class="header-info">
      <div class="header-room" id="roomTitle">Room</div>
      <div class="header-sub">
        <span class="online-dot" id="dot"></span>
        <span id="status">...</span>
      </div>
    </div>
  </div>

  <div class="messages-area" id="msgs"></div>

  <div class="input-area">
    <input id="input" placeholder="اكتب..."/>
    <button onclick="send()">إرسال</button>
  </div>

</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCqkSRiU0n0G4AFSJQCLCO-wqip6sKwCz0",
  authDomain: "syncchat-6e22b.firebaseapp.com",
  databaseURL: "https://syncchat-6e22b-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "syncchat-6e22b",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let room, name;

function join(){
  name = document.getElementById('name').value;
  room = document.getElementById('room').value;

  document.getElementById('login-screen').style.display='none';
  document.getElementById('chat').style.display='block';

  document.getElementById('roomTitle').innerText = room;

  listenMessages();
  listenPresence();

  db.ref(`rooms/${room}/presence/${name}`).set({
    name,
    online:true,
    joinedAt:Date.now()
  });
}

function listenPresence(){
  const ref = db.ref(`rooms/${room}/presence`);

  ref.on('value', snap=>{
    const data = snap.val() || {};

    const users = Object.values(data)
      .filter(u=>u.name && u.name !== name)
      .sort((a,b)=>(b.joinedAt||0)-(a.joinedAt||0));

    const last = users[0];

    if(last){
      document.getElementById('avatar').innerText = last.name.slice(0,2);
      document.getElementById('status').innerText = last.online ? 
        `${last.name} متصل` : `آخر ظهور: ${last.name}`;
      document.getElementById('dot').classList.toggle('on', last.online);
    }else{
      document.getElementById('status').innerText='في انتظار الطرف الآخر';
    }
  });
}

function listenMessages(){
  db.ref(`rooms/${room}/messages`).on('child_added', snap=>{
    const m = snap.val();

    const div = document.createElement('div');
    div.className = 'msg-wrapper ' + (m.sender===name ? 'sent':'recv');

    let reply='';
    if(m.replyTo){
      reply = `
        <div class="reply-quotation">
          <div class="reply-quotation-sender">${m.replyTo.sender}</div>
          <div>${m.replyTo.text}</div>
        </div>`;
    }

    div.innerHTML = `
      <div class="msg-bubble">
        ${reply}
        ${m.text || ''}
        <div class="msg-meta">${new Date(m.ts).toLocaleTimeString()}</div>
      </div>
    `;

    document.getElementById('msgs').appendChild(div);
  });
}

function send(){
  const input = document.getElementById('input');
  const text = input.value;

  db.ref(`rooms/${room}/messages`).push({
    text,
    sender:name,
    ts:Date.now()
  });

  input.value='';
}
</script>

</body>
</html>
