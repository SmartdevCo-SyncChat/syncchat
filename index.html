<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>SyncChat Pro</title>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>

<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  -webkit-tap-highlight-color: transparent;
}

:root{
  --bg: #ffffff;
  --surface: #f0f4f9;        
  --surface2: #e3eaf2;
  --border: #dee2e6;
  --accent: #1a73e8;         
  --text: #1f1f1f;           
  --muted: #5f6368;          
  --danger: #d93025;
  --warning: #f2994a;
  --success: #188038;
}

html, body {
  width: 100%;
  height: 100vh;
  height: 100dvh; 
  overflow: hidden;
  font-family: 'IBM Plex Sans Arabic', sans-serif;
  background-color: var(--bg);
  background-image: 
    radial-gradient(circle at 10% 20%, rgba(26, 115, 232, 0.03) 0%, transparent 50%),
    radial-gradient(circle at 90% 80%, rgba(24, 128, 56, 0.02) 0%, transparent 50%);
  color: var(--text);
}

#app {
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
}

.screen {
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  overflow: hidden; /* يمنع الشاشة بالكامل من السكرول */
}

.hidden { display: none !important; }

/* LOGIN */
#login-screen {
  align-items: center;
  justify-content: center;
  padding: 20px;
  overflow-y: auto;
}

.login-card {
  width: 100%;
  max-width: 400px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 30px 20px;
  box-shadow: 0 12px 30px rgba(0,0,0,0.04);
}

.logo {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  margin-bottom: 24px;
}

.logo-icon {
  width: 50px;
  height: 50px;
  border-radius: 16px;
  background: linear-gradient(135deg, #1a73e8, #4285f4);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
}

.logo-text { font-size: 26px; font-weight: 700; color: #1f1f1f; }
.logo-text span { color: var(--accent); }

.field { margin-bottom: 16px; }
.field label { display: block; margin-bottom: 6px; font-size: 13px; color: var(--muted); font-weight: 500; }
.field input {
  width: 100%;
  background: #ffffff;
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 14px;
  color: var(--text);
  outline: none;
  font-size: 16px;
}

.btn-primary {
  width: 100%;
  border: none;
  border-radius: 12px;
  padding: 14px;
  cursor: pointer;
  color: white;
  font-size: 15px;
  font-weight: 600;
  background: var(--accent);
}

.error-msg { min-height: 18px; color: var(--danger); font-size: 12px; margin-bottom: 10px; }

/* CHAT CONTAINER */
#chat-screen { 
  max-width: 900px; 
  margin: 0 auto; 
  background: #ffffff; 
  height: 100%;
  display: flex;
  flex-direction: column;
  overflow: hidden; /* تأكيد عدم خروج أي عنصر */
}

/* التعديل الجديد: هيدر ثابت ومستقر تماماً في الأعلى */
.chat-header {
  position: -webkit-sticky;
  position: sticky;
  top: 0;
  height: 70px;
  min-height: 70px;
  background: rgba(255, 255, 255, 0.98); /* زيادة العتامة لمنع شفافية الرسائل خلفه */
  backdrop-filter: blur(10px);
  border-bottom: 1px solid #f0f0f0;
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 0 15px;
  z-index: 100; /* طبقة عليا لضمان عدم اختفائه تحت الرسائل */
}

.avatar {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  background: var(--surface2);
  color: var(--accent);
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: 14px;
}

.header-info { flex: 1; min-width: 0; }
.header-room { font-size: 14px; font-weight: 600; color: var(--text); }
.header-sub { font-size: 11px; color: var(--muted); }

.btn-clear, .btn-leave {
  border: none;
  padding: 8px 12px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 12px;
  font-weight: 600;
}
.btn-clear { background: #fef7e0; color: #b06000; margin-left: 5px; }
.btn-leave { background: #fce8e6; color: var(--danger); }

/* MESSAGES AREA - الجزء الوحيد المسموح له بالسكرول */
.messages-area {
  flex: 1;
  overflow-y: auto;
  padding: 15px;
  display: flex;
  flex-direction: column;
  gap: 14px;
  background: #ffffff;
  -webkit-overflow-scrolling: touch; /* سكرول ناعم وسلس على آيفون */
}

.msg-wrapper { display: flex; }
.msg-wrapper.sent { justify-content: flex-end; }
.msg-content { max-width: 85%; }
.msg-name { font-size: 11px; color: var(--muted); margin-bottom: 3px; padding: 0 4px; }

.msg-bubble {
  padding: 12px 16px;
  border-radius: 20px;
  line-height: 1.5;
  font-size: 14px;
  word-break: break-word;
  white-space: pre-wrap; 
}
.msg-bubble.sent { background: var(--surface); color: var(--text); border-bottom-left-radius: 4px; }
.msg-bubble.recv { background: #ffffff; color: var(--text); border: 1px solid #e3e8ec; border-bottom-right-radius: 4px; }

.chat-image {
  max-width: 100%;
  max-height: 250px;
  border-radius: 12px;
  margin-top: 5px;
  display: block;
  cursor: pointer;
}
.file-attachment {
  display: flex;
  align-items: center;
  gap: 8px;
  background: rgba(0,0,0,0.03);
  padding: 10px;
  border-radius: 12px;
  margin-top: 5px;
  text-decoration: none;
  color: var(--accent);
  font-weight: 500;
}

.msg-time { margin-top: 4px; display: block; font-size: 10px; color: var(--muted); padding: 0 4px; }
.system-msg { align-self: center; background: #f1f3f4; padding: 5px 14px; border-radius: 20px; color: var(--muted); font-size: 11px; }
.empty-state { margin: auto; color: var(--muted); font-size: 14px; text-align: center; }

/* INPUT AREA FIXED AT THE BOTTOM */
.input-area {
  padding: 12px 15px;
  display: flex;
  gap: 10px;
  background: #ffffff;
  align-items: center;
  border-top: 1px solid #f0f0f0;
  padding-bottom: calc(12px + env(safe-area-inset-bottom));
}

.msg-input {
  flex: 1;
  background: var(--surface);
  border: 1px solid transparent;
  border-radius: 24px; 
  padding: 12px 18px;
  resize: none;
  color: var(--text);
  outline: none;
  font-size: 16px;
  max-height: 120px;
}
.msg-input:focus { background: #ffffff; border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }

.btn-action {
  width: 44px;
  height: 44px;
  min-width: 44px;
  border: none;
  border-radius: 50%; 
  cursor: pointer;
  background: var(--surface);
  color: var(--muted);
  font-size: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.btn-send { background: var(--surface); color: var(--accent); font-size: 16px; }
.btn-action:hover, .btn-send:hover { background: var(--surface2); }

.upload-status {
  padding: 5px 15px;
  font-size: 11px;
  color: var(--accent);
  background: #e8f0fe;
  display: none;
  text-align: center;
}

.toast {
  position: fixed;
  bottom: 90px;
  left: 50%;
  transform: translateX(-50%);
  background: #323232;
  color: white;
  padding: 10px 18px;
  border-radius: 8px;
  opacity: 0;
  transition: .3s;
  font-size: 14px;
  z-index: 100;
}
.toast.show { opacity: 1; }
</style>
</head>
<body>

<div id="app">

  <!-- LOGIN -->
  <div id="login-screen" class="screen">
    <div class="login-card">
      <div class="logo">
        <div class="logo-icon">💬</div>
        <div class="logo-text">Sync<span>Chat</span></div>
      </div>
      <div class="field">
        <label>اسمك</label>
        <input type="text" id="name-input" placeholder="Ahmed">
      </div>
      <div class="field">
        <label>Room ID</label>
        <input type="text" id="room-input" placeholder="room123">
      </div>
      <div class="error-msg" id="login-error"></div>
      <button class="btn-primary" onclick="joinRoom()">دخول الغرفة</button>
    </div>
  </div>

  <!-- CHAT -->
  <div id="chat-screen" class="screen hidden">
    <!-- هيدر ثابت -->
    <div class="chat-header">
      <div class="avatar" id="my-avatar">ME</div>
      <div class="header-info">
        <div class="header-room" id="header-room-id">Room</div>
        <div class="header-sub" id="peer-status">في انتظار الطرف الآخر...</div>
      </div>
      <button class="btn-clear" onclick="clearChat()">مسح</button>
      <button class="btn-leave" onclick="leaveRoom()">مغادرة</button>
    </div>

    <div class="upload-status" id="upload-status">جاري رفع الملف... ⏳</div>

    <!-- منطقة تمرير الرسائل المخصصة -->
    <div class="messages-area" id="messages-area">
      <div class="empty-state" id="empty-state">ابدأ المحادثة الآن ✨</div>
    </div>

    <!-- صندوق الإرسال السفلي -->
    <div class="input-area">
      <input type="file" id="file-chooser" class="hidden" onchange="handleFileSelect(this)">
      <button class="btn-action" onclick="$('file-chooser').click()">📎</button>
      
      <textarea
        id="msg-input"
        class="msg-input"
        rows="1"
        placeholder="اكتب رسالة..."
        onkeydown="handleKey(event)"
        oninput="handleTyping()"
      ></textarea>
      
      <button class="btn-send btn-action" onclick="sendMessage()">➤</button>
    </div>
  </div>

  <div class="toast" id="toast"></div>
</div>

<script>
/* FIREBASE CONFIG */
const FIREBASE_CONFIG = {
  apiKey: "REPLACE_API_KEY",
  authDomain: "REPLACE_PROJECT.firebaseapp.com",
  databaseURL: "https://REPLACE_PROJECT-default-rtdb.firebaseio.com",
  projectId: "REPLACE_PROJECT",
  storageBucket: "REPLACE_PROJECT.appspot.com",
  messagingSenderId: "REPLACE_SENDER_ID",
  appId: "REPLACE_APP_ID"
};

let db, storage;
let myName, myId, roomId;
let messagesRef, presenceRef, typingRef;
let typingTimeout;

const $ = id => document.getElementById(id);

function initFirebase(){
  if(!firebase.apps.length){
    firebase.initializeApp(FIREBASE_CONFIG);
  }
  db = firebase.database();
  storage = firebase.storage();
}

function genId(){ return Math.random().toString(36).slice(2,10); }
function initials(name){ return name.substring(0,2).toUpperCase(); }
function ts2time(ts){
  return new Date(ts).toLocaleTimeString('ar-EG',{hour:'2-digit', minute:'2-digit'});
}
function ts2DateTime(ts){
  return new Date(ts).toLocaleDateString('ar-EG') + ' ' + ts2time(ts);
}

function showToast(msg){
  const t = $('toast'); t.textContent = msg; t.classList.add('show');
  setTimeout(()=>{ t.classList.remove('show'); },2500);
}

async function joinRoom(){
  const name = $('name-input').value.trim();
  const room = $('room-input').value.trim();

  if(!name || !room){
    $('login-error').textContent = 'من فضلك املأ كل البيانات';
    return;
  }

  initFirebase();

  myName = name; roomId = room; myId = genId();

  messagesRef = db.ref(`rooms/${roomId}/messages`);
  presenceRef = db.ref(`rooms/${roomId}/presence/${myId}`);
  typingRef   = db.ref(`rooms/${roomId}/typing/${myId}`);

  await presenceRef.set({ name: myName, online: true, lastSeen: Date.now() });
  presenceRef.onDisconnect().set({ name: myName, online: false, lastSeen: firebase.database.ServerValue.TIMESTAMP });
  typingRef.onDisconnect().remove();

  $('my-avatar').textContent = initials(myName);
  $('header-room-id').textContent = 'غرفة: ' + roomId;

  setupListeners();

  await messagesRef.push({ type:'system', text: myName + ' انضم للمحادثة', ts:Date.now() });

  $('login-screen').classList.add('hidden');
  $('chat-screen').classList.remove('hidden');
}

function setupListeners(){
  db.ref(`rooms/${roomId}/presence`).on('value', snap => {
    const data = snap.val() || {};
    const peers = Object.entries(data).filter(([id]) => id !== myId);

    if (peers.length > 0) {
      const peer = peers[0][1];
      if (peer.online) {
        db.ref(`rooms/${roomId}/typing/${peers[0][0]}`).on('value', tSnap => {
          if (tSnap.val() === true) {
            $('peer-status').textContent = peer.name + ' يكتب الآن... ✍️';
            $('peer-status').style.color = 'var(--success)';
          } else {
            $('peer-status').textContent = peer.name + ' متصل الآن 🟢';
            $('peer-status').style.color = 'var(--success)';
          }
        });
      } else {
        const lastTime = peer.lastSeen ? ts2DateTime(peer.lastSeen) : 'غير معروف';
        $('peer-status').textContent = `آخر ظهور لـ ${peer.name}: ${lastTime}`;
        $('peer-status').style.color = 'var(--muted)';
      }
    } else {
      $('peer-status').textContent = 'في انتظار الطرف الآخر...';
      $('peer-status').style.color = 'var(--muted)';
    }
  });

  messagesRef.on('child_added', snap => {
    appendMessage(snap.val());
  });

  messagesRef.on('value', snap => {
    if(!snap.exists()){
      $('messages-area').innerHTML = `<div class="empty-state" id="empty-state">تم مسح المحادثة بالكامل 🗑️</div>`;
    }
  });
}

function handleTyping() {
  typingRef.set(true);
  clearTimeout(typingTimeout);
  typingTimeout = setTimeout(() => {
    typingRef.set(false);
  }, 2000);
}

function appendMessage(msg){
  const area = $('messages-area');
  const empty = $('empty-state');
  if(empty) empty.remove();

  const div = document.createElement('div');

  if(msg.type === 'system'){
    div.className = 'system-msg';
    div.textContent = msg.text;
  }
  else{
    const sent = msg.senderId === myId;
    div.className = 'msg-wrapper ' + (sent ? 'sent':'recv');

    let mediaHtml = '';
    if (msg.fileUrl) {
      if (msg.fileType && msg.fileType.startsWith('image/')) {
        mediaHtml = `<img src="${msg.fileUrl}" class="chat-image" onclick="window.open('${msg.fileUrl}', '_blank')">`;
      } else {
        mediaHtml = `<a href="${msg.fileUrl}" target="_blank" class="file-attachment">📁 تحميل المرفق (${msg.fileName || 'ملف'})</a>`;
      }
    }

    div.innerHTML = `
      <div class="msg-content">
        <div class="msg-name">${sent ? 'أنت' : msg.senderName}</div>
        <div class="msg-bubble ${sent ? 'sent':'recv'}">
          ${msg.text ? escapeHtml(msg.text) : ''}
          ${mediaHtml}
        </div>
        <span class="msg-time">${ts2time(msg.ts)}</span>
      </div>
    `;
  }

  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
}

async function sendMessage(){
  const input = $('msg-input');
  const text = input.value.trim();
  if(!text) return;

  input.value = '';
  typingRef.set(false);

  await messagesRef.push({
    type:'message',
    text:text,
    senderId:myId,
    senderName:myName,
    ts:Date.now()
  });
}

async function handleFileSelect(input) {
  const file = input.files[0];
  if (!file) return;

  $('upload-status').style.display = 'block';

  try {
    const fileId = genId() + '_' + file.name;
    const fileRef = storage.ref(`rooms/${roomId}/${fileId}`);
    
    const snapshot = await fileRef.put(file);
    const downloadUrl = await snapshot.ref.getDownloadURL();

    await messagesRef.push({
      type: 'message',
      text: '',
      fileUrl: downloadUrl,
      fileName: file.name,
      fileType: file.type,
      senderId: myId,
      senderName: myName,
      ts: Date.now()
    });

    showToast('تم رفع وإرسال الملف بنجاح! ✅');
  } catch (error) {
    console.error(error);
    showToast('فشل رفع الملف، تأكد من إعدادات الـ Storage ❌');
  } finally {
    $('upload-status').style.display = 'none';
    input.value = '';
  }
}

function handleKey(e){
  if(e.key === 'Enter' && !e.shiftKey){
    e.preventDefault();
    sendMessage();
  }
}

async function clearChat(){
  if(!confirm('سيتم حذف الرسائل عند الجميع، متأكد؟')) return;
  try{
    await db.ref(`rooms/${roomId}/messages`).remove();
    showToast('تم حذف كل الشات');
  } catch(e) { showToast('فشل حذف الشات'); }
}

async function leaveRoom(){
  try{ 
    await presenceRef.set({ name: myName, online: false, lastSeen: firebase.database.ServerValue.TIMESTAMP });
    await typingRef.remove();
  }catch(e){}
  $('chat-screen').classList.add('hidden');
  $('login-screen').classList.remove('hidden');
}

function escapeHtml(text){
  return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>
</body>
</html>
