<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SyncChat</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

:root{
  --bg: #ffffff;
  --surface: #f0f4f9;        
  --surface2: #e3eaf2;
  --border: #dee2e6;
  --accent: #1a73e8;         
  --accent2: #1bf;
  --text: #1f1f1f;           
  --muted: #5f6368;          
  --danger: #d93025;
  --warning: #f2994a;
  --success: #188038;
}

html,body{
  width:100%;
  height:100%;
  overflow:hidden;
  font-family:'IBM Plex Sans Arabic',sans-serif;
  background-color: var(--bg);
  background-image: 
    radial-gradient(circle at 10% 20%, rgba(26, 115, 232, 0.03) 0%, transparent 50%),
    radial-gradient(circle at 90% 80%, rgba(24, 128, 56, 0.02) 0%, transparent 50%);
  color:var(--text);
}

/* APP */
#app{
  width:100%;
  height:100vh;
}

/* SCREENS */
.screen{
  width:100%;
  height:100%;
}

.hidden{
  display:none !important;
}

/* LOGIN */
#login-screen{
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
}

.login-card{
  width:100%;
  max-width:400px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius:24px;
  padding:40px;
  box-shadow:
    0 12px 30px rgba(0,0,0,0.04),
    0 1px 3px rgba(0,0,0,0.02);
}

.logo{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:12px;
  margin-bottom:10px;
}

.logo-icon{
  width:54px;
  height:54px;
  border-radius:16px;
  background: linear-gradient(135deg, #1a73e8, #4285f4);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:24px;
}

.logo-text{
  font-size:28px;
  font-weight:700;
  color: #1f1f1f;
}

.logo-text span{
  color: var(--accent);
}

.login-sub{
  text-align:center;
  color:var(--muted);
  margin-bottom:30px;
  font-size:14px;
}

.field{
  margin-bottom:18px;
}

.field label{
  display:block;
  margin-bottom:8px;
  font-size:13px;
  color:var(--muted);
  font-weight: 500;
}

.field input{
  width:100%;
  background: #ffffff;
  border: 1px solid var(--border);
  border-radius:12px;
  padding:14px;
  color: var(--text);
  outline:none;
  font-size:14px;
}

.field input:focus{
  border-color:var(--accent);
  box-shadow:0 0 0 3px rgba(26, 115, 232, 0.15);
}

.btn-primary{
  width:100%;
  border:none;
  border-radius:12px;
  padding:14px;
  cursor:pointer;
  color:white;
  font-size:14px;
  font-weight:600;
  background: var(--accent);
  transition:.2s;
}

.btn-primary:hover{
  background: #1557b0;
  box-shadow: 0 4px 12px rgba(26, 115, 232, 0.2);
}

.error-msg{
  min-height:18px;
  color:var(--danger);
  font-size:12px;
  margin-bottom:10px;
}

/* CHAT */
#chat-screen{
  width:100%;
  height:100vh;
  max-width:900px;
  margin:auto;
  display:flex;
  flex-direction:column;
  background: #ffffff;
}

/* HEADER */
.chat-header{
  height:74px;
  background: rgba(255, 255, 255, 0.95);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid #f0f0f0;
  display:flex;
  align-items:center;
  gap:14px;
  padding:0 20px;
}

.avatar{
  width:46px;
  height:46px;
  border-radius:50%;
  background: var(--surface2);
  color: var(--accent);
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:700;
}

.header-info{
  flex:1;
}

.header-room{
  font-size:15px;
  font-weight:600;
  color: var(--text);
}

.header-sub{
  font-size:12px;
  color:var(--muted);
  margin-top:2px;
}

.btn-clear,
.btn-leave{
  border:none;
  padding:10px 14px;
  border-radius:10px;
  cursor:pointer;
  font-size:12px;
  font-weight:600;
  transition:.2s;
}

.btn-clear{
  background: #fef7e0;
  color: #b06000;
}

.btn-clear:hover{
  background: #fdecc8;
}

.btn-leave{
  background: #fce8e6;
  color: var(--danger);
}

.btn-leave:hover{
  background: #fad2cf;
}

/* MESSAGES AREA */
.messages-area{
  flex:1;
  overflow-y:auto;
  padding:22px;
  display:flex;
  flex-direction:column;
  gap:18px;
  background: #ffffff;
}

.messages-area::-webkit-scrollbar{
  width:6px;
}

.messages-area::-webkit-scrollbar-thumb{
  background: #e0e0e0;
  border-radius:20px;
}

.msg-wrapper{
  display:flex;
}

.msg-wrapper.sent{
  justify-content:flex-end;
}

.msg-content{
  max-width:80%;
}

.msg-name{
  font-size:11px;
  color:var(--muted);
  margin-bottom:4px;
  padding: 0 4px;
}

/* فقاعات الرسائل */
.msg-bubble{
  padding: 14px 18px;
  border-radius: 20px;
  line-height: 1.6;
  font-size: 14px;
  word-break:break-word;
  
  /* التعديل الجديد: يدعم تعدد الأسطر والنزول لسطر جديد بشكل صحيح */
  white-space: pre-wrap; 
}

/* رسائلك */
.msg-bubble.sent{
  background: var(--surface);
  color: var(--text);
  border-bottom-left-radius: 4px;
}

/* رسائل الطرف الآخر */
.msg-bubble.recv{
  background: #ffffff;
  color: var(--text);
  border: 1px solid #e3e8ec;
  border-bottom-right-radius: 4px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.02);
}

.msg-time{
  margin-top:5px;
  display:block;
  font-size:10px;
  color:var(--muted);
  padding: 0 4px;
}

.system-msg{
  align-self:center;
  background: #f1f3f4;
  padding:6px 16px;
  border-radius:20px;
  color:var(--muted);
  font-size:11px;
  font-weight: 500;
}

.empty-state{
  margin:auto;
  color:var(--muted);
  font-size:14px;
}

/* INPUT AREA */
.input-area{
  padding: 16px 22px;
  display:flex;
  gap:12px;
  background: #ffffff;
  align-items: center;
}

.msg-input{
  flex:1;
  background: var(--surface);
  border: 1px solid transparent;
  border-radius: 24px; 
  padding: 14px 20px;
  resize:none;
  color: var(--text);
  outline:none;
  font-size:14px;
  transition: 0.2s;
}

.msg-input:focus{
  background: #ffffff;
  border-color: var(--accent);
  box-shadow: 0 0 0 1px var(--accent);
}

.btn-send{
  width:48px;
  height: 48px;
  border:none;
  border-radius:50%; 
  cursor:pointer;
  background: var(--surface);
  color: var(--accent);
  font-size:18px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: 0.2s;
}

.btn-send:hover{
  background: var(--surface2);
}

/* TOAST */
.toast{
  position:fixed;
  bottom:100px;
  left:50%;
  transform:translateX(-50%);
  background: #323232;
  color: white;
  padding:12px 20px;
  border-radius:8px;
  opacity:0;
  transition:.3s;
  font-size: 14px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.2);
}

.toast.show{
  opacity:1;
}

</style>
</head>
<body>

<div id="app">

  <!-- LOGIN -->
  <div id="login-screen" class="screen">
    <div class="login-card">
      <div class="logo">
        <div class="logo-icon">💬</div>
        <div class="logo-text">
          Sync<span>Chat</span>
        </div>
      </div>

      <div class="login-sub">
        شات مباشر باستخدام Firebase
      </div>

      <div class="field">
        <label>اسمك</label>
        <input type="text" id="name-input" placeholder="Ahmed">
      </div>

      <div class="field">
        <label>Room ID</label>
        <input type="text" id="room-input" placeholder="room123">
      </div>

      <div class="error-msg" id="login-error"></div>

      <button class="btn-primary" onclick="joinRoom()">
        دخول الغرفة
      </button>
    </div>
  </div>

  <!-- CHAT -->
  <div id="chat-screen" class="screen hidden">
    <div class="chat-header">
      <div class="avatar" id="my-avatar">
        ME
      </div>

      <div class="header-info">
        <div class="header-room" id="header-room-id">
          Room
        </div>
        <div class="header-sub" id="peer-status">
          في انتظار الطرف الآخر...
        </div>
      </div>

      <button class="btn-clear" onclick="clearChat()">
        مسح الشات
      </button>

      <button class="btn-leave" onclick="leaveRoom()">
        مغادرة
      </button>
    </div>

    <div class="messages-area" id="messages-area">
      <div class="empty-state" id="empty-state">
        ابدأ المحادثة الآن ✨
      </div>
    </div>

    <div class="input-area">
      <textarea
        id="msg-input"
        class="msg-input"
        rows="1"
        placeholder="اكتب رسالة..."
        onkeydown="handleKey(event)"
      ></textarea>

      <button class="btn-send" onclick="sendMessage()">
        ➤
      </button>
    </div>
  </div>

  <div class="toast" id="toast"></div>

</div>

<script>
/* FIREBASE CONFIG */
const FIREBASE_CONFIG = {
    apiKey: "AIzaSyCqkSRiU0n0G4AFSJQCLCO-wqip6sKwCz0",
  authDomain: "syncchat-6e22b.firebaseapp.com",
  databaseURL: "https://syncchat-6e22b-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "syncchat-6e22b",
  storageBucket: "syncchat-6e22b.firebasestorage.app",
  messagingSenderId: "692797381468",
  appId: "1:692797381468:web:9faaed7bf44f0f527a3f99",
  measurementId: "G-ZMN7S10M2R"
};

let db;
let myName;
let myId;
let roomId;
let messagesRef;
let presenceRef;

const $ = id => document.getElementById(id);

/* INIT */
function initFirebase(){
  if(!firebase.apps.length){
    firebase.initializeApp(FIREBASE_CONFIG);
  }
  db = firebase.database();
}

/* HELPERS */
function genId(){
  return Math.random().toString(36).slice(2,10);
}

function initials(name){
  return name.substring(0,2).toUpperCase();
}

function ts2time(ts){
  return new Date(ts).toLocaleTimeString('ar-EG',{
    hour:'2-digit',
    minute:'2-digit'
  });
}

function showToast(msg){
  const t = $('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>{
    t.classList.remove('show');
  },2500);
}

/* JOIN */
async function joinRoom(){
  const name = $('name-input').value.trim();
  const room = $('room-input').value.trim();

  if(!name || !room){
    $('login-error').textContent = 'من فضلك املأ كل البيانات';
    return;
  }

  initFirebase();

  myName = name;
  roomId = room;
  myId   = genId();

  messagesRef = db.ref(`rooms/${roomId}/messages`);
  presenceRef = db.ref(`rooms/${roomId}/presence/${myId}`);

  await presenceRef.set({
    name:myName,
    online:true
  });

  presenceRef.onDisconnect().remove();

  $('my-avatar').textContent = initials(myName);
  $('header-room-id').textContent = 'Room: ' + roomId;

  setupListeners();

  await messagesRef.push({
    type:'system',
    text: myName + ' انضم للمحادثة',
    ts:Date.now()
  });

  $('login-screen').classList.add('hidden');
  $('chat-screen').classList.remove('hidden');
}

/* LISTENERS */
function setupListeners(){
  db.ref(`rooms/${roomId}/presence`)
    .on('value',snap=>{
      const data = snap.val() || {};
      const peers = Object.entries(data).filter(([id])=> id !== myId);

      $('peer-status').textContent =
        peers.length
          ? peers[0][1].name + ' متصل الآن'
          : 'في انتظار الطرف الآخر...';
    });

  messagesRef.on('child_added',snap=>{
    const msg = snap.val();
    appendMessage(msg);
  });

  messagesRef.on('value',snap=>{
    if(!snap.exists()){
      $('messages-area').innerHTML = `
        <div class="empty-state" id="empty-state">
          تم مسح المحادثة بالكامل 🗑️
        </div>
      `;
    }
  });
}

/* APPEND MESSAGE */
function appendMessage(msg){
  const area = $('messages-area');
  const empty = $('empty-state');

  if(empty) empty.remove();

  const div = document.createElement('div');

  if(msg.type === 'system'){
    div.className = 'system-msg';
    div.textContent = msg.text;
  }
  else{
    const sent = msg.senderId === myId;
    div.className = 'msg-wrapper ' + (sent ? 'sent':'recv');

    div.innerHTML = `
      <div class="msg-content">
        <div class="msg-name">
          ${sent ? 'أنت' : msg.senderName}
        </div>
        <div class="msg-bubble ${sent ? 'sent':'recv'}">
          ${escapeHtml(msg.text)}
        </div>
        <span class="msg-time">
          ${ts2time(msg.ts)}
        </span>
      </div>
    `;
  }

  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
}

/* SEND */
async function sendMessage(){
  const input = $('msg-input');
  const text = input.value.trim();

  if(!text) return;

  input.value = '';

  await messagesRef.push({
    type:'message',
    text:text,
    senderId:myId,
    senderName:myName,
    ts:Date.now()
  });
}

/* ENTER */
function handleKey(e){
  if(e.key === 'Enter' && !e.shiftKey){
    e.preventDefault();
    sendMessage();
  }
}

/* CLEAR CHAT FOR EVERYONE */
async function clearChat(){
  const ok = confirm('سيتم حذف كل الرسائل عند جميع المستخدمين داخل الغرفة.\n\nمتأكد؟');
  if(!ok) return;

  try{
    await db.ref(`rooms/${roomId}/messages`).remove();
    $('messages-area').innerHTML = `
      <div class="empty-state" id="empty-state">
        تم مسح المحادثة بالكامل 🗑️
      </div>
    `;
    showToast('تم حذف كل الشات');
  }
  catch(e){
    console.error(e);
    showToast('فشل حذف الشات');
  }
}

/* LEAVE */
async function leaveRoom(){
  try{
    await presenceRef.remove();
  }catch(e){}

  $('messages-area').innerHTML = `
    <div class="empty-state" id="empty-state">
      ابدأ المحادثة الآن ✨
    </div>
  `;

  $('name-input').value = '';
  $('room-input').value = '';

  $('chat-screen').classList.add('hidden');
  $('login-screen').classList.remove('hidden');
}

/* ESCAPE HTML */
function escapeHtml(text){
  return text
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#039;');
}
</script>

</body>
</html>
