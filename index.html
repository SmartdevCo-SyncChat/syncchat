<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
<title>ChatBFT</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --accent:#10a37f; --accent-h:#0d8f6f;
  --bg:#fff; --surface:#f4f4f4; --border:#e5e5e5; --border2:#d9d9d9;
  --text:#0d0d0d; --text2:#353535; --muted:#6e6e80; --danger:#ef4444;
  --sent:#10a37f; --recv:#f1f1f1; --font:'Cairo',sans-serif;
  --warning:#f59e0b; --info:#3b82f6;
}
html,body{width:100%;height:100dvh;overflow:hidden;font-family:var(--font);background:#fff;color:var(--text)}
#app{width:100%;height:100%;display:flex;align-items:stretch}
.screen{width:100%;height:100%;overflow:hidden}
.hidden{display:none!important}

/* ── LOGIN ── */
#login-screen{display:flex;align-items:center;justify-content:center;background:#fff;padding:20px;overflow-y:auto;height:100%}
.login-wrap{width:100%;max-width:380px;animation:fadeUp .4s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.login-card{background:#fff;border:1px solid var(--border);border-radius:16px;padding:32px 28px 28px}
.brand{text-align:center;margin-bottom:28px}
.brand-name{font-size:26px;font-weight:700}
.brand-name span{color:var(--accent)}
.brand-sub{font-size:12px;color:var(--muted);margin-top:4px}
.field{margin-bottom:14px}
.field label{display:block;font-size:11px;font-weight:600;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.field input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:11px 14px;color:var(--text);font-size:14px;font-family:var(--font);outline:none}
.field input:focus{border-color:var(--accent);box-shadow:0 0 0 2px rgba(16,163,127,.15)}
.field-hint{font-size:11px;color:var(--muted);margin-top:4px}
.btn-login{width:100%;border:none;border-radius:10px;padding:12px;margin-top:6px;background:var(--accent);color:#fff;font-size:14px;font-weight:700;font-family:var(--font);cursor:pointer}
.btn-login:hover{background:var(--accent-h)}
.error-msg{min-height:18px;color:var(--danger);font-size:12px;margin-bottom:8px;text-align:center;font-weight:500}

/* ── CHAT SCREEN ── */
#chat-screen{max-width:860px;margin:0 auto;background:#fff;height:100dvh;display:flex;flex-direction:column;overflow:hidden;position:relative}

/* header */
.chat-header{background:#fff;border-bottom:1px solid var(--border);height:56px;min-height:56px;display:flex;align-items:center;gap:10px;padding:0 14px;z-index:100;flex-shrink:0}
.peer-avatar{width:36px;height:36px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;flex-shrink:0}
.my-avatar-sm{width:28px;height:28px;border-radius:50%;background:var(--surface);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--text2);flex-shrink:0}
.header-info{flex:1;min-width:0}
.header-room{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.header-sub{font-size:11px;color:var(--muted);display:flex;align-items:center;gap:5px;margin-top:1px}
#peer-status{flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.online-dot{width:6px;height:6px;border-radius:50%;background:var(--muted);flex-shrink:0}
.online-dot.on{background:var(--accent);box-shadow:0 0 5px rgba(16,163,127,.5)}
.header-actions{display:flex;gap:5px}
.btn-hdr{border:1px solid var(--border);border-radius:7px;padding:5px 10px;cursor:pointer;font-size:11px;font-weight:600;font-family:var(--font);background:transparent}
.btn-hdr.clear{color:var(--muted)}
.btn-hdr.leave{color:var(--danger);border-color:rgba(239,68,68,.3)}
.btn-hdr.search-btn{color:var(--muted)}
.btn-hdr.call-btn{color:#fff; background: var(--accent); border-color: var(--accent);}
.btn-hdr.video-call-btn { color: #fff; background: var(--info); border-color: var(--info); }

/* pin bar */
.pin-bar{background:#fffbea;border-bottom:1.5px solid #f0d060;border-right:4px solid var(--accent);padding:8px 14px;display:none;align-items:center;gap:10px;cursor:pointer;min-height:40px;flex-shrink:0}
.pin-bar.show{display:flex}
.pin-icon{font-size:14px;flex-shrink:0}
.pin-text{flex:1;font-size:12.5px;color:#5a4500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:600}
.pin-close{background:transparent;border:none;color:#7a6000;font-size:16px;cursor:pointer;opacity:.7}
.pin-close:hover{opacity:1}

/* search overlay */
.search-overlay{position:fixed;top:0;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:860px;z-index:80
